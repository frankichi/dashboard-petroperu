// PD: CURVA DE INVENTARIO PROYECTADO
// ════════════════════════════════════════════════════════════════════════════
let curveProdFilter = 'Diesel';
let curveCharts = {};

function setCurveProd(prod) {
  curveProdFilter = prod;
  renderPD();
}

function renderPD() {
  const today = byLatest();
  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  const active = today.filter(r => !EXCLUIR.some(x => r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));

  const productos = [...new Set(active.map(r=>r.producto))].sort();
  if (!productos.includes(curveProdFilter)) curveProdFilter = productos[0]||'';

  const prodBtns = productos.map(p =>
    `<button class="curve-prod-btn ${p===curveProdFilter?'active':''}" onclick="setCurveProd('${p.replace(/'/g,"\\'")}');">${p}</button>`
  ).join('');

  // Filter records
  const rows = active.filter(r => r.producto === curveProdFilter);

  // Destroy previous charts
  Object.values(curveCharts).forEach(ch => { try{ch.destroy();}catch(e){} });
  curveCharts = {};

  // Build cards per planta
  const cards = rows.map(r => {
    const inv   = r.inv   || 0;
    const dem   = r.dem   || r.vreal || 0;  // demanda diaria
    const days  = 21;
    const labels = [];
    const invLine = [];
    const demLine = [];

    // Proyecto el inventario
    let curInv = inv;
    for (let d = 0; d <= days; d++) {
      const dt = new Date(currentDate + 'T12:00:00');
      dt.setDate(dt.getDate() + d);
      labels.push(dt.getDate()+'/'+(dt.getMonth()+1));
      invLine.push(Math.max(0, Math.round(curInv)));
      demLine.push(dem);
      curInv -= dem;
    }

    // Fecha quiebre
    const daysToQuiebre = dem > 0 ? Math.floor(inv/dem) : 999;
    const btETA = r.fecha_reposicion || '';
    const cobDias = r.cob || 0;
    const statusColor = cobDias < 4 ? '#ef4444' : cobDias < 7 ? '#eab308' : '#22c55e';

    const cardId = 'curve_' + r.planta.replace(/[^a-zA-Z0-9]/g,'_');

    return `
      <div class="curve-card">
        <div class="curve-card-title">
          <span style="width:8px;height:8px;border-radius:50%;background:${statusColor};display:inline-block"></span>
          ${r.planta}
          <span style="margin-left:auto;font-size:10px;color:var(--txt3);font-weight:500">${(inv/1000).toFixed(2)} MB inv · ${cobDias}d cob</span>
        </div>
        <div class="curve-canvas-wrap"><canvas id="${cardId}"></canvas></div>
        <div class="curve-status">
          <span class="curve-tag ${cobDias<4?'warn':'ok'}">Quiebre en ~${daysToQuiebre}d</span>
          ${btETA ? `<span class="curve-tag ok">🚢 BT ETA ${fmtDate(btETA)}</span>` : ''}
          <span class="curve-tag ${dem>0?'ok':'warn'}" style="margin-left:auto">Dem: ${(dem/1000).toFixed(2)} MB/d</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('pD-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">📉 Curva de Inventario Proyectado</div>
      <div class="page-header-subtitle">Proyección de consumo vs quiebre por planta · ${fmtDate(currentDate)}</div>
    </div>
    ${buildDateBar('dateBarPD')}
    <div class="curve-wrap">
      <div class="curve-controls">
        <span style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px">Producto:</span>
        ${prodBtns}
      </div>
      <div class="curve-chart-grid">${cards}</div>
    </div>
  `;

  // Render charts after DOM is ready
  setTimeout(() => {
    rows.forEach(r => {
      const inv = r.inv || 0;
      const dem = r.dem || r.vreal || 0;
      const days = 21;
      const labels = [];
      const invLine = [];
      const btLine  = [];

      let curInv = inv;
      const btEtaMs = r.fecha_reposicion ? new Date(r.fecha_reposicion+'T12:00:00').getTime() : null;
      const btVol = (r.vol_rep||0) + (r.vol_rep_bt2||0);

      for (let d = 0; d <= days; d++) {
        const dt = new Date(currentDate+'T12:00:00');
        dt.setDate(dt.getDate()+d);
        labels.push(dt.getDate()+'/'+(dt.getMonth()+1));
        invLine.push(Math.max(0, Math.round(curInv/1000*100)/100));
        // BT annotation line at eta day
        if (btEtaMs && Math.abs(dt.getTime()-btEtaMs) < 86400000*0.5) btLine.push(Math.max(0,curInv/1000));
        else btLine.push(null);
        curInv -= dem;
        if (btEtaMs && dt.getTime() >= btEtaMs && btVol > 0) { curInv += btVol; }
      }

      const cardId = 'curve_' + r.planta.replace(/[^a-zA-Z0-9]/g,'_');
      const ctx = document.getElementById(cardId);
      if (!ctx) return;
      curveCharts[cardId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Inventario (MB)',
              data: invLine,
              borderColor: r.cob < 4 ? '#ef4444' : r.cob < 7 ? '#eab308' : '#2d8cf0',
              backgroundColor: r.cob < 4 ? 'rgba(239,68,68,.08)' : 'rgba(45,140,240,.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 2,
              borderWidth: 2,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {display: false},
            tooltip: {
              callbacks: {
                label: ctx => ctx.parsed.y.toFixed(2) + ' MB'
              }
            }
          },
          scales: {
            x: {grid:{display:false}, ticks:{color:cssVar('--txt3'),font:{size:9}}},
            y: {grid:{color:cssVar('--bdr')}, ticks:{color:cssVar('--txt3'),font:{size:9}}, min:0}
          }
        }
      });
    });
  }, 50);
}

// PE: SIMULADOR DE EMBARQUES BT  v2  —  Interactive, Dynamic, Executive

/* Distancias entre puertos del litoral peruano en HORAS (Petroperú, Abr-1996)
   Convertido a días = horas / 24                                              */
const DIST_H = {

  'Eten':     {'Talara':15,'Bayóvar':10,'Eten':0,'Salaverry':8,'Chimbote':12,'Supe':21,'Callao':28,'Conchán':30,'Pisco':38,'Mollendo':64,'Ilo':68},
  'Salaverry':{'Talara':23,'Bayóvar':17,'Eten':8,'Salaverry':0,'Chimbote':5,'Supe':14,'Callao':21,'Conchán':22,'Pisco':30,'Mollendo':57,'Ilo':61},

  'Supe':     {'Talara':36,'Bayóvar':30,'Eten':21,'Salaverry':14,'Chimbote':9,'Supe':0,'Callao':7,'Conchán':9,'Pisco':17,'Mollendo':44,'Ilo':47},
  'Callao':   {'Talara':42,'Bayóvar':36,'Eten':28,'Salaverry':21,'Chimbote':16,'Supe':7,'Callao':0,'Conchán':2,'Pisco':11,'Mollendo':37,'Ilo':41},
  'Conchán':  {'Talara':44,'Bayóvar':38,'Eten':30,'Salaverry':22,'Chimbote':18,'Supe':9,'Callao':2,'Conchán':0,'Pisco':10,'Mollendo':37,'Ilo':41},
  'Pisco':    {'Talara':52,'Bayóvar':46,'Eten':38,'Salaverry':30,'Chimbote':26,'Supe':17,'Callao':11,'Conchán':10,'Pisco':0,'Mollendo':27,'Ilo':33},
  'Mollendo': {'Talara':78,'Bayóvar':72,'Eten':64,'Salaverry':57,'Chimbote':52,'Supe':44,'Callao':37,'Conchán':37,'Pisco':27,'Mollendo':0,'Ilo':5},
  'Ilo':      {'Talara':82,'Bayóvar':76,'Eten':68,'Salaverry':61,'Chimbote':56,'Supe':47,'Callao':41,'Conchán':41,'Pisco':33,'Mollendo':5,'Ilo':0},
};

const PORT_ALIAS = {
  'Talara':'Talara','Bayóvar':'Bayóvar','Piura':'Talara',
  'Eten':'Eten','El Milagro':'Eten',
  'Salaverry':'Salaverry','Chimbote':'Chimbote','Supe':'Supe',
  'Callao':'Callao','Conchán':'Conchán',
  'Pisco':'Pisco','Mollendo':'Mollendo','Ilo':'Ilo',
  'Juliaca':'Mollendo','Cusco':'Mollendo',
  'Pucallpa':'Callao','Iquitos':'Callao','Tarapoto':'Callao','Yurimaguas':'Callao',
};

const SHIP_COLORS = ['#1d4ed8','#7c3aed','#0891b2','#c2410c','#15803d','#be185d','#b45309'];
const PRODUCTS    = ['Diesel','G. Regular','G. Premium','G84','GLP','TA1','Turbo','ULSD'];
const PORTS_LIST  = Object.keys(DIST_H);

let simShips     = [];
let simNextId    = 1;
let simActiveId  = null;
let simInited    = false;

function getDistDays(from, to) {
  const pf = PORT_ALIAS[from]||from, pt = PORT_ALIAS[to]||to;
  return (DIST_H[pf]&&DIST_H[pf][pt]!=null) ? DIST_H[pf][pt]/24 : null;
}

function simRecalcETAs(ship) {
  let cur   = ship.origen;
  let curDt = ship.zarpeDate ? new Date(ship.zarpeDate+'T12:00:00') : new Date();
  ship.stops.forEach(st => {
    const d = getDistDays(cur, st.planta);
    if (d !== null) {
      curDt = new Date(curDt.getTime() + d*86400000);
      st.etaDate = curDt.toISOString().slice(0,10);
    }
    cur = st.planta;
  });
}

function simLoad() {
  if (simInited) return;
  simInited = true;
  const today = byLatest();
  const btMap = {};
  today.forEach(r => {
    if (!r.bt||r.bt===''||r.bt==='-') return;
    if (!btMap[r.bt]) btMap[r.bt] = {name:r.bt, origen:r.planta, volTotal:0, stops:{}};
    const v1 = (r.vol_rep     || 0) / 1000;
    const v2 = (r.vol_rep_bt2 || 0) / 1000;
    if (v1>0) {
      const k = r.planta+'||'+r.producto+'||1';
      btMap[r.bt].stops[k] = {planta:r.planta, producto:r.producto, vol:parseFloat(v1.toFixed(2)), etaDate:r.fecha_reposicion||''};
      btMap[r.bt].volTotal += v1;
    }
    if (v2>0) {
      const k = r.planta+'||'+r.producto+'||2';
      btMap[r.bt].stops[k] = {planta:r.planta, producto:r.producto+'(BT2)', vol:parseFloat(v2.toFixed(2)), etaDate:r.fecha_repos_bt2||''};
      btMap[r.bt].volTotal += v2;
    }
  });
  Object.values(btMap).forEach(bt => {
    simShips.push({
      id: simNextId++,
      name: bt.name,
      volTotal: Math.round(bt.volTotal*10)/10,
      origen: bt.origen||'Talara',
      zarpeDate: currentDate||'',
      stops: Object.values(bt.stops),
    });
  });
  if (simShips.length) simActiveId = simShips[0].id;
}

function simGetActive() { return simShips.find(s=>s.id===simActiveId)||null; }

function simAddShip() {
  const id = simNextId++;
  simShips.push({id, name:'NUEVO-'+id, volTotal:200, origen:'Talara', zarpeDate:currentDate||'', stops:[]});
  simActiveId = id;
  renderPE();
}

function simDelShip(id) {
  simShips = simShips.filter(s=>s.id!==id);
  if (simActiveId===id) simActiveId = simShips.length ? simShips[0].id : null;
  renderPE();
}

function simSelect(id) { simActiveId=id; renderPE(); }

function simField(id, f, v) {
  const s = simShips.find(s=>s.id===id);
  if (!s) return;
  if (f==='volTotal') { s.volTotal=parseFloat(v)||0; }
  else { s[f]=v; }
  if (f==='zarpeDate'||f==='origen') simRecalcETAs(s);
  renderPE();
}

function simAddStop(id) {
  const s = simShips.find(s=>s.id===id);
  if (!s) return;
  // Suggest the most critical plant for this ship based on live coverage data
  const today = byLatest();
  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  const active = today.filter(r=>!EXCLUIR.some(x=>r.producto&&r.producto.toUpperCase().includes(x.toUpperCase())));
  const criticals = active.filter(r=>r.cob>0&&r.cob<7).sort((a,b)=>a.cob-b.cob);
  const suggest = criticals[0]||null;
  s.stops.push({
    planta: suggest ? suggest.planta : 'Callao',
    producto: suggest ? suggest.producto : 'Diesel',
    vol: 0,
    etaDate: '',
  });
  simRecalcETAs(s);
  renderPE();
}

function simDelStop(shipId, idx) {
  const s = simShips.find(s=>s.id===shipId);
  if (!s) return;
  s.stops.splice(idx,1);
  simRecalcETAs(s);
  renderPE();
}

function simStopField(shipId, idx, f, v) {
  const s = simShips.find(s=>s.id===shipId);
  if (!s||!s.stops[idx]) return;
  s.stops[idx][f] = f==='vol' ? (parseFloat(v)||0) : v;
  simRecalcETAs(s);
  renderPE();
}

function simExportCSV() {
  const rows=[['Buque','Origen','Zarpe','#Escala','Planta','Producto','Vol (MB)','ETA','Distancia (d)']];
  simShips.forEach(s => {
    s.stops.forEach((st,i)=>{
      const prev = i===0 ? s.origen : s.stops[i-1].planta;
      const dist = getDistDays(prev,st.planta);
      rows.push([s.name,s.origen,s.zarpeDate,i+1,st.planta,st.producto,st.vol,st.etaDate,dist?dist.toFixed(1):'—']);
    });
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `sim_bt_${currentDate||'hoy'}.csv`;
  a.click();
}

function renderPE() {
  simLoad();

  const today    = byLatest();
  const EXCLUIR  = ['ULSD EXPO','Regular HS'];
  const liveData = today.filter(r=>!EXCLUIR.some(x=>r.producto&&r.producto.toUpperCase().includes(x.toUpperCase())));
  // Build a quick coverage lookup
  const cobMap = {};
  liveData.forEach(r=>{ cobMap[r.planta+'||'+r.producto]=r.cob||0; });

  function cobColor(cob) {
    if (!cob||cob<=0) return '#e03434';
    if (cob<4)  return '#e03434';
    if (cob<8)  return '#d96b1a';
    if (cob<13) return '#c9970a';
    return '#1a9e50';
  }

  const active = simGetActive();

  // ── LEFT: Fleet list ───────────────────────────────────────────────────────
  const fleetHTML = simShips.map((s,i)=>{
    const used    = s.stops.reduce((a,st)=>a+st.vol,0);
    const pct     = s.volTotal>0 ? Math.min(100,used/s.volTotal*100) : 0;
    const fillBg  = pct>100 ? '#e03434' : pct>90 ? '#c9970a' : '#1a9e50';
    const col     = SHIP_COLORS[i%SHIP_COLORS.length];
    const isAct   = s.id===simActiveId;
    return `
      <div class="sim-ship-btn${isAct?' active':''}" onclick="simSelect(${s.id})">
        <div class="sim-ship-avatar" style="background:${col}">${s.name.slice(0,2).toUpperCase()}</div>
        <div class="sim-ship-info">
          <div class="sim-ship-n">${s.name}</div>
          <div class="sim-ship-meta">${s.stops.length} escalas · ${used.toFixed(1)}/${s.volTotal} MB</div>
        </div>
        <button class="sim-ship-xbtn" onclick="event.stopPropagation();simDelShip(${s.id})" title="Eliminar">✕</button>
      </div>
      <div class="sim-capbar">
        <div class="sim-capbar-fill" style="width:${pct}%;background:${fillBg}"></div>
      </div>`;
  }).join('') || '<div style="padding:20px 12px;text-align:center;font-size:11px;color:var(--txt3)">Sin buques.<br>Añade uno →</div>';

  // ── EDITOR: Config + stops ─────────────────────────────────────────────────
  let editorHTML = '';
  if (!active) {
    editorHTML = `<div class="sim-editor-empty">
      <div style="font-size:40px">🚢</div>
      <div style="font-size:13px;font-weight:700;color:var(--txt2)">Selecciona o agrega un buque</div>
      <div style="font-size:11px">Clic en "+ Nuevo Buque" para comenzar</div>
    </div>`;
  } else {
    const used     = active.stops.reduce((a,st)=>a+st.vol,0);
    const pct      = active.volTotal>0 ? Math.min(100,used/active.volTotal*100) : 0;
    const remain   = active.volTotal - used;
    const capColor = pct>100?'#e03434':pct>90?'#c9970a':'#1a9e50';
    const col      = SHIP_COLORS[simShips.findIndex(s=>s.id===active.id)%SHIP_COLORS.length];

    // Config row
    const configHTML = `
      <div class="sim-config">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:36px;height:36px;border-radius:8px;background:${col};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${active.name.slice(0,2).toUpperCase()}</div>
          <input class="sim-fld-input" style="font-size:15px;font-weight:800;flex:1;background:transparent;border-color:transparent;padding:4px 6px"
            value="${active.name}" oninput="simField(${active.id},'name',this.value)" placeholder="Nombre del buque">
        </div>
        <div class="sim-config-row">
          <div class="sim-fld">
            <div class="sim-fld-label">Puerto Origen</div>
            <select class="sim-fld-input" onchange="simField(${active.id},'origen',this.value)">
              ${PORTS_LIST.map(p=>`<option value="${p}"${p===active.origen?' selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div class="sim-fld">
            <div class="sim-fld-label">Capacidad Total (MB)</div>
            <input class="sim-fld-input" type="number" value="${active.volTotal}" min="0" step="1"
              oninput="simField(${active.id},'volTotal',this.value)">
          </div>
          <div class="sim-fld">
            <div class="sim-fld-label">Fecha Zarpe</div>
            <input class="sim-fld-input" type="date" value="${active.zarpeDate}"
              onchange="simField(${active.id},'zarpeDate',this.value)">
          </div>
          <div class="sim-fld">
            <div class="sim-fld-label">Tiempo Viaje Total</div>
            <div style="padding:6px 10px;font-size:12px;font-weight:700;font-family:var(--mono);color:var(--acc2)">
              ${active.stops.length>0&&active.stops[active.stops.length-1].etaDate&&active.zarpeDate
                ? Math.round((new Date(active.stops[active.stops.length-1].etaDate+'T12:00:00')-new Date(active.zarpeDate+'T12:00:00'))/86400000)+'d'
                : '—'
              }
            </div>
          </div>
        </div>
      </div>
      <div class="sim-capometer">
        <div class="sim-caplabel">Capacidad</div>
        <div class="sim-captrack">
          <div class="sim-capfill" style="width:${pct}%;background:${capColor}"></div>
        </div>
        <div class="sim-capnums" style="color:${capColor}">
          ${used.toFixed(1)} / ${active.volTotal} MB
          <span style="font-size:9px;opacity:.7;margin-left:4px">${remain>=0?'('+remain.toFixed(1)+' libre)':'('+Math.abs(remain).toFixed(1)+' exceso)'}</span>
        </div>
      </div>`;

    // Stops
    const stopsHTML = active.stops.map((st,idx)=>{
      const prev     = idx===0 ? active.origen : active.stops[idx-1].planta;
      const distD    = getDistDays(prev, st.planta);
      const distStr  = distD!==null ? `${(distD*24).toFixed(0)}h (${distD.toFixed(1)}d)` : '—';
      const liveCob  = cobMap[st.planta+'||'+st.producto];
      const cobStr   = liveCob!==undefined ? (liveCob>0?liveCob+'d cob.':'Quiebre') : '—';
      const cobC     = cobColor(liveCob||0);
      const pctStop  = active.volTotal>0 ? Math.min(100,st.vol/active.volTotal*100) : 0;

      return `
        <div class="sim-stop-card">
          <div class="sim-stop-head">
            <div class="sim-stop-num" style="background:${col}">${idx+1}</div>
            <div style="flex:1">
              <div class="sim-stop-planta">${st.planta} <span style="font-size:10px;font-weight:500;color:var(--txt3)">→ ${st.producto}</span></div>
              <div style="font-size:9.5px;color:var(--txt3);margin-top:1px">Desde ${prev} · ${distStr}</div>
            </div>
            ${st.etaDate?`<div class="sim-stop-eta-badge">📅 ${fmtDate(st.etaDate)}</div>`:''}
            <button class="sim-stop-del2" onclick="simDelStop(${active.id},${idx})" title="Eliminar escala">🗑</button>
          </div>
          <div class="sim-stop-body">
            <div class="sim-fld">
              <div class="sim-fld-label">Planta / Terminal</div>
              <select class="sim-fld-input" onchange="simStopField(${active.id},${idx},'planta',this.value)">
                ${Object.keys(PORT_ALIAS).sort().map(p=>`<option value="${p}"${p===st.planta?' selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="sim-fld">
              <div class="sim-fld-label">Producto</div>
              <select class="sim-fld-input" onchange="simStopField(${active.id},${idx},'producto',this.value)">
                ${PRODUCTS.map(p=>`<option value="${p}"${p===st.producto?' selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="sim-fld">
              <div class="sim-fld-label">Volumen (MB)</div>
              <input class="sim-fld-input" type="number" value="${st.vol}" min="0" step="0.1"
                oninput="simStopField(${active.id},${idx},'vol',this.value)" placeholder="0.0">
            </div>
          </div>
          ${liveCob!==undefined?`
          <div class="sim-cob-indicator">
            <div class="sim-cob-dot" style="background:${cobC}"></div>
            <span style="color:var(--txt3)">Cobertura actual:</span>
            <span style="color:${cobC};font-weight:700;font-family:var(--mono)">${cobStr}</span>
            <div style="flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin:0 8px">
              <div style="height:100%;width:${pctStop}%;background:${col};border-radius:2px;transition:width .3s"></div>
            </div>
            <span style="font-size:9.5px;color:var(--txt3);font-family:var(--mono)">${st.vol>0?((st.vol/active.volTotal*100).toFixed(0)+'% carga'):''}</span>
          </div>`:''}
        </div>`;
    }).join('');

    editorHTML = `
      ${configHTML}
      <div class="sim-stops-header">
        <div class="sim-stops-label">🗺 Ruta de Escalas — ${active.stops.length} parada${active.stops.length!==1?'s':''}</div>
        <button class="sim-btn sim-btn-primary" onclick="simAddStop(${active.id})" style="font-size:10px;padding:5px 12px">+ Escala</button>
      </div>
      <div class="sim-stops-list">
        ${stopsHTML||`<div style="text-align:center;padding:24px;color:var(--txt3);font-size:11px">Sin escalas. Añade la primera parada →</div>`}
      </div>`;
  }

  // ── RIGHT SUMMARY ──────────────────────────────────────────────────────────
  const totalCap  = simShips.reduce((a,s)=>a+s.volTotal,0);
  const totalUsed = simShips.reduce((a,s)=>a+s.stops.reduce((b,st)=>b+st.vol,0),0);
  const utilPct   = totalCap>0 ? (totalUsed/totalCap*100).toFixed(0) : 0;

  // Mini gantt for all ships
  const today2 = currentDate ? new Date(currentDate+'T12:00:00') : new Date();
  const DAYS   = 30;
  const miniGantt = simShips.map((s,i)=>{
    const col   = SHIP_COLORS[i%SHIP_COLORS.length];
    const zOff  = s.zarpeDate ? (new Date(s.zarpeDate+'T12:00:00')-today2)/86400000 : 0;
    const last  = s.stops.filter(st=>st.etaDate).pop();
    const lastOff = last ? (new Date(last.etaDate+'T12:00:00')-today2)/86400000 : zOff+5;
    const left  = Math.max(0, zOff/DAYS*100);
    const w     = Math.max(3, Math.min(100-left, (lastOff-zOff)/DAYS*100));
    return `
      <div class="sim-mini-row">
        <div class="sim-mini-label" title="${s.name}">${s.name}</div>
        <div class="sim-mini-bar-track">
          <div class="sim-mini-bar" style="position:absolute;left:${left}%;width:${w}%;background:${col};border-radius:3px;top:0;height:100%">
            <span style="padding:0 4px;overflow:hidden;white-space:nowrap;font-size:8px">${s.stops.length}🏁</span>
          </div>
          <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);opacity:.6"></div>
        </div>
      </div>`;
  }).join('');

  // All stops summary
  const allStops = simShips.flatMap((s,i)=>s.stops.map(st=>({...st, shipName:s.name, col:SHIP_COLORS[i%SHIP_COLORS.length]})))
    .sort((a,b)=>(a.etaDate||'').localeCompare(b.etaDate||''));
  const stopsListHTML = allStops.slice(0,20).map(st=>`
    <div class="sim-sum-stop">
      <div class="sim-sum-stop-dot" style="background:${st.col}"></div>
      <div style="flex:1;min-width:0">
        <div class="sim-sum-stop-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${st.planta} — ${st.producto}</div>
        <div style="font-size:9px;color:var(--txt3)">${st.shipName}</div>
      </div>
      <div>
        <div class="sim-sum-stop-vol">${st.vol.toFixed(1)} MB</div>
        <div class="sim-sum-stop-eta">${st.etaDate?fmtDate(st.etaDate):''}</div>
      </div>
    </div>`).join('') || '<div style="font-size:10px;color:var(--txt3);padding:8px 0">Sin escalas programadas</div>';

  const summaryHTML = `
    <div class="sim-sum-section">
      <div class="sim-sum-title">Resumen Flota</div>
      <div class="sim-kpi2"><span class="sim-kpi2-lbl">Buques</span><span class="sim-kpi2-val">${simShips.length}</span></div>
      <div class="sim-kpi2"><span class="sim-kpi2-lbl">Cap. Total</span><span class="sim-kpi2-val">${totalCap.toFixed(1)} MB</span></div>
      <div class="sim-kpi2"><span class="sim-kpi2-lbl">Asignado</span><span class="sim-kpi2-val">${totalUsed.toFixed(1)} MB</span></div>
      <div class="sim-kpi2"><span class="sim-kpi2-lbl">Utilización</span><span class="sim-kpi2-val" style="color:${parseFloat(utilPct)>100?'var(--red)':'var(--acc2)'}">${utilPct}%</span></div>
      <div class="sim-kpi2"><span class="sim-kpi2-lbl">Escalas</span><span class="sim-kpi2-val">${allStops.length}</span></div>
    </div>
    <div class="sim-sum-section">
      <div class="sim-sum-title">Timeline (30d)</div>
      <div class="sim-mini-gantt">${miniGantt||'<div style="font-size:10px;color:var(--txt3)">Sin viajes</div>'}</div>
    </div>
    <div class="sim-sum-section" style="flex:1">
      <div class="sim-sum-title">Próximas Escalas</div>
      ${stopsListHTML}
    </div>`;

  document.getElementById('pE-content').innerHTML = `
    <div class="sim-page">
      <div class="sim-toolbar">
        <div class="sim-toolbar-title">🛳️ Simulador de Embarques BT</div>
        <button class="sim-btn sim-btn-primary" onclick="simAddShip()">+ Nuevo Buque</button>
        <button class="sim-btn sim-btn-ghost" onclick="simExportCSV()">⬇ Exportar CSV</button>
        <button class="sim-btn sim-btn-ghost" onclick="simInited=false;simShips=[];simNextId=1;simActiveId=null;renderPE()" style="margin-left:auto;font-size:10px">↺ Recargar desde GS</button>
        <div style="font-size:9.5px;color:var(--txt3)">
          Distancias: Tabla Petroperú 1996 · ${fmtDate(currentDate)}
        </div>
      </div>
      <div class="sim-body">
        <div class="sim-fleet">
          <div class="sim-fleet-hdr">Flota (${simShips.length})</div>
          ${fleetHTML}
        </div>
        <div class="sim-editor">${editorHTML}</div>
        <div class="sim-summary">${summaryHTML}</div>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  fetchData();
});
</script>
</body>
</html>
