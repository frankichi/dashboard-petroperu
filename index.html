<script>
// ════════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ════════════════════════════════════════════════════════════════════════════
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbxuoIgzALYvk5TJvGAAWP-w3CNQbQEZXX5SJXpVJppUREyaVFEM2UChItuDWcJ9O1nJLQ/exec',
  COB_RED: 3,  // Crítico
  COB_AMB: 5,  // Advertencia
  COB_YEL: 7   // Precaución
};

// ════════════════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ════════════════════════════════════════════════════════════════════════════

// Product display order (corporate standard)

// Standardized traffic light colors
const COB_COLORS = {
  CRIT:  {bg:'#dc2626', text:'#fff', light:'#dc262618', border:'#dc262644'}, // <4d
  WARN:  {bg:'#d97706', text:'#fff', light:'#d9770618', border:'#d9770644'}, // 4-6d  
  ATT:   {bg:'#ca8a04', text:'#fff', light:'#ca8a0418', border:'#ca8a0444'}, // 7-12d
  OK:    {bg:'#16a34a', text:'#fff', light:'#16a34a14', border:'#16a34a33'}, // >=13d
  ZERO:  {bg:'#dc2626', text:'#fff', light:'#dc262622', border:'#dc262655'}  // 0d
};
function cobColorStd(cob) {
  if (!cob || cob <= 0) return COB_COLORS.ZERO;
  if (cob < 4) return COB_COLORS.CRIT;
  if (cob < 7) return COB_COLORS.WARN;
  if (cob < 13) return COB_COLORS.ATT;
  return COB_COLORS.OK;
}
const PROD_ORDER = ['Diesel','G. Regular','G. Premium','G. 84','TA1','GLP','Turbo','ULSD Expo','G. Regular HS'];
function prodSortKey(p) { var i = PROD_ORDER.indexOf(p); return i >= 0 ? i : 99; }
let RAW = [];
let DATES = [];
let currentDate = null;
let pronSheet = {};  // planta|producto → MBDC from pronostico sheet

// ════════════════════════════════════════════════════════════════════════════
// CONNECTION STATUS
// ════════════════════════════════════════════════════════════════════════════
function setGsStatus(state, text) {
  const badge = document.getElementById('gsBadge');
  const dot   = document.getElementById('gsStatusDot');
  const txt   = document.getElementById('gsStatusText');
  if (!badge) return;
  badge.className = 'gs-badge ' + state;
  txt.textContent = text;
}

// ════════════════════════════════════════════════════════════════════════════
// DATE PICKER — GLOBAL CALENDAR CONTROL
// Todas las páginas comparten el mismo currentDate.
// El <input type="date"> solo permite fechas que existen en DATES.
// ════════════════════════════════════════════════════════════════════════════
function selectDate(fecha) {
  if (!DATES.includes(fecha)) return;
  currentDate = fecha;
  rerenderActivePage();
  syncAllDateBars();
}

function navDate(dir) {
  const idx = DATES.indexOf(currentDate);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= DATES.length) return;
  selectDate(DATES[newIdx]);
}

function onDateInputChange(val) {
  if (!val) return;
  if (DATES.includes(val)) { selectDate(val); return; }
  // Date not in data - show closest available and notify
  var earlier = DATES.filter(function(d) { return d <= val; }).pop();
  var later = DATES.find(function(d) { return d > val; });
  var closest = earlier || later;
  if (closest) {
    selectDate(closest);
    // Brief notification
    var badge = document.querySelector('.date-badge');
    if (badge) {
      badge.textContent = '\u26A0\uFE0F Sin datos para ' + val + ' \u2192 mostrando ' + closest;
      setTimeout(function() { syncAllDateBars(); }, 3000);
    }
  }
}

function buildDateBar(containerId) {
  if (!DATES.length) return '';
  const curIdx = DATES.indexOf(currentDate);
  const prevDisabled = curIdx <= 0 ? 'disabled' : '';
  const nextDisabled = curIdx >= DATES.length - 1 ? 'disabled' : '';
  const minDate = DATES[0];
  const maxDate = DATES[DATES.length - 1];
  const curLabel = currentDate
    ? new Date(currentDate + 'T12:00:00').toLocaleDateString('es-PE', {weekday:'short', day:'2-digit', month:'short', year:'numeric'})
    : '—';

  return `
    <div class="date-bar" id="${containerId}">
      <span class="f-label">📅 Fecha</span>
      <div class="date-picker-wrap">
        <button class="date-nav-btn" onclick="navDate(-1)" ${prevDisabled} title="Día anterior">‹</button>
        <input type="date"
          class="date-input"
          id="dateInput_${containerId}"
          value="${currentDate || ''}"
          onchange="onDateInputChange(this.value)"
          title="Seleccionar fecha">
        <button class="date-nav-btn" onclick="navDate(1)" ${nextDisabled} title="Día siguiente">›</button>
      </div>
      <div class="date-badge">📊 ${curLabel}</div>
      <span class="date-count">${DATES.length} fechas disponibles</span>
    </div>
  `;
}

function syncAllDateBars() {
  // Update all existing date bars without full re-render
  ['dateBarP1','dateBarP2','dateBarPA','dateBarPB','dateBarPC','dateBarPD'].forEach(id => {
    const input = document.getElementById('dateInput_' + id);
    if (input) input.value = currentDate || '';
    const bar = document.getElementById(id);
    if (!bar) return;
    // Update nav buttons disabled state
    const curIdx = DATES.indexOf(currentDate);
    const btns = bar.querySelectorAll('.date-nav-btn');
    if (btns[0]) btns[0].disabled = curIdx <= 0;
    if (btns[1]) btns[1].disabled = curIdx >= DATES.length - 1;
    // Update badge label
    const badge = bar.querySelector('.date-badge');
    if (badge) {
      const curLabel = currentDate
        ? new Date(currentDate + 'T12:00:00').toLocaleDateString('es-PE', {weekday:'short', day:'2-digit', month:'short', year:'numeric'})
        : '—';
      badge.textContent = '📊 ' + curLabel;
    }
  });
}

function rerenderActivePage() {
  const activePage = document.querySelector('.page.active');
  if (!activePage) return;
  switch(activePage.id) {
    case 'p1': renderP1(); break;
    case 'p2': renderP2(); break;
    case 'p5': renderP5(); break;
    case 'p6': renderP6(); break;
    case 'p10': renderP10(); break;
    case 'pA': renderPA(); break;
    case 'pB': renderPB(); break;
    case 'pC': renderPC(); break;
    case 'pD': renderPD(); break;
    case 'pE': renderPE(); break;
    case 'pUpload': renderPUpload(); break;
  }
}

// Keep backward compat alias
function buildAllDateBars() { syncAllDateBars(); }

// ════════════════════════════════════════════════════════════════════════════
// API FETCH
// ════════════════════════════════════════════════════════════════════════════
async function fetchData(forceRefresh) {
  setGsStatus('connecting', 'Conectando...');
  try {
    var url = CONFIG.API_URL;
    if (forceRefresh) url += (url.indexOf('?') >= 0 ? '&' : '?') + 'nocache=1';
    const response = await fetch(url, {
      method: 'GET',
      redirect: 'follow'
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const raw = await response.json();
    // Handle envelope format: {inventario: [...], pronExtra: [...]}
    var data, pronExtra = [];
    if (raw && raw.inventario) {
      data = raw.inventario;
      pronExtra = raw.pronExtra || [];
    } else if (Array.isArray(raw)) {
      data = raw;
    } else {
      data = [];
    }
    console.log('[API] Datos recibidos:', data.length, 'registros');
    
    // Load pronóstico from pron_mes field embedded by GS
    pronSheet = {};
    data.forEach(function(r) {
      if (r.pron_mes > 0) {
        pronSheet[r.planta + '|' + r.producto] = r.pron_mes;
      }
    });
    pronExtra.forEach(function(p) {
      if (p.pron_mes > 0) {
        pronSheet[p.planta + '|' + p.producto] = p.pron_mes;
      }
    });
    console.log('[API] Pronóstico mensual:', Object.keys(pronSheet).length, 'registros');
    
    // Procesar datos
    RAW = data;
    DATES = [...new Set(RAW.map(r => r.fecha))].filter(Boolean).sort();
    currentDate = DATES[DATES.length - 1] || '';
    
    // Update UI
    document.getElementById('loadingOverlay').style.display = 'none';
    
    if (!data.length || !currentDate) {
      setGsStatus('connected', 'Google Sheets · Sin datos');
      var emptyEl = document.getElementById('pResumen-content');
      if (emptyEl) emptyEl.innerHTML = '<div style="padding:60px;text-align:center">'
        + '<div style="font-size:48px;margin-bottom:16px">\uD83D\uDCCA</div>'
        + '<div style="font-size:18px;font-weight:700;color:var(--txt);margin-bottom:8px">Sin datos en Google Sheets</div>'
        + '<div style="font-size:13px;color:var(--txt2);max-width:400px;margin:0 auto">Ve a <b>Carga Datos</b> y sube el <b>E&D</b> y la <b>Cobertura-An\u00e1lisis</b></div></div>';
      return;
    }
    
    const lastLabel = new Date(currentDate + 'T12:00:00').toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'});
    setGsStatus('connected', `Google Sheets · ${lastLabel}`);
    
    // Render initial page
    renderP1();
    
  } catch (error) {
    console.error('[API] Error:', error);
    setGsStatus('error', 'Sin conexión');
    document.getElementById('loadingOverlay').innerHTML = `
      <div class="error-box">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Error de Conexión</div>
        <div class="error-msg">${error.message}</div>
        <button class="btn-retry" onclick="location.reload()">🔄 Reintentar</button>
      </div>
    `;
  }
}
function fmt(n, d=1) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('es-PE', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function fmtDate(d) {
  if (!d) return '—';
  const date = new Date(d + 'T12:00:00');
  return date.toLocaleDateString('es-PE', {day:'2-digit', month:'short'});
}

function semClass(cob) {
  if (cob <= 0) return 's0';
  if (cob < CONFIG.COB_RED) return 's1';
  if (cob < CONFIG.COB_AMB) return 's2';
  if (cob < CONFIG.COB_YEL) return 's3';
  return 's4';
}

function prodColor(cob) {
  if (cob < CONFIG.COB_RED) return 'red';
  if (cob < CONFIG.COB_AMB) return 'amber';
  return 'green';
}

function byDate(fecha) {
  return RAW.filter(r => r.fecha === fecha);
}

function byLatest() {
  return byDate(currentDate || DATES[DATES.length - 1] || '');
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ════════════════════════════════════════════════════════════════════════════
// THEME TOGGLE
// ════════════════════════════════════════════════════════════════════════════
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('theme-lbl').textContent = isLight ? 'Oscuro' : 'Claro';
  localStorage.setItem('petroperu-theme', isLight ? 'light' : 'dark');
  // Actualizar gráficos si existen
  renderCharts();
}

function initTheme() {
  const saved = localStorage.getItem('petroperu-theme');
  if (saved === 'dark') {
    // User explicitly chose dark
    document.getElementById('theme-lbl').textContent = 'Claro';
  } else {
    // Default: light mode
    document.body.classList.add('light');
    document.getElementById('theme-lbl').textContent = 'Oscuro';
  }
}

// ════════════════════════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ════════════════════════════════════════════════════════════════════════════
function showPage(id, tab) {
  // Hide all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  // Show selected page
  document.getElementById(id).classList.add('active');
  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (tab) tab.classList.add('active');
  
  // Render page content
  switch(id) {
    case 'p1': renderP1(); break;
    case 'p2': renderP2(); break;
    case 'p5': renderP5(); break;
    case 'p6': renderP6(); break;
    case 'p10': renderP10(); break;
    case 'pA': renderPA(); break;
    case 'pB': renderPB(); break;
    case 'pC': renderPC(); break;
    case 'pD': renderPD(); break;
    case 'pE': renderPE(); break;
    case 'pUpload': renderPUpload(); break;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// PAGE RENDERS
// ════════════════════════════════════════════════════════════════════════════

// P1: RESUMEN NACIONAL
// activeFilter: producto seleccionado para tabla de restricciones (null = todos)
let activeFilter = null;

function filterByProd(prod) {
  activeFilter = (activeFilter === prod) ? null : prod;
  renderP1();
}

function renderP1() {
  const today = byLatest();
  const prev  = byDate(DATES[DATES.indexOf(currentDate) - 1] || '');
  if (!today.length) return;

  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  // Diesel excluye Pucallpa e Iquitos del inventario
  const DIESEL_EXCL_INV = ['Pucallpa','Iquitos'];

  const active = today.filter(r => !EXCLUIR.some(x => r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));

  const COB_CRIT = 4;
  const COB_WARN = 7;

  const critList     = active.filter(r => r.cob > 0 && r.cob < COB_CRIT);
  const warnList     = active.filter(r => r.cob >= COB_CRIT && r.cob < COB_WARN);
  const okList       = active.filter(r => r.cob >= COB_WARN);
  const restrictList = active.filter(r => {
    var pron = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
    var vfact = r.vfact || 0;
    return vfact > 0 && pron > 0 && vfact < pron && r.producto !== 'TA1' && r.producto !== 'GLP';
  });

  const PRON_PLANTAS = {
    'Diesel':     ['Talara','Eten','Salaverry','Chimbote','Supe','Callao','Conchán','Pisco','Mollendo','Ilo'],
    'G. Regular': ['Talara','Eten','Salaverry','Chimbote','Supe','Callao','Conchán','Pisco','Mollendo','Pucallpa','Iquitos'],
    'G. Premium': ['Talara','Salaverry','Supe','Callao','Conchán','Pisco','Mollendo'],
    'G. 84':      ['Talara','Yurimaguas','Iquitos'],
    'TA1':        ['Talara','Callao','Iquitos'],
    'GLP':        ['Talara'],
  }

  // ── Build product aggregates ──────────────────────────────────────────────
  const byProd = {};
  active.forEach(r => {
    // For Diesel: exclude Pucallpa & Iquitos from inventory count
    const skipInv = r.producto === 'Diesel' && DIESEL_EXCL_INV.includes(r.planta);
    if (!byProd[r.producto]) byProd[r.producto] = {inv:0, cob:[], vreal:0, vult7:0, pron:0, volRep:0, volRep2:0, plantas:[]};
    const p = byProd[r.producto];
    if (!skipInv) p.inv += r.inv || 0;
    p.vreal += r.vreal || 0;
    p.vult7 += r.vult7 || 0;
    p.volRep  += r.vol_rep     || 0;
    p.volRep2 += r.vol_rep_bt2 || 0;
    if (r.cob > 0) p.cob.push(r.cob);
    p.plantas.push(r);
    const pv = PRON_PLANTAS[r.producto];
    if (pv && pv.includes(r.planta)) p.pron += pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
  });

  // ── Previous-day cabotaje per product ────────────────────────────────────
  const prevVolRep = {};
  prev.forEach(r => {
    if (!prevVolRep[r.producto]) prevVolRep[r.producto] = 0;
    prevVolRep[r.producto] += (r.vol_rep||0) + (r.vol_rep_bt2||0);
  });

  function fmtMB(n) {
    if (!n && n !== 0) return '—';
    return n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' MB';
  }
  function fmtMB2(n) { // no suffix, just number
    if (!n && n !== 0) return '—';
    return n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  // ── Alert table rows per product ─────────────────────────────────────────
  function getAlertRows(rows) {
    const alerts = [];
    rows.forEach(r => {
      if (r.cob > 0 && r.cob < COB_CRIT)
        alerts.push({planta:r.planta, tipo:'CRÍTICO', cls:'t-crit', rowcls:'alert-row-crit', cob:r.cob+'d', r});
      else if (r.cob >= COB_CRIT && r.cob < COB_WARN)
        alerts.push({planta:r.planta, tipo:'VIGILANCIA', cls:'t-warn', rowcls:'alert-row-warn', cob:r.cob+'d', r});
      else {
        var alertPron = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
        if ((r.vfact||0) > 0 && alertPron > 0 && (r.vfact||0) < alertPron && r.producto !== 'TA1' && r.producto !== 'GLP')
          alerts.push({planta:r.planta, tipo:'RESTRICCIÓN', cls:'t-restr', rowcls:'alert-row-restrict', cob:r.cob > 0 ? r.cob+'d' : '—', r});
      }
    });
    if (!alerts.length) return `<tr><td colspan="3" class="prod-alerts-empty">✓ Sin alertas</td></tr>`;
    return alerts.map(a => `
      <tr class="${a.rowcls}">
        <td><span class="alert-planta">${a.planta}</span></td>
        <td><span class="alert-tipo ${a.cls}">${a.tipo}</span></td>
        <td><span class="alert-cob">${a.cob}</span></td>
      </tr>`).join('');
  }

  // ── Product cards ─────────────────────────────────────────────────────────
  const prodCards = Object.entries(byProd).sort((a,b) => prodSortKey(a[0]) - prodSortKey(b[0])).map(([prod, data]) => {
    const cobAvg = data.cob.length ? data.cob.reduce((a,b)=>a+b,0)/data.cob.length : 0;
    const color = prodColor(cobAvg);
    const invMB = fmtMB2(data.inv);
    const prevVol = prevVolRep[prod] || 0;
    const currVol = (data.volRep||0) + (data.volRep2||0);
    const delta   = prevVol > 0 ? ((currVol - prevVol) / prevVol * 100) : null;
    const deltaClass = delta === null ? 'flat' : delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
    const deltaIcon  = delta === null ? '' : delta > 0 ? '▲' : delta < 0 ? '▼' : '—';
    const deltaStr   = delta === null ? '' : Math.abs(delta).toFixed(1) + '%';
    const isSelected = activeFilter === prod;

    return `
      <div class="prod-card ${color}${isSelected ? ' selected' : ''}" onclick="filterByProd('${prod.replace(/'/g,'\\\'')}')" title="Clic para filtrar restricciones">
        <div class="prod-card-top">
          <div class="prod-card-name">${prod}</div>
          <div class="prod-cabotaje">
            <div>
              <span class="prod-inv-val">${invMB}</span>
              <span class="prod-inv-unit">MB</span>
            </div>
            <div class="prod-cabotaje-sub">🚢 ${fmtMB(currVol)} en cabotaje</div>
            ${delta !== null ? `<div class="prod-cabotaje-delta ${deltaClass}">${deltaIcon} ${deltaStr} <span style="font-size:9px;opacity:.6">vs ayer</span></div>` : ''}
          </div>
          <span class="prod-filter-hint">clic para filtrar ▼</span>
        </div>
        <div class="prod-card-metrics" style="grid-template-columns:1fr 1fr 1fr">
          <div class="prod-metric">
            <div class="prod-metric-lbl">Venta Real</div>
            <div class="prod-metric-val">${fmtMB(data.vreal)}</div>
          </div>
          <div class="prod-metric">
            <div class="prod-metric-lbl">Venta Últ 7d</div>
            <div class="prod-metric-val">${fmtMB(data.vult7)}</div>
          </div>
          <div class="prod-metric">
            <div class="prod-metric-lbl">Pronóstico</div>
            <div class="prod-metric-val" style="color:var(--acc2)">${data.pron > 0 ? fmtMB(data.pron) : '—'}</div>
          </div>
        </div>
        ${(() => {
          const c1 = data.plantas.filter(r=>r.cob>0&&r.cob<COB_CRIT).length;
          const c2 = data.plantas.filter(r=>r.cob>=COB_CRIT&&r.cob<COB_WARN).length;
          const c3 = data.plantas.filter(r=>{var pr=pronSheet[r.planta+'|'+r.producto]||r.pron_mes||r.pron||0;return (r.vfact||0)>0&&pr>0&&(r.vfact||0)<pr&&r.producto!=='TA1'&&r.producto!=='GLP';}).length;
          const total = c1+c2+c3;
          if(!total) return '<div class="card-status-bar ok"><span>✓ Operación normal</span></div>';
          const parts = [];
          if(c1) parts.push(`<span class="cs-pill crit">${c1} crítica${c1>1?'s':''}</span>`);
          if(c2) parts.push(`<span class="cs-pill warn">${c2} vigilancia</span>`);
          if(c3) parts.push(`<span class="cs-pill restr">${c3} restricción${c3>1?'es':''}</span>`);
          return '<div class="card-status-bar alert">'+parts.join('')+'</div>';
        })()}
      </div>`;
  }).join('');

  // ── Restricciones table ───────────────────────────────────────────────────
  function buildRestrTable() {
    const allRestr = active.filter(r => {
      var pr = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
      return (r.vfact||0) > 0 && pr > 0 && (r.vfact||0) < pr && r.producto !== 'TA1' && r.producto !== 'GLP';
    });
    const filtered = activeFilter ? allRestr.filter(r => r.producto === activeFilter) : allRestr;

    if (!filtered.length) return `<div class="no-restr">✓ Sin restricciones activas${activeFilter ? ' para '+activeFilter : ''}</div>`;

    // ── Helpers de cobertura ────────────────────────────────────────────────
    // FÓRMULAS VALIDADAS:
    //   cob_normal  = r.cob (calculado en Google Sheets: inv / dem_prom diario)
    //   cob_restr   = cob_normal × (pron / vfact)   [ambos en misma unidad MBDC]
    //                 equivalente a: inv / vfact_rate = inv/pron_rate × pron/vfact
    //   dias_ganados = floor(cob_restr) − cob_normal
    //   nueva_fecha  = currentDate + cob_restr días (redondeado)
    // Verificación imagen: Eten Diesel cob_normal=1d, pron=2.15, vfact=1.10
    //   cob_restr = 1 × (2.15/1.10) ≈ 1.95 → 2d ✓
    // Conchán Diesel cob_normal=6d, pron=7.48, vfact=6.00
    //   cob_restr = 6 × (7.48/6.00) ≈ 7.48 → 7d ✓

    function calcCobRestr(cobNorm, pron, vfact) {
      if (!vfact || vfact <= 0 || !pron || pron <= 0) return cobNorm;
      return cobNorm * (pron / vfact);
    }

    function addDays(dateStr, days) {
      if (!dateStr || !days) return '';
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + Math.round(days));
      return d.toISOString().slice(0,10);
    }

    function fmtDateShort(d) {
      if (!d) return '—';
      const dt = new Date(d + 'T12:00:00');
      return dt.toLocaleDateString('es-PE', {day:'2-digit', month:'short'});
    }

    const byPlanta = {};
    filtered.forEach(r => {
      if (!byPlanta[r.planta]) byPlanta[r.planta] = [];
      byPlanta[r.planta].push(r);
    });

    const nRestr    = filtered.length;
    const nPlantas  = Object.keys(byPlanta).length;
    const productos = [...new Set(filtered.map(r=>r.producto))].length;

    // Calcular stats correctas
    const reducciones   = filtered.map(r => {
      var pr = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
      return pr > 0 ? (pr - (r.vfact||0)) / pr * 100 : 0;
    });
    const redProm       = reducciones.length ? reducciones.reduce((a,b)=>a+b,0)/reducciones.length : 0;
    const diasGanadosList = filtered.map(r => {
      var pr = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || 0;
      const cr = calcCobRestr(r.cob||0, pr, r.vfact||0);
      return Math.max(0, Math.floor(cr) - (r.cob||0));
    });
    const maxDiasGanados = Math.max(...diasGanadosList, 0);
    const promDiasGanados = diasGanadosList.length
      ? (diasGanadosList.reduce((a,b)=>a+b,0)/diasGanadosList.length).toFixed(1)
      : 0;

    const maxPron = Math.max(...filtered.map(r=>pronSheet[r.planta+'|'+r.producto]||r.pron_mes||r.pron||0), 1);

    const plantaBlocks = Object.entries(byPlanta)
      .sort((a,b) => {
        // Sort by fixed plant order (as in operational Excel)
        const ORDER = ['Talara','Piura','Eten','Salaverry','Chimbote','Supe','Callao',
          'Conchán','Pisco','Mollendo','Ilo','Juliaca','Cusco','Pucallpa',
          'Tarapoto','Yurimaguas','El Milagro','Iquitos'];
        const ia = ORDER.indexOf(a[0]);
        const ib = ORDER.indexOf(b[0]);
        if (ia === -1 && ib === -1) return a[0].localeCompare(b[0]);
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      })
      .map(([planta, rows]) => {
        const maxDG = Math.max(...rows.map(r =>
          Math.floor(calcCobRestr(r.cob||0,pronSheet[r.planta+'|'+r.producto]||r.pron_mes||r.pron||0,r.vfact||0)) - (r.cob||0)), 0);

        const tRows = rows.map(r => {
          const pron    = pronSheet[r.planta+'|'+r.producto] || r.pron_mes || r.pron || 0;
          const vfact   = r.vfact || 0;
          const cobNorm = r.cob   || 0;
          const cobRestrRaw = calcCobRestr(cobNorm, pron, vfact);
          const cobRestr    = Math.floor(cobRestrRaw);
          const diasGanados = Math.max(0, cobRestr - cobNorm);
          const redPct      = pron > 0 ? ((pron - vfact) / pron * 100) : 0;
          const pronPct     = Math.min(100, pron   / maxPron * 100);
          const vfactPct    = Math.min(100, vfact  / maxPron * 100);
          const invMBval    = (r.inv||0).toFixed(2);

          // Nueva fecha cobertura = currentDate + cobRestr días
          const nuevaFechaStr = addDays(currentDate, cobRestr);
          const nuevaFechaFmt = fmtDateShort(nuevaFechaStr);

          // BT info
          const btInfo = r.bt
            ? `<div style="color:var(--acc2);font-weight:700;font-size:10.5px">${r.bt}</div>
               <div style="font-size:9px;color:var(--txt3)">ETA ${fmtDate(r.fecha_reposicion||'')}</div>`
            : '<span style="color:var(--txt3);font-size:10px">—</span>';

          const diasBadge = diasGanados > 0
            ? `<span class="dias-ganados">+${diasGanados}d</span>`
            : `<span style="color:var(--txt3);font-size:10px">—</span>`;

          return `<tr>
            <td class="tp" style="font-size:11.5px">${r.producto}</td>
            <td style="font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--txt)">${invMBval}</td>
            <td>
              <div class="bar-wrap">
                <div class="bar-row">
                  <div class="bar-bg"><div class="bar-fill pron" style="width:${pronPct}%"></div></div>
                  <span class="bar-val">${pron.toFixed(2)}</span>
                </div>
                <div class="bar-row">
                  <div class="bar-bg"><div class="bar-fill vfact" style="width:${vfactPct}%"></div></div>
                  <span class="bar-val" style="color:var(--ora)">${vfact.toFixed(2)}</span>
                </div>
              </div>
            </td>
            <td><span class="restr-pct">-${redPct.toFixed(1)}%</span></td>
            <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center">${cobNorm}d</td>
            <td style="color:var(--txt3);font-size:13px;text-align:center">→</td>
            <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;color:var(--acc2)">${cobRestr}d</td>
            <td style="text-align:center">${diasBadge}</td>
            <td><span class="nueva-fecha">${nuevaFechaFmt}</span></td>
            <td>${btInfo}</td>
          </tr>`;
        }).join('');

        return `
          <div class="restr-planta-block">
            <div class="restr-planta-hdr">
              <div class="restr-planta-name">${planta}</div>
              <span class="restr-planta-badge">${rows.length} producto${rows.length>1?'s':''}</span>
              ${maxDG>0?`<span class="restr-dias-badge">+${maxDG}d ganados</span>`:''}
            </div>
            <div class="restr-table-wrap">
              <table class="restr-table">
                <thead><tr>
                  <th>Producto</th>
                  <th style="text-align:right">Inv (MB)</th>
                  <th>Pron vs VFact (MB/d)</th>
                  <th>Reduc.</th>
                  <th style="text-align:center">Cob. Normal</th>
                  <th></th>
                  <th style="text-align:center">Cob. Restricción</th>
                  <th style="text-align:center">Días Ganados</th>
                  <th>Nueva Fecha Cob.</th>
                  <th>Reposición BT</th>
                </tr></thead>
                <tbody>${tRows}</tbody>
              </table>
            </div>
          </div>`;
      }).join('');

    return `
      <div class="restr-tooltip">
        <strong>¿Qué es una restricción?</strong> Cuando la <strong>Venta Factible (VFact)</strong> se reduce por debajo del pronóstico, el inventario "dura más". Esto extiende la cobertura hasta que llegue la reposición.
        <br><span style="font-size:9.5px;color:var(--txt3);margin-top:3px;display:block">
          Cob. Normal = inv ÷ dem. pronóstico · Cob. con Restricción = Cob. Normal × (Pron ÷ VFact) · Nueva fecha = hoy + Cob. Restricción
        </span>
      </div>
      <div class="restr-stats">
        <div class="restr-stat" style="cursor:pointer" data-restr="restricciones" title="Ver detalle"><div class="restr-stat-lbl">Restricciones</div><div class="restr-stat-val">${nRestr}</div><div class="restr-stat-sub">activas hoy</div></div>
        <div class="restr-stat" style="cursor:pointer" data-restr="plantas" title="Ver plantas"><div class="restr-stat-lbl">Plantas</div><div class="restr-stat-val">${nPlantas}</div><div class="restr-stat-sub">afectadas</div></div>
        <div class="restr-stat" style="cursor:pointer" data-restr="reduccion" title="Ver impacto"><div class="restr-stat-lbl">Reduc. Promedio</div><div class="restr-stat-val" style="font-size:20px">${redProm.toFixed(1)}%</div><div class="restr-stat-sub">vs pronóstico</div></div>
        <div class="restr-stat" style="cursor:pointer" data-restr="dias" title="Ver ganancia"><div class="restr-stat-lbl">Días Ganados Prom.</div><div class="restr-stat-val" style="color:#a855f7">${promDiasGanados}d</div><div class="restr-stat-sub">por restricción</div></div>
      </div>
      <div class="restr-legend">
        <span>LEYENDA:</span>
        <span class="legend-item"><span class="legend-line pron"></span> Pronóstico (MBDC)</span>
        <span class="legend-item"><span class="legend-line vfact"></span> V. Factible — menor</span>
        <span class="legend-item"><span class="legend-dot"></span> Días ganados con restricción</span>
      </div>
      <div style="margin-bottom:10px;font-size:10.5px;color:var(--txt3)">
        Detalle por Planta — ordenadas por días ganados ↓
      </div>
      ${plantaBlocks}`;
  }

  const restrFilterLabel = activeFilter
    ? `<span>🔍 ${activeFilter}</span> <span style="font-size:10px;opacity:.7">× limpiar</span>`
    : `<span>Todos los productos</span>`;

  document.getElementById('p1-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">🏠 Resumen Nacional</div>
      <div class="page-header-subtitle">Estado consolidado de inventarios al ${fmtDate(currentDate)}</div>
    </div>
    ${buildDateBar('dateBarP1')}
    <div class="alert-kpi-row">
      <div class="alert-kpi crit">
        <div class="alert-kpi-label">🚨 Alertas Críticas &lt;${COB_CRIT} Días</div>
        <div class="alert-kpi-value">${critList.length}</div>
        <div class="alert-kpi-sub">planta/producto con acción inmediata</div>
        <div class="alert-kpi-action">Priorizar despacho / restricción</div>
      </div>
      <div class="alert-kpi warn">
        <div class="alert-kpi-label">⚠️ En Vigilancia ${COB_CRIT}–${COB_WARN-1} Días</div>
        <div class="alert-kpi-value">${warnList.length}</div>
        <div class="alert-kpi-sub">seguimiento corto plazo</div>
        <div class="alert-kpi-action">Programar reposición</div>
      </div>
      <div class="alert-kpi ok">
        <div class="alert-kpi-label">✅ Nivel Normal ≥${COB_WARN} Días</div>
        <div class="alert-kpi-value">${okList.length}</div>
        <div class="alert-kpi-sub">sin acción inmediata</div>
        <div class="alert-kpi-action">Cobertura operativa estable</div>
      </div>
      <div class="alert-kpi restrict">
        <div class="alert-kpi-label">🔒 Restricción Activa</div>
        <div class="alert-kpi-value">${restrictList.length}</div>
        <div class="alert-kpi-sub">vfac &lt; pron</div>
        <div class="alert-kpi-action">filas con racionamiento operativo</div>
      </div>
    </div>

    <div class="section-head" style="margin-top:14px">
      Inventario por Producto
      <span style="margin-left:auto;font-size:9px;color:var(--txt3);font-weight:500;text-transform:none;letter-spacing:0">Clic en una tarjeta para filtrar restricciones</span>
    </div>
    <div class="prod-cards-grid">${prodCards}</div>

    <div class="restr-section">
      <div class="restr-header">
        <div>
          <div class="restr-title">✂️ Restricciones de Venta</div>
          <div class="restr-subtitle">Plantas donde Venta Factible &lt; Pronóstico · ${restrictList.length} productos con restricción activa · ${fmtDate(currentDate)}</div>
        </div>
        <div class="restr-filter-badge ${activeFilter ? '' : 'all'}" onclick="filterByProd(activeFilter || '__none__')">
          ${restrFilterLabel}
        </div>
      </div>
      ${buildRestrTable()}
    </div>

    ${(()=>{
      /* ── BT REPOSICIONES en Resumen ─────────────────────────────────── */
      const withBT = today.filter(r => r.bt && r.bt !== '' && r.bt !== '-');
      const btMap = {};
      withBT.forEach(r => {
        if (!btMap[r.bt]) btMap[r.bt] = {
          nombre:r.bt, origen:r.planta, zarpe:'', retorno:'',
          destinos:[], volTotal:0,
          productos:{}
        };
        const b = btMap[r.bt];
        // Volúmenes en MB (÷ 1000 desde barriles)
        const vol1 = r.vol_rep     || 0;
        const vol2 = r.vol_rep_bt2 || 0;
        if (vol1 > 0) {
          b.destinos.push({planta:r.planta, producto:r.producto, vol:vol1, eta:r.fecha_reposicion||''});
          b.volTotal += vol1;
          if (!b.productos[r.producto]) b.productos[r.producto]=0;
          b.productos[r.producto] += vol1;
        }
        if (vol2 > 0) {
          b.destinos.push({planta:r.planta, producto:r.producto+' (BT2)', vol:vol2, eta:r.fecha_repos_bt2||''});
          b.volTotal += vol2;
          if (!b.productos[r.producto]) b.productos[r.producto]=0;
          b.productos[r.producto] += vol2;
        }
      });
      if (!Object.keys(btMap).length) return '';
      const cards = Object.values(btMap).map(bt => {
        const prodPills = Object.entries(bt.productos)
          .map(([p,v])=>`<span class="bt-prod-pill">${p} <strong>${v.toFixed(1)} MB</strong></span>`)
          .join('');
        // Group destinos by planta
        const destMap = {};
        bt.destinos.forEach(d=>{
          if (!destMap[d.planta]) destMap[d.planta]={eta:d.eta, prods:[]};
          destMap[d.planta].prods.push({prod:d.producto,vol:d.vol});
        });
        const destCards = Object.entries(destMap).map(([planta,dd])=>{
          const prodPillsD = dd.prods.map(p=>`<span class="bt-dest-prod">${p.prod} ${p.vol.toFixed(1)} MB</span>`).join('');
          const volD = dd.prods.reduce((s,p)=>s+p.vol,0);
          return `<div class="bt-dest-row">
            <div class="bt-dest-left">
              <span class="bt-dest-check">✓</span>
              <span class="bt-dest-planta">${planta}</span>
              <span class="bt-dest-fecha">${dd.eta?fmtDate(dd.eta):''}</span>
            </div>
            <div class="bt-dest-vol">${volD.toFixed(1)} MB <span class="bt-dest-status">PROGRAMADO</span></div>
            <div class="bt-dest-prods">${prodPillsD}</div>
          </div>`;
        }).join('');
        return `<div class="bt-card-new">
          <div class="bt-card-new-header">
            <div class="bt-card-new-icon">BT</div>
            <div class="bt-card-new-info">
              <div class="bt-card-new-name">${bt.nombre}</div>
              <div class="bt-card-new-sub">Origen: ${bt.origen||'—'}</div>
            </div>
            <div class="bt-card-new-vol">
              <div>${bt.volTotal.toFixed(1)} MB</div>
              <div style="font-size:9px;color:var(--txt3);font-weight:500">carga total</div>
            </div>
          </div>
          <div class="bt-card-new-prods"><span style="font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-right:6px">Carga:</span>${prodPills}</div>
          <div class="bt-dest-section">
            <div class="bt-dest-section-title">Ruta de Escalas — Descarga por Terminal</div>
            ${destCards}
          </div>
        </div>`;
      }).join('');
      return `<div class="section-head" style="margin-top:18px">⚓ Reposiciones BT Programadas</div>
        <div class="bt-new-grid">${cards}</div>`;
    })()}
  `;
}

// P2: COBERTURAS
// ── Coberturas state v4 ──
let cobOverrides = {};
let cobPronOverrides = {};
let cobInvOverrides = {};
let cobPronPanelOpen = false;
let cobCollapsed = {};

function cobSafeId(planta, producto) { return (planta + '_' + producto).replace(/[^a-zA-Z0-9_]/g, '_'); }

function cobCalcDays(inv, vfact) {
  if (!vfact || vfact <= 0 || !inv || inv <= 0) return 0;
  return Math.round(inv / vfact);
}
function cobCalcFecha(baseDate, days) {
  if (!baseDate || !days || days <= 0) return '';
  var d = new Date(baseDate + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function cobGetPron(r) {
  var key = r.planta + '|' + r.producto;
  if (cobPronOverrides[key] !== undefined) return cobPronOverrides[key];
  // Priority: pronSheet (hoja pronostico) > r.pron (Cobertura) > r.dem_prom (E&D)
  if (pronSheet[key] > 0) return pronSheet[key];
  if (r.pron && r.pron > 0) return r.pron;
  return r.dem_prom || 0;
}

function cobGetVfact(r) {
  var key = r.planta + '|' + r.producto;
  if (cobOverrides[key]) return cobOverrides[key].vfact;
  // Use vfact from Cobertura data; if missing, use pronóstico for coverage calc
  if (r.vfact && r.vfact > 0) return r.vfact;
  // Fallback to pronóstico only for coverage calculation (not displayed as vfact)
  var pron = cobGetPron(r);
  return pron > 0 ? pron : 0;
}

function cobGetInv(r) {
  var key = r.planta + '|' + r.producto;
  if (cobInvOverrides[key] !== undefined) return cobInvOverrides[key];
  return r.inv || 0;
}

function cobOnInvChange(planta, producto, valMb) {
  var numVal = parseFloat(valMb);
  if (isNaN(numVal) || numVal < 0) return;
  cobInvOverrides[planta + '|' + producto] = numVal;
  // Recalculate using current vfact
  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (!r) return;
  var vfact = cobGetVfact(r);
  cobOnVfactChange(planta, producto, vfact); // Triggers full recalc
}

function cobOnVfactChange(planta, producto, valMbdc) {
  var numVal = parseFloat(valMbdc);
  if (isNaN(numVal) || numVal < 0) return;
  var vfBbl = numVal;  // Already MBDC
  cobOverrides[planta + '|' + producto] = { vfact: vfBbl };

  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (!r) return;

  var sid = cobSafeId(planta, producto);
  var refAdj = cobGetRefineryAdj(planta, producto);
  var invAdj = cobGetInv(r) + refAdj;
  var pronBbl = cobGetPron(r);
  var pronMbdc = pronBbl;
  var cob = cobCalcDays(invAdj, vfBbl);
  var fechaCob = cobCalcFecha(currentDate, cob);
  var reducPct = pronMbdc > 0 ? ((numVal - pronMbdc) / pronMbdc * 100) : 0;
  var reducColor = reducPct < -10 ? 'var(--red)' : reducPct < 0 ? '#d96b1a' : 'var(--grn)';
  var cobClass = cob <= 0 ? 'cob-cov-warn' : cob < CONFIG.COB_RED ? 'cob-cov-crit' : cob < CONFIG.COB_YEL ? 'cob-cov-warn' : 'cob-cov-ok';

  var el;
  el = document.getElementById('cob-reduc-' + sid);
  if (el) { el.style.color = reducColor; el.textContent = pronMbdc > 0 ? (reducPct > 0 ? '+' : '') + reducPct.toFixed(1) + '%' : '\u2014'; }
  el = document.getElementById('cob-days-' + sid);
  if (el) { el.className = 'cob-cov-cell ' + cobClass; el.textContent = cob > 0 ? cob + 'd' : '\u2014'; }
  el = document.getElementById('cob-fecha-' + sid);
  if (el) { el.textContent = fechaCob ? fmtDate(fechaCob) : '\u2014'; }

  // Recalc nueva fecha with BT data (from RAW + simulator)
  var totalBTVol = (r.vol_rep || 0) + (r.vol_rep_bt2 || 0);
  if (typeof simShips !== 'undefined' && simShips.length > 0) {
    simShips.forEach(function(ship) {
      ship.stops.forEach(function(stop) {
        if (stop.planta !== planta) return;
        var prods = stop.prods || [{producto: stop.producto, vol: stop.vol}];
        prods.forEach(function(pr) {
          var sp = (pr.producto || '').replace(/\(BT2\)/, '').trim();
          if (sp === producto) totalBTVol += pr.vol || 0;
        });
      });
    });
  }
  if (totalBTVol > 0 && vfBbl > 0) {
    var cobR2 = cobCalcDays(invAdj + totalBTVol, vfBbl);
    el = document.getElementById('cob-nfecha-' + sid);
    if (el) { var fc = cobCalcFecha(currentDate, cobR2); el.innerHTML = fc ? '<span style="color:var(--acc2);font-weight:700">' + fmtDate(fc) + '</span>' : '\u2014'; }
  }

  var row = document.getElementById('cob-row-' + sid);
  if (row) row.classList.add('cob-changed');

  // Show/hide \u2191P button by ID
  var upBtn = document.getElementById('cob-up-' + sid);
  if (upBtn) upBtn.style.display = (numVal < pronMbdc && pronMbdc > 0) ? 'inline-block' : 'none';

  var badge = document.getElementById('cob-save-badge');
  if (badge) badge.textContent = Object.keys(cobOverrides).length;
  var saveBtn = document.getElementById('cob-save-btn');
  if (saveBtn) saveBtn.style.display = 'inline-flex';
}

function cobSetPron(planta, producto) {
  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (!r) return;
  var pronBbl = cobGetPron(r);
  var pronMbdc = pronBbl;
  cobOverrides[planta + '|' + producto] = { vfact: pronBbl };
  var sid = cobSafeId(planta, producto);
  var row = document.getElementById('cob-row-' + sid);
  if (row) {
    var inp = row.querySelector('.cob-edit');
    if (inp) inp.value = pronMbdc.toFixed(2);
  }
  cobOnVfactChange(planta, producto, pronMbdc);
}

function cobTogglePlanta(planta) {
  var wasCollapsed = cobCollapsed[planta] !== false; // default is collapsed
  cobCollapsed[planta] = !wasCollapsed;
  var sp = planta.replace(/[^a-zA-Z0-9]/g, '_');
  var rows = document.querySelectorAll('.cob-data-' + sp);
  var hdr = document.getElementById('cob-ph-' + sp);
  rows.forEach(function(r) { r.classList.toggle('cob-hidden', !wasCollapsed); });
  if (hdr) hdr.classList.toggle('collapsed', !wasCollapsed);
}

function cobTogglePron() {
  cobPronPanelOpen = !cobPronPanelOpen;
  var p = document.getElementById('cob-pron-panel');
  if (p) p.classList.toggle('open', cobPronPanelOpen);
}

function cobResetOverrides() {
  cobOverrides = {};
  cobPronOverrides = {};
  cobInvOverrides = {};
  renderP2();
}

function cobApplyPron() {
  var inputs = document.querySelectorAll('.cob-pron-grid input');
  inputs.forEach(function(inp) {
    var planta = inp.dataset.planta;
    var producto = inp.dataset.producto;
    var val = parseFloat(inp.value);
    if (!isNaN(val) && val >= 0) {
      var key = planta + '|' + producto;
      var bbl = val;  // Already MBDC
      cobPronOverrides[key] = val;
      cobOverrides[key] = { vfact: val };
    }
  });
  cobPronPanelOpen = false;
  renderP2();
}

async function cobSaveToGS() {
  var btn = document.getElementById('cob-save-btn');
  if (btn) { btn.textContent = '\u23F3 Guardando...'; btn.disabled = true; }
  try {
    var today = byLatest();
    var records = [];
    today.forEach(function(r) {
      var key = r.planta + '|' + r.producto;
      var ov = cobOverrides[key];
      if (!ov) return;
      records.push({
        fecha: currentDate, planta: r.planta, producto: r.producto,
        inv: cobGetInv(r), pron: cobGetPron(r),  // Already MBDC vult7: r.vult7, vreal: r.vreal,
        dem_prom: r.dem_prom, dem: r.dem, var_dem: r.var_dem,
        vfact: ov.vfact,  // Already MBDC cob: cobCalcDays(r.inv, ov.vfact),
        fecha_cobertura: cobCalcFecha(currentDate, cobCalcDays(r.inv, ov.vfact)),
        fecha_reposicion: r.fecha_reposicion, bt: r.bt, vol_rep: r.vol_rep,
        vacio: r.vacio, comentario: r.comentario,
        fecha_repos_bt2: r.fecha_repos_bt2, bt2: r.bt2,
        vol_rep_bt2: r.vol_rep_bt2, vacio2: r.vacio2
      });
    });
    if (!records.length) { alert('No hay cambios para guardar.'); if(btn){btn.disabled=false;} return; }
    await fetch(CONFIG.API_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'batchUpsert', records: records })
    });
    if (btn) { btn.textContent = '\u2705 ' + records.length + ' guardados'; btn.disabled = false; }
    setTimeout(function() { if(btn){ btn.textContent='\uD83D\uDCBE Guardar'; btn.style.display=Object.keys(cobOverrides).length?'inline-flex':'none'; } }, 2500);
    setTimeout(function() { fetchData(true); }, 2500);
  } catch (err) {
    console.error('[Cob] Save error:', err);
    if (btn) { btn.textContent = '\u274C Error'; btn.disabled = false; }
    setTimeout(function() { if(btn) btn.textContent='\uD83D\uDCBE Guardar'; }, 3000);
  }
}

function cobGetRefineryAdj(planta, producto) {
  if (planta === 'Talara') {
    if (producto === 'Diesel') return cobRefinery.talara.db5s50_mb + cobRefinery.talara.d2s50h_mb;
    if (producto === 'G. Regular') return cobRefinery.talara.greg_mb;
    if (producto === 'G. Premium') return cobRefinery.talara.gpre_mb;
    if (producto === 'TA1') return cobRefinery.talara.ta1_mb;
    if (producto === 'G. 84') return cobRefinery.talara.g84_mb;
    if (producto === 'GLP') return cobRefinery.talara.glp_mb;
  }
  if (planta === 'Conch\u00e1n') {
    if (producto === 'Diesel') return cobRefinery.conchan.db5s50_mb + cobRefinery.conchan.d2s50_mb + cobRefinery.conchan.ulsd_mb;
    if (producto === 'G. Regular') return cobRefinery.conchan.greg_mb + cobRefinery.conchan.grehs_mb;
    if (producto === 'G. Premium') return cobRefinery.conchan.gpre_mb;
  }
  if (planta === 'Iquitos') {
    if (producto === 'Diesel') return cobRefinery.iquitos.dieselb5_mb;
    if (producto === 'G. 84') return cobRefinery.iquitos.g84_mb;
    if (producto === 'Turbo' || producto === 'TA1') return cobRefinery.iquitos.turbo_mb;
    if (producto === 'G. Regular') return cobRefinery.iquitos.greg_mb;
  }
  return 0;
}

function renderP2() {
  var today = byLatest();
  if (!today.length) {
    document.getElementById('p2-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">Sin datos para esta fecha</div>';
    return;
  }

  var PLANT_ORDER = ['Talara','Piura','Eten','Salaverry','Chimbote','Supe','Callao','Conch\u00e1n','Pisco','Mollendo','Ilo','Juliaca','Cusco','Iquitos','Pucallpa','Tarapoto','Yurimaguas','El Milagro'];
  var EXCLUDE_PLANTS = ['A. Iquitos','A. Tarapoto','A. LimaCallao','A. Cusco','A.Iquitos','A.Tarapoto','A.LimaCallao','A.Cusco'];
  var grouped = {};
  today.forEach(function(r) {
    if (EXCLUDE_PLANTS.indexOf(r.planta) >= 0) return;
    // Skip rows with zero inventory AND zero pronóstico AND zero vfact (phantom products)
    if ((r.inv || 0) <= 0 && (r.pron || 0) <= 0 && (r.vfact || 0) <= 0 && (r.vreal || 0) <= 0) return;
    if (!grouped[r.planta]) grouped[r.planta] = [];
    grouped[r.planta].push(r);
  });

  var plantOrder = PLANT_ORDER.filter(function(p) { return grouped[p]; });
  Object.keys(grouped).forEach(function(p) { if (plantOrder.indexOf(p) < 0) plantOrder.push(p); });

  var tbody = '';
  plantOrder.forEach(function(planta) {
    var rows = grouped[planta].sort(function(a,b) { return prodSortKey(a.producto) - prodSortKey(b.producto); });
    if (!rows || !rows.length) return;
    rows.sort(function(a, b) { return (a.cob || 999) - (b.cob || 999); });

    var safePlanta = planta.replace(/[^a-zA-Z0-9]/g, '_');
    var minCob = rows.reduce(function(m, r) { return r.cob > 0 && r.cob < m ? r.cob : m; }, 999);
    var cobColor = minCob < CONFIG.COB_RED ? 'var(--red)' : minCob < CONFIG.COB_YEL ? 'var(--yel)' : 'var(--grn)';
    var pillBg = minCob < CONFIG.COB_RED ? 'var(--red)1a' : minCob < CONFIG.COB_YEL ? 'var(--yel)1a' : 'var(--grn)14';
    var isCollapsed = cobCollapsed[planta] !== false; // Default collapsed

    tbody += '<tr class="cob-planta-row' + (isCollapsed ? ' collapsed' : '') + '" id="cob-ph-' + safePlanta + '" onclick="cobTogglePlanta(\'' + planta.replace(/'/g, "\\'") + '\')">'
      + '<td colspan="13"><span class="toggle-arrow">\u25BC</span>' + planta
      + '<span class="pill" style="background:' + pillBg + ';color:' + cobColor + '">' + rows.length + ' prod.</span>'
      + (minCob < 999 ? '<span class="pill" style="background:' + pillBg + ';color:' + cobColor + '">min ' + minCob + 'd</span>' : '')
      + '</td></tr>';

    rows.forEach(function(r) {
      var sid = cobSafeId(r.planta, r.producto);
      var key = r.planta + '|' + r.producto;
      var pronMbdc = cobGetPron(r);
      var vrealMbdc = r.vreal || r.dem || 0;
      // V.Factible: override > Cobertura data > 0 (NOT pronóstico fallback)
      var vfactDisplay = cobOverrides[key] ? cobOverrides[key].vfact : (r.vfact || 0);
      // For coverage calc: use vfact if > 0, else pronóstico
      var vfactCalc = vfactDisplay > 0 ? vfactDisplay : pronMbdc;
      var refAdj = cobGetRefineryAdj(r.planta, r.producto);
      var baseInv = cobGetInv(r);
      var invTotal = baseInv + refAdj;
      var invMb = invTotal;
      var cob = cobCalcDays(invTotal, vfactCalc);
      var fechaCob = cobCalcFecha(currentDate, cob);
      var cobClass = cob <= 0 ? 'cob-cov-warn' : cob < CONFIG.COB_RED ? 'cob-cov-crit' : cob < CONFIG.COB_YEL ? 'cob-cov-warn' : 'cob-cov-ok';
      var pronBarW = 0;
      var reducPct = (pronMbdc > 0 && vfactDisplay > 0) ? ((vfactDisplay - pronMbdc) / pronMbdc * 100) : 0;
      var reducColor = reducPct < -10 ? 'var(--red)' : reducPct < 0 ? 'var(--yel)' : 'var(--grn)';
      var reducStr = (pronMbdc > 0 && vfactDisplay > 0) ? (reducPct > 0 ? '+' : '') + reducPct.toFixed(1) + '%' : '\u2014';
      var fechaNuevaCob = '';
      if (r.vol_rep > 0 && vfactCalc > 0) {
        var cobR = cobCalcDays(invTotal + r.vol_rep, vfactCalc);
        fechaNuevaCob = cobCalcFecha(currentDate, cobR);
      }

      // ── Merge BT data from Simulator (simShips) if available ──
      var btName = r.bt || '';
      var btVol = r.vol_rep || 0;
      var btEta = r.fecha_reposicion || '';
      var btName2 = r.bt2 || '';
      var btVol2 = r.vol_rep_bt2 || 0;
      var btEta2 = r.fecha_repos_bt2 || '';

      // Overlay from simulator if simShips has data for this planta+producto
      if (typeof simShips !== 'undefined' && simShips.length > 0) {
        simShips.forEach(function(ship) {
          ship.stops.forEach(function(stop) {
            if (stop.planta !== r.planta) return;
            // Check if any product in this stop matches
            var prods = stop.prods || [{producto: stop.producto, vol: stop.vol}];
            prods.forEach(function(pr) {
              var simProd = (pr.producto || '').replace(/\(BT2\)/, '').trim();
              if (simProd === r.producto || (simProd === 'Diesel' && r.producto === 'Diesel') ||
                  (simProd === 'G. Regular' && r.producto === 'G. Regular') ||
                  (simProd === 'G. Premium' && r.producto === 'G. Premium')) {
                if (!btName) {
                  btName = ship.name;
                  btVol = pr.vol || 0; // Already MB
                  btEta = stop.etaDate || '';
                } else if (!btName2) {
                  btName2 = ship.name;
                  btVol2 = pr.vol || 0;
                  btEta2 = stop.etaDate || '';
                }
              }
            });
          });
        });
      }

      // Recalc nueva fecha cobertura with BT vol
      var totalBTVol = btVol + btVol2;
      if (totalBTVol > 0 && vfactCalc > 0) {
        var cobWithBT = cobCalcDays(invTotal + totalBTVol, vfactCalc);
        fechaNuevaCob = cobCalcFecha(currentDate, cobWithBT);
      }

      var hiddenClass = isCollapsed ? ' cob-hidden' : '';
      var changedClass = cobOverrides[key] ? ' cob-changed' : '';
      var isReduced = vfactDisplay > 0 && vfactDisplay < pronMbdc && pronMbdc > 0;

      tbody += '<tr id="cob-row-' + sid + '" class="cob-data-' + safePlanta + hiddenClass + changedClass + '">'
        + '<td style="font-weight:700;color:var(--txt);cursor:pointer" onclick="openWhatIf(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\')" title="Abrir simulador What-If"><span style="border-bottom:1px dashed var(--acc)44">' + r.producto + '</span> <span style="font-size:8px;color:var(--acc2)">📊</span></td>'
        + '<td class="r" style="white-space:nowrap">'
        + '<input class="cob-edit" type="number" step="0.01" min="0" value="' + baseInv.toFixed(2) + '" style="width:60px" '
        + 'onchange="cobOnInvChange(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\',this.value)" '
        + 'oninput="cobOnInvChange(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\',this.value)">'
        + (refAdj > 0 ? '<span style="font-size:8px;color:var(--acc2);font-weight:700" title="Planta ' + baseInv.toFixed(1) + ' + Ref. ' + refAdj.toFixed(1) + ' = ' + invMb.toFixed(1) + ' MB"> +' + refAdj.toFixed(1) + '</span>' : '')
        + '</td>'
        + '<td class="r">' + pronMbdc.toFixed(2) + '</td>'
        + '<td class="r">' + vrealMbdc.toFixed(2) + '</td>'
        + '<td class="r" style="display:flex;align-items:center;gap:3px;justify-content:flex-end">'
        + '<input class="cob-edit" type="number" step="0.01" min="0" value="' + vfactDisplay.toFixed(2) + '" '
        + 'onchange="cobOnVfactChange(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\',this.value)" '
        + 'oninput="cobOnVfactChange(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\',this.value)">'
        + '<button id="cob-up-' + sid + '" onclick="cobSetPron(\'' + r.planta.replace(/'/g, "\\'") + '\',\'' + r.producto.replace(/'/g, "\\'") + '\')" '
        + 'title="Igualar al pron\u00f3stico (' + pronMbdc.toFixed(2) + ')" '
        + 'style="display:' + (isReduced ? 'inline-block' : 'none') + ';background:#1d6fd622;border:1px solid #1d6fd644;border-radius:4px;color:#4d9de0;cursor:pointer;font-size:10px;padding:2px 6px;font-weight:700;white-space:nowrap;flex-shrink:0"'
        + '>\u2191P</button>'
        + '</td>'
        + '<td class="r" id="cob-reduc-' + sid + '" style="color:' + reducColor + ';font-weight:700;font-size:10px">' + reducStr + '</td>'
        + '<td class="r"><span id="cob-days-' + sid + '" class="cob-cov-cell ' + cobClass + '">' + (cob > 0 ? cob + 'd' : '\u2014') + '</span></td>'
        + '<td id="cob-fecha-' + sid + '">' + (fechaCob ? fmtDate(fechaCob) : '\u2014') + '</td>'
        + '<td>' + (btEta ? fmtDate(btEta) : '\u2014') + '</td>'
        + '<td>' + (btName ? '<span style="color:var(--acc2);font-weight:700;font-family:var(--sans)">' + btName + '</span>' : '\u2014')
        + (btName2 ? '<br><span style="color:#a855f7;font-weight:600;font-size:9px">' + btName2 + '</span>' : '') + '</td>'
        + '<td class="r">' + (btVol ? btVol.toFixed(1) : '\u2014')
        + (btVol2 ? '<br><span style="font-size:9px;color:#a855f7">' + btVol2.toFixed(1) + '</span>' : '') + '</td>'
        + '<td class="r">' + (r.vacio ? (r.vacio||0).toFixed(1) : '\u2014') + '</td>'
        + '<td id="cob-nfecha-' + sid + '">' + (fechaNuevaCob ? '<span style="color:var(--acc2);font-weight:700">' + fmtDate(fechaNuevaCob) + '</span>' : '\u2014') + '</td>'
        + '</tr>';
    });
  });

  // Pronóstico panel items — include ALL products from pronSheet + today data
  var pronItems = '';
  var pronSeen = {};
  // First: products that exist in today's data
  today.forEach(function(r) {
    if (EXCLUDE_PLANTS.indexOf(r.planta) >= 0) return;
    var key = r.planta + ' \u00B7 ' + r.producto;
    if (pronSeen[key]) return;
    pronSeen[key] = true;
    var pronVal = cobGetPron(r);

// P5: REPOSICIONES BT
function renderP5() {
  const today = byLatest();
  const withBT = today.filter(r => r.bt && r.bt !== '' && r.bt !== '-');
  
  const btMap = {};
  withBT.forEach(r => {
    if (!btMap[r.bt]) btMap[r.bt] = {nombre: r.bt, destinos: [], volTotal: 0, eta: r.fecha_reposicion || '', plantas: new Set()};
    var pr = pronSheet[r.planta+'|'+r.producto] || r.pron_mes || r.pron || r.dem_prom || 0;
    var vf = r.vfact || 0;
    var dm = vf > 0 ? vf : pr;
    var cob = (r.inv > 0 && dm > 0) ? Math.floor(r.inv / dm) : 0;
    var cobAfter = (r.inv > 0 && dm > 0 && r.vol_rep > 0) ? Math.floor((r.inv + r.vol_rep) / dm) : cob;
    btMap[r.bt].destinos.push({planta: r.planta, producto: r.producto, vol: r.vol_rep || 0, inv: r.inv || 0, cob: cob, cobAfter: cobAfter, eta: r.fecha_reposicion || ''});
    btMap[r.bt].volTotal += r.vol_rep || 0;
    btMap[r.bt].plantas.add(r.planta);
    if (r.fecha_reposicion) btMap[r.bt].eta = r.fecha_reposicion;
  });
  
  // Also add simShips
  if (typeof simShips !== 'undefined' && simShips.length > 0) {
    simShips.forEach(ship => {
      if (!btMap[ship.name]) btMap[ship.name] = {nombre: ship.name, destinos: [], volTotal: 0, eta: '', plantas: new Set()};
      ship.stops.forEach(stop => {
        var prods = stop.prods || [{producto: stop.producto, vol: stop.vol}];
        prods.forEach(pr => {
          if (!btMap[ship.name].destinos.some(d => d.planta === stop.planta && d.producto === pr.producto)) {
            btMap[ship.name].destinos.push({planta: stop.planta, producto: pr.producto, vol: pr.vol || 0, inv: 0, cob: 0, cobAfter: 0, eta: stop.etaDate || ''});
            btMap[ship.name].volTotal += pr.vol || 0;
            btMap[ship.name].plantas.add(stop.planta);
          }
          if (stop.etaDate && !btMap[ship.name].eta) btMap[ship.name].eta = stop.etaDate;
        });
      });
    });
  }

  const now = new Date();
  
  const btCards = Object.values(btMap).map(bt => {
    // Status based on ETA
    var etaDate = bt.eta ? new Date(bt.eta + 'T12:00:00') : null;
    var daysToEta = etaDate ? Math.ceil((etaDate - now) / 86400000) : 999;
    var status, statusColor, statusBg;
    if (daysToEta <= 0) { status = 'EN PUERTO'; statusColor = '#16a34a'; statusBg = '#16a34a18'; }
    else if (daysToEta <= 2) { status = 'EN TRÁNSITO'; statusColor = '#2563eb'; statusBg = '#2563eb18'; }
    else if (daysToEta <= 5) { status = 'PROGRAMADO'; statusColor = '#d97706'; statusBg = '#d9770618'; }
    else { status = 'PENDIENTE'; statusColor = '#64748b'; statusBg = '#64748b18'; }

    // Group by plant
    var byPlanta = {};
    bt.destinos.forEach(d => {
      if (!byPlanta[d.planta]) byPlanta[d.planta] = {prods: [], vol: 0, eta: d.eta};
      byPlanta[d.planta].prods.push(d);
      byPlanta[d.planta].vol += d.vol;
      if (d.eta) byPlanta[d.planta].eta = d.eta;
    });

    var plantRows = Object.entries(byPlanta).map(([pl, data]) => {
      var prodList = data.prods.sort((a,b) => prodSortKey(a.producto) - prodSortKey(b.producto))
        .map(d => {
          var cobColor = d.cob < 4 ? '#dc2626' : d.cob < 7 ? '#d97706' : '#16a34a';
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr)">
            <span style="font-weight:700;font-size:11px">${d.producto}</span>
            <span style="font-family:var(--mono);font-size:11px;font-weight:700">${fmt(d.vol,1)} MB</span>
          </div>`;
        }).join('');
      var etaLabel = data.eta ? fmtDate(data.eta) : '—';
      return `<div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-weight:800;font-size:12px">${pl}</span>
          <span style="font-size:9px;color:var(--txt3)">ETA: <strong>${etaLabel}</strong> · ${fmt(data.vol,1)} MB</span>
        </div>
        ${prodList}
      </div>`;
    }).join('');
    
    return `
      <div class="bt-card" style="border-left:4px solid ${statusColor}">
        <div class="bt-card-header" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="bt-icon">🚢</span>
          <span class="bt-name">${bt.nombre}</span>
          <span style="background:${statusBg};color:${statusColor};padding:3px 10px;border-radius:12px;font-size:9px;font-weight:800;letter-spacing:.5px">${status}</span>
          <span class="bt-badge">${fmt(bt.volTotal,1)} MB · ${bt.plantas.size} escalas · ETA: ${fmtDate(bt.eta)}</span>
        </div>
        <div style="padding:12px 16px">${plantRows}</div>
      </div>
    `;
  }).join('');
  
  var totalVol = Object.values(btMap).reduce((s,b) => s + b.volTotal, 0);
  var totalEscalas = Object.values(btMap).reduce((s,b) => s + b.plantas.size, 0);

  document.getElementById('p5-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">⚓ Reposiciones BT</div>
      <div class="page-header-subtitle">Programa de buques de transferencia al ${fmtDate(currentDate)}</div>
    </div>
    <div style="padding:12px 18px;display:flex;gap:12px;flex-wrap:wrap">
      <div style="padding:10px 18px;border-radius:8px;background:var(--bg3);text-align:center"><div style="font-size:22px;font-weight:800;color:var(--txt)">${Object.keys(btMap).length}</div><div style="font-size:9px;color:var(--txt3)">Buques</div></div>
      <div style="padding:10px 18px;border-radius:8px;background:var(--bg3);text-align:center"><div style="font-size:22px;font-weight:800;color:#2563eb;font-family:var(--mono)">${fmt(totalVol,1)}</div><div style="font-size:9px;color:var(--txt3)">MB Total</div></div>
      <div style="padding:10px 18px;border-radius:8px;background:var(--bg3);text-align:center"><div style="font-size:22px;font-weight:800;color:#d97706">${totalEscalas}</div><div style="font-size:9px;color:var(--txt3)">Escalas</div></div>
    </div>
    <div class="bt-cards">${btCards || '<div style="padding:40px;text-align:center;color:var(--txt3)">Sin buques programados</div>'}</div>
  `; 
}

// P6: MAPA CALOR
function renderP6() {
  var today = byLatest();
  if (!today.length) { document.getElementById('p6-content').innerHTML='<div style="padding:40px;text-align:center;color:var(--txt3)">Sin datos</div>'; return; }

  var EXCL_PL = ['A. Iquitos','A. Tarapoto','A. LimaCallao','A. Cusco'];
  var active = today.filter(function(r) { return !EXCL_PL.some(function(x) { return r.planta === x; }) && (r.inv > 0 || (r.pron||0) > 0 || (r.vfact||0) > 0); });

  var REGIONS = {
    'NORTE': ['Talara','Piura','Eten','Salaverry','Chimbote'],
    'CENTRO': ['Supe','Callao','Conch\u00e1n','Pisco'],
    'SUR': ['Mollendo','Ilo','Juliaca','Cusco'],
    'ORIENTE': ['Pucallpa','Tarapoto','Yurimaguas','El Milagro','Iquitos','Pto. Maldonado']
  };
  var PRODS_SHOW = ['Diesel','G. Regular','G. Premium','G. 84','TA1','GLP'];

  var matrix = {};
  active.forEach(function(r) {
    if (!matrix[r.planta]) matrix[r.planta] = {};
    var pk = r.planta + '|' + r.producto;
    var pr = pronSheet[pk] || r.pron_mes || r.pron || r.dem_prom || 0;
    var vf = r.vfact || 0;
    var dm = vf > 0 ? vf : pr;
    var cob = (r.inv > 0 && dm > 0) ? Math.floor(r.inv / dm) : (r.inv > 0 ? 999 : 0);
    matrix[r.planta][r.producto] = cob;
  });

  function cobCell(cob) {
    if (cob === undefined || cob === null) return '<td style="text-align:center;color:var(--txt3);font-size:10px">\u2014</td>';
    var bg, txt;
    if (cob <= 0) { bg='#7f1d1d'; txt='#fca5a5'; }
    else if (cob < 4) { bg='#dc2626'; txt='#fff'; }
    else if (cob < 7) { bg='#ea580c'; txt='#fff'; }
    else if (cob < 13) { bg='#ca8a04'; txt='#fff'; }
    else { bg='#16a34a'; txt='#fff'; }
    return '<td style="text-align:center"><span style="display:inline-block;min-width:30px;padding:3px 6px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;background:'+bg+';color:'+txt+'">'+cob+'d</span></td>';
  }

  var allCobs = [];
  Object.keys(matrix).forEach(function(pl) { Object.keys(matrix[pl]).forEach(function(pr) { var c = matrix[pl][pr]; if (c >= 0 && c < 999) allCobs.push(c); }); });
  var critC = allCobs.filter(function(c) { return c < 4; }).length;
  var warnC = allCobs.filter(function(c) { return c >= 4 && c < 7; }).length;
  var attC  = allCobs.filter(function(c) { return c >= 7 && c < 13; }).length;
  var okC   = allCobs.filter(function(c) { return c >= 13; }).length;

  var regionBlocks = '';
  Object.keys(REGIONS).forEach(function(region) {
    var plants = REGIONS[region];
    var activePlants = plants.filter(function(p) { return matrix[p]; });
    if (!activePlants.length) return;

    // Determine which products exist in this region
    var regionProds = PRODS_SHOW.filter(function(p) {
      return activePlants.some(function(pl) { return matrix[pl] && matrix[pl][p] !== undefined; });
    });

    var header = '<tr style="background:var(--bg3)"><th style="text-align:left;padding:6px 10px;font-size:9px;color:var(--txt3)">PLANTA</th>';
    regionProds.forEach(function(p) { header += '<th style="text-align:center;font-size:8px;color:var(--txt3);padding:4px">' + p.replace('G. ','').toUpperCase() + '</th>'; });
    header += '</tr>';

    var rows = '';
    activePlants.forEach(function(pl) {
      rows += '<tr style="border-bottom:1px solid var(--bdr)"><td style="padding:6px 10px;font-weight:700;font-size:11px;white-space:nowrap">' + pl + '</td>';
      regionProds.forEach(function(p) { rows += cobCell(matrix[pl] ? matrix[pl][p] : undefined); });
      rows += '</tr>';
    });

    regionBlocks += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden">'
      + '<div style="padding:10px 14px;font-size:12px;font-weight:800;color:var(--txt);border-bottom:1px solid var(--bdr)">\uD83D\uDCCD ' + region + '</div>'
      + '<table style="width:100%;border-collapse:collapse">' + header + rows + '</table></div>';
  });

  document.getElementById('p6-content').innerHTML =
    '<div class="page-header">'
    + '<div class="page-header-title">\uD83C\uDF21\uFE0F Mapa de Calor \u2014 Cobertura Nacional</div>'
    + '<div class="page-header-subtitle">D\u00edas de cobertura por regi\u00f3n y producto al ' + fmtDate(currentDate) + '</div></div>'
    + buildDateBar('dateBarP6')
    + '<div style="padding:8px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">'
    + '<div style="padding:6px 14px;border-radius:6px;background:#dc262618;text-align:center"><span style="font-weight:800;color:#dc2626;font-size:16px">' + critC + '</span><div style="font-size:8px;color:var(--txt3)">Cr\u00edtico</div></div>'
    + '<div style="padding:6px 14px;border-radius:6px;background:#ea580c18;text-align:center"><span style="font-weight:800;color:#ea580c;font-size:16px">' + warnC + '</span><div style="font-size:8px;color:var(--txt3)">Vigilancia</div></div>'
    + '<div style="padding:6px 14px;border-radius:6px;background:#ca8a0418;text-align:center"><span style="font-weight:800;color:#ca8a04;font-size:16px">' + attC + '</span><div style="font-size:8px;color:var(--txt3)">Atenci\u00f3n</div></div>'
    + '<div style="padding:6px 14px;border-radius:6px;background:#16a34a14;text-align:center"><span style="font-weight:800;color:#16a34a;font-size:16px">' + okC + '</span><div style="font-size:8px;color:var(--txt3)">Normal</div></div>'
    + '<div style="margin-left:auto;font-size:8px;color:var(--txt3);display:flex;gap:4px;align-items:center">'
    + '<span style="padding:2px 5px;border-radius:3px;background:#7f1d1d;color:#fca5a5;font-weight:700;font-size:7px">0d</span>'
    + '<span style="padding:2px 5px;border-radius:3px;background:#dc2626;color:#fff;font-weight:700;font-size:7px">1-3d</span>'
    + '<span style="padding:2px 5px;border-radius:3px;background:#ea580c;color:#fff;font-weight:700;font-size:7px">4-7d</span>'
    + '<span style="padding:2px 5px;border-radius:3px;background:#ca8a04;color:#fff;font-weight:700;font-size:7px">8-12d</span>'
    + '<span style="padding:2px 5px;border-radius:3px;background:#16a34a;color:#fff;font-weight:700;font-size:7px">13d+</span></div></div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;padding:12px 18px">'
    + regionBlocks + '</div>';
}

// CHARTS
// ════════════════════════════════════════════════════════════════════════════
let chartCobProd = null;
let chartInvPlanta = null;

function renderCharts() {
  const today = byLatest();
  if (!today.length) return;
  
  // Cobertura por Producto
  const byProd = {};
  today.forEach(r => {
    if (!byProd[r.producto]) byProd[r.producto] = {cob: [], count: 0};
    if (r.cob > 0) {
      byProd[r.producto].cob.push(r.cob);
      byProd[r.producto].count++;
    }
  });
  
  const prodLabels = Object.keys(byProd);
  const prodData = prodLabels.map(p => byProd[p].cob.length ? byProd[p].cob.reduce((a,b)=>a+b,0)/byProd[p].cob.length : 0);
  const prodColors = prodData.map(c => c < CONFIG.COB_RED ? cssVar('--red') : c < CONFIG.COB_AMB ? cssVar('--ora') : cssVar('--grn'));
  
  const ctxCob = document.getElementById('chartCobProd');
  if (ctxCob) {
    if (chartCobProd) chartCobProd.destroy();
    chartCobProd = new Chart(ctxCob, {
      type: 'bar',
      data: {
        labels: prodLabels,
        datasets: [{
          data: prodData,
          backgroundColor: prodColors,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {legend: {display: false}},
        scales: {
          x: {grid: {display: false}, ticks: {color: cssVar('--txt3')}},
          y: {grid: {color: cssVar('--bdr')}, ticks: {color: cssVar('--txt3')}}
        }
      }
    });
  }
  
  // Inventario por Planta (Top 10)
  const byPlanta = {};
  today.forEach(r => {
    if (!byPlanta[r.planta]) byPlanta[r.planta] = 0;
    byPlanta[r.planta] += r.inv || 0;
  });
  
  const sortedPlantas = Object.entries(byPlanta).sort((a,b) => b[1] - a[1]).slice(0, 10);
  
  const ctxInv = document.getElementById('chartInvPlanta');
  if (ctxInv) {
    if (chartInvPlanta) chartInvPlanta.destroy();
    chartInvPlanta = new Chart(ctxInv, {
      type: 'bar',
      data: {
        labels: sortedPlantas.map(p => p[0]),
        datasets: [{
          data: sortedPlantas.map(p => p[1]),
          backgroundColor: cssVar('--acc'),
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {legend: {display: false}},
        scales: {
          x: {grid: {color: cssVar('--bdr')}, ticks: {color: cssVar('--txt3')}},
          y: {grid: {display: false}, ticks: {color: cssVar('--txt3')}}
        }
      }
    });
  }
}

let _leafletMap = null;

function renderPA() {
  const today = byLatest();
  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  const active = today.filter(r => !EXCLUIR.some(x =>
    r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));

  const PLANT_META = {
    'Talara':     {lat:-4.577,  lng:-81.272, tipo:'Refinería', region:'Piura'},
    'Eten':       {lat:-6.921,  lng:-79.860, tipo:'Terminal',  region:'Lambayeque'},
    'Salaverry':  {lat:-8.224,  lng:-78.977, tipo:'Terminal',  region:'La Libertad'},
    'El Milagro': {lat:-8.010,  lng:-78.070, tipo:'Terminal',  region:'La Libertad'},
    'Chimbote':   {lat:-9.075,  lng:-78.593, tipo:'Terminal',  region:'Áncash'},
    'Supe':       {lat:-10.797, lng:-77.705, tipo:'Terminal',  region:'Lima'},
    'Callao':     {lat:-12.055, lng:-77.143, tipo:'Terminal',  region:'Callao'},
    'Conchán':    {lat:-12.398, lng:-76.990, tipo:'Refinería', region:'Lima'},
    'Pisco':      {lat:-13.707, lng:-76.198, tipo:'Terminal',  region:'Ica'},
    'Mollendo':   {lat:-17.029, lng:-72.015, tipo:'Terminal',  region:'Arequipa'},
    'Ilo':        {lat:-17.638, lng:-71.340, tipo:'Terminal',  region:'Moquegua'},
    'Pucallpa':   {lat:-8.379,  lng:-74.571, tipo:'Terminal',  region:'Ucayali'},
    'Iquitos':    {lat:-3.749,  lng:-73.253, tipo:'Terminal',  region:'Loreto'},
    'Juliaca':    {lat:-15.497, lng:-70.133, tipo:'Terminal',  region:'Puno'},
    'Cusco':      {lat:-13.531, lng:-71.978, tipo:'Terminal',  region:'Cusco'},
    'Tarapoto':   {lat:-6.485,  lng:-76.370, tipo:'Terminal',  region:'San Martín'},
  };

  const plantaMap = {};
  active.forEach(r => {
    if (!plantaMap[r.planta]) plantaMap[r.planta] = {minCob:999, records:[], bt:'', btEta:''};
    // Recalculate coverage using pronSheet
    var mapPron = pronSheet[r.planta + '|' + r.producto] || r.pron_mes || r.pron || r.dem_prom || 0;
    var mapVfact = r.vfact || 0;
    var mapDem = mapVfact > 0 ? mapVfact : mapPron;
    var mapCob = (r.inv > 0 && mapDem > 0) ? Math.floor(r.inv / mapDem) : (r.inv > 0 ? 999 : 0);
    r._mapCob = mapCob;
    plantaMap[r.planta].records.push(r);
    if (r.inv > 0 && mapCob >= 0 && mapCob < plantaMap[r.planta].minCob) plantaMap[r.planta].minCob = mapCob;
    if (r.bt) { plantaMap[r.planta].bt = r.bt; plantaMap[r.planta].btEta = r.fecha_reposicion||''; }
  });

  function cobColor(cob) {
    // Executive color palette — clean, high contrast, professional
    if (!cob || cob <= 0) return {bg:'#450a0a', border:'#dc2626', text:'#fca5a5', label:'Agotado'};
    if (cob < 4)  return {bg:'#dc2626', border:'#b91c1c', text:'#fff',    label:'Crítico'};
    if (cob < 8)  return {bg:'#ea580c', border:'#c2410c', text:'#fff',    label:'Bajo'};
    if (cob < 13) return {bg:'#d97706', border:'#b45309', text:'#fff',    label:'Atención'};
    return             {bg:'#16a34a', border:'#15803d', text:'#fff',    label:'Normal'};
  }

  const nCrit = Object.values(plantaMap).filter(d=>d.minCob>0&&d.minCob<4).length;
  const nBaj  = Object.values(plantaMap).filter(d=>d.minCob>=4&&d.minCob<8).length;
  const nAten = Object.values(plantaMap).filter(d=>d.minCob>=8&&d.minCob<13).length;
  const nOk   = Object.values(plantaMap).filter(d=>d.minCob>=13).length;

  const btSet = {};
  active.forEach(r=>{ if(r.bt) btSet[r.bt]={nombre:r.bt}; });
  const btColors = ['#22c55e','#a855f7','#3b82f6','#f97316'];
  const btList = Object.values(btSet);

  const plantList = Object.entries(plantaMap)
    .sort((a,b)=>a[1].minCob-b[1].minCob)
    .map(([p,d])=>{
      const mc = d.minCob;
      const cobTxt = mc >= 999 ? '—' : mc + 'd';
      const cobCol = mc <= 0 ? '#f87171' : mc < 4 ? '#ef4444' : mc < 7 ? '#fb923c' : mc < 13 ? '#facc15' : '#4ade80';
      return `<div class="leaf-plant-row">
        <span class="leaf-plant-name" style="color:#e2e8f0">${p}${d.bt?' 🚢':''}</span>
        <span class="leaf-plant-cob" style="color:${cobCol};font-weight:800">${cobTxt}</span>
      </div>`;
    }).join('');

  document.getElementById('pA-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">🗺️ Mapa de Plantas Petroperú</div>
      <div class="page-header-subtitle">Cobertura por terminal · ${fmtDate(currentDate)}</div>
    </div>
    <div style="position:relative;z-index:500">${buildDateBar('dateBarMap')}</div>
    <div class="leaflet-page-wrap">
      <div id="peruLeafletMap"></div>
      <div class="leaf-sidebar">
        <div>
          <div class="leaf-legend-title" style="color:#94a3b8">Cobertura (días)</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#450a0a;border:1px solid #dc2626"></div>Agotado 0d</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#dc2626"></div>Crítico &lt;4d</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#ea580c"></div>Bajo 4-7d</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#d97706"></div>Atención 8-12d</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#16a34a"></div>Normal ≥13d</div>
        </div>
        <div style="border-top:1px solid var(--bdr);padding-top:10px">
          <div class="leaf-legend-title" style="color:#94a3b8">Tipos</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:#a855f7;border-radius:3px"></div>Refinería</div>
          <div class="leaf-legend-item" style="color:#cbd5e1"><div class="leaf-legend-dot" style="background:var(--acc)"></div>Terminal</div>
        </div>
        ${btList.length?`<div style="border-top:1px solid var(--bdr);padding-top:10px">
          <div class="leaf-legend-title" style="color:#94a3b8">Buques Tanque</div>
          ${btList.map((b,i)=>`<div class="leaf-bt-item" style="color:#cbd5e1"><div class="leaf-bt-dot" style="background:${btColors[i%4]}"></div>${b.nombre}</div>`).join('')}
        </div>`:''}
        <div style="border-top:1px solid var(--bdr);padding-top:10px">
          <div class="leaf-legend-title" style="color:#94a3b8">Estado Nacional</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
            ${nCrit?`<div style="background:#dc262618;border:1px solid #dc262630;border-radius:6px;padding:6px;text-align:center"><div style="font-size:20px;font-weight:800;color:#dc2626;font-family:var(--mono)">${nCrit}</div><div style="font-size:8px;color:var(--txt3)">Críticas</div></div>`:''}
            ${nBaj?`<div style="background:#ea580c18;border:1px solid #ea580c30;border-radius:6px;padding:6px;text-align:center"><div style="font-size:20px;font-weight:800;color:#ea580c;font-family:var(--mono)">${nBaj}</div><div style="font-size:8px;color:var(--txt3)">Bajas</div></div>`:''}
            ${nAten?`<div style="background:#d9770618;border:1px solid #d9770630;border-radius:6px;padding:6px;text-align:center"><div style="font-size:20px;font-weight:800;color:#d97706;font-family:var(--mono)">${nAten}</div><div style="font-size:8px;color:var(--txt3)">Atención</div></div>`:''}
            ${nOk?`<div style="background:#16a34a14;border:1px solid #16a34a30;border-radius:6px;padding:6px;text-align:center"><div style="font-size:20px;font-weight:800;color:#16a34a;font-family:var(--mono)">${nOk}</div><div style="font-size:8px;color:var(--txt3)">Normal</div></div>`:''}
          </div>
          <div class="leaf-plant-list">${plantList}</div>
        </div>
        <div style="border-top:1px solid var(--bdr);padding-top:8px;font-size:9px;color:var(--txt3);line-height:1.5">
          Mapa: © CartoDB / OpenStreetMap contributors<br>
          Coordenadas: IGN Perú / datos propios<br>
          Desarrollado por Franco Urcia Castillo
        </div>
      </div>
    </div>
  `;

  setTimeout(() => {
    if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }

    _leafletMap = L.map('peruLeafletMap', {
      center: [-9.5, -75.5], zoom: 6, minZoom: 5, maxZoom: 14,

    // CartoDB Voyager — neutral professional basemap, excellent contrast for executive dashboards

      const popMonoPron = isLight ? '#0055b3'   : '#93c5fd';

      const popupHTML = `
