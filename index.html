      L.marker([meta.lat, meta.lng], {icon})
        .bindPopup(popupHTML, {maxWidth:300, className:'custom-popup', autoPan:true})
        .addTo(_leafletMap);
    });

    // ── Ship Routes (BT Cabotaje) ──────────────────────────────────────
    var SHIP_COLORS = ['#2563eb','#7c3aed','#0891b2','#059669','#d97706'];
    var btShips = {};
    active.forEach(function(r) {
      if (!r.bt) return;
      if (!btShips[r.bt]) btShips[r.bt] = {stops:[], eta: r.fecha_reposicion||'', totalVol:0, prods:[]};
      btShips[r.bt].totalVol += (r.vol_rep||0);
      if (r.vol_rep > 0) btShips[r.bt].prods.push(r.planta+': '+r.producto+' '+(r.vol_rep).toFixed(1)+'MB');
      var pm = PLANT_META[r.planta];
      if (pm && !btShips[r.bt].stops.some(function(s) { return s.planta === r.planta; })) {
        btShips[r.bt].stops.push({planta: r.planta, lat: pm.lat, lng: pm.lng});
      }
    });
    if (typeof simShips !== 'undefined' && simShips.length > 0) {
      simShips.forEach(function(ship) {
        if (!btShips[ship.name]) btShips[ship.name] = {stops:[], eta:''};
        ship.stops.forEach(function(stop) {
          var pm = PLANT_META[stop.planta];
          if (pm && !btShips[ship.name].stops.some(function(s) { return s.planta === stop.planta; })) {
            btShips[ship.name].stops.push({planta: stop.planta, lat: pm.lat, lng: pm.lng});
          }
          if (!btShips[ship.name].eta && stop.etaDate) btShips[ship.name].eta = stop.etaDate;
        });
      });
    }
    var shipIdx = 0;

    // Coastal waypoints for maritime routes (offshore coordinates)
    var COAST_ROUTE = [
      {name:'Talara', lat:-4.58, lng:-81.35},
      {name:'Bayovar', lat:-5.80, lng:-81.15},
      {name:'Eten', lat:-6.92, lng:-80.00},
      {name:'Salaverry', lat:-8.25, lng:-79.15},
      {name:'Chimbote', lat:-9.10, lng:-78.75},
      {name:'Supe', lat:-10.82, lng:-77.88},
      {name:'Callao', lat:-12.07, lng:-77.25},
      {name:'Conchan', lat:-12.25, lng:-77.12},
      {name:'Pisco', lat:-13.75, lng:-76.35},
      {name:'Mollendo', lat:-17.05, lng:-72.15},
      {name:'Ilo', lat:-17.67, lng:-71.45}
    ];
    function getCoastalRoute(from, to) {
      // Find indices in coastal route
      var fi = -1, ti = -1;
      for (var i = 0; i < COAST_ROUTE.length; i++) {
        if (COAST_ROUTE[i].name === from || from.indexOf(COAST_ROUTE[i].name) >= 0 || COAST_ROUTE[i].name.indexOf(from) >= 0) fi = i;
        if (COAST_ROUTE[i].name === to || to.indexOf(COAST_ROUTE[i].name) >= 0 || COAST_ROUTE[i].name.indexOf(to) >= 0) ti = i;
      }
      if (fi < 0 || ti < 0) return null;
      var route = [];
      var step = fi < ti ? 1 : -1;
      for (var j = fi; j !== ti + step; j += step) {
        route.push([COAST_ROUTE[j].lat, COAST_ROUTE[j].lng]);
      }
      return route;
    }

    Object.entries(btShips).forEach(function(entry) {
      var name = entry[0], ship = entry[1];
      if (ship.stops.length < 2) { shipIdx++; return; }
      var color = SHIP_COLORS[shipIdx % SHIP_COLORS.length];
      shipIdx++;
      // Build coastal route through waypoints
      var fullRoute = [];
      for (var si = 0; si < ship.stops.length - 1; si++) {
        var seg = getCoastalRoute(ship.stops[si].planta, ship.stops[si+1].planta);
        if (seg) { if (fullRoute.length) seg.shift(); fullRoute = fullRoute.concat(seg); }
        else { fullRoute.push([ship.stops[si].lat, ship.stops[si].lng]); if (si === ship.stops.length-2) fullRoute.push([ship.stops[si+1].lat, ship.stops[si+1].lng]); }
      }
      if (!fullRoute.length) fullRoute = ship.stops.map(function(s) { return [s.lat, s.lng]; });
      L.polyline(fullRoute, {color: color, weight: 3.5, opacity: 0.8, dashArray: ''})
        .bindTooltip('\uD83D\uDEA2 ' + name + (ship.eta ? ' \u00B7 ETA ' + fmtDate(ship.eta) : ''), {sticky:true})
        .addTo(_leafletMap);
      var lastStop = ship.stops[ship.stops.length - 1];
      L.marker([lastStop.lat, lastStop.lng], {
        icon: L.divIcon({
          className: '',
          html: '<div style="background:'+color+';color:#fff;padding:3px 8px;border-radius:12px;font-size:9px;font-weight:800;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4);border:2px solid #fff">\uD83D\uDEA2 '+name+'</div>',
          iconSize: [90, 22], iconAnchor: [45, 11]
        })
      }).addTo(_leafletMap);
    });


    // Inject pulse animation
    if (!document.getElementById('leafPulseStyle')) {
      const st = document.createElement('style');
      st.id = 'leafPulseStyle';
      st.textContent = `
        @keyframes leafPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.2}}
        .custom-popup .leaflet-popup-content-wrapper{padding:0;border-radius:12px;background:transparent;border:none;overflow:visible;box-shadow:none}
        .custom-popup .leaflet-popup-content{margin:0;line-height:1.4}
        .custom-popup .leaflet-popup-tip-container{margin-top:-1px}
        .custom-popup .leaflet-popup-tip{background:#111827}
        .custom-popup table tr:hover td{background:transparent!important}
        .leaflet-control-zoom a{background:#fff!important;color:#334155!important;border-color:#cbd5e1!important;font-weight:700}
        .leaflet-control-zoom a:hover{background:#f8fafc!important}
        .leaflet-control-attribution{background:rgba(255,255,255,.85)!important;color:#64748b!important;font-size:9px}
        .leaflet-control-attribution a{color:#2563eb!important}
      `;
      document.head.appendChild(st);
    }

    _leafletMap.fitBounds([[-18.35,-81.33],[-0.014,-68.64]], {padding:[10,10]});
  }, 150);
}

function renderPB() {
  const today = byLatest();
  const todayDate = new Date(currentDate + 'T12:00:00');

  // Rango: 7 días antes y 21 días después
  const DAY_MS = 86400000;
  const startDate = new Date(todayDate - 7 * DAY_MS);
  const totalDays = 28;

  // Days array
  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate.getTime() + i * DAY_MS);
    days.push(d);
  }

  // Collect BT rows
  const btMap = {};
  today.forEach(r => {
    if (!r.bt || r.bt === '' || r.bt === '-') return;
    const key = r.bt + '||' + (r.planta||'');
    if (!btMap[key]) btMap[key] = {bt:r.bt, planta:r.planta, producto:r.producto, eta: r.fecha_reposicion||r.fecha_repos_bt2||'', vol:r.vol_rep||r.vol_rep_bt2||0, cobQuiebre:r.fecha_cobertura||''};
    if (r.vol_rep) { btMap[key].vol = r.vol_rep; btMap[key].eta = r.fecha_reposicion||''; }
  });

  const pct = d => {
    const ms = new Date(d + 'T12:00:00') - startDate;
    return Math.min(100, Math.max(0, ms / (totalDays * DAY_MS) * 100));
  };
  const todayPct = pct(currentDate);

  const dayHeaders = days.map(d =>
    `<div class="gantt-day" style="border-left-color:${d.toDateString()===todayDate.toDateString()?'var(--red)':'var(--bdr)'};color:${d.toDateString()===todayDate.toDateString()?'var(--red)':'var(--txt3)'}">${d.getDate()}/${d.getMonth()+1}</div>`
  ).join('');

  const ganttColors = ['#2d8cf0','#22c55e','#f97316','#a855f7','#ec4899','#14b8a6'];
  let ci = 0;

  const rows = Object.values(btMap).map(bt => {
    if (!bt.eta) return '';
    const startPct = Math.max(0, pct(currentDate) - 5);
    const endPct   = pct(bt.eta);
    const w = Math.max(2, endPct - startPct);
    const col = ganttColors[ci++ % ganttColors.length];
    const quiebrePct = bt.cobQuiebre ? pct(bt.cobQuiebre) : null;
    return `
      <div class="gantt-row">
        <div class="gantt-label" title="${bt.bt} → ${bt.planta}">${bt.bt} → ${bt.planta}</div>
        <div class="gantt-track">
          <div class="gantt-today" style="left:${todayPct}%"></div>
          ${quiebrePct ? `<div class="gantt-quiebre" style="left:${quiebrePct}%" title="Quiebre: ${fmtDate(bt.cobQuiebre)}"></div>` : ''}
          <div class="gantt-block" style="left:${startPct}%;width:${w}%;background:${col}" title="${bt.bt} ETA ${fmtDate(bt.eta)} · ${bt.vol.toFixed(1)} MB">
            ${bt.producto} · ${bt.vol.toFixed(1)} MB · ETA ${fmtDate(bt.eta)}
          </div>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  document.getElementById('pB-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">📅 Timeline de Reposiciones BT</div>
      <div class="page-header-subtitle">Gantt de buques de transferencia · Ventana de 28 días · Línea roja = hoy</div>
    </div>
    ${buildDateBar('dateBarPB')}
    <div class="gantt-wrap">
      <div style="display:flex;align-items:center;margin-bottom:6px;gap:8px;padding:0 0 6px;border-bottom:1px solid var(--bdr)">
        <span style="width:160px;font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;font-weight:700">Buque → Destino</span>
        <div class="gantt-header" style="flex:1;margin-left:0">${dayHeaders}</div>
      </div>
      ${rows || '<div style="padding:40px;text-align:center;color:var(--txt3)">Sin buques registrados para esta fecha</div>'}
      <div style="margin-top:16px;display:flex;gap:16px;font-size:10px;color:var(--txt3);flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:2px;background:var(--red);display:inline-block"></span> Hoy</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:2px;background:var(--red);display:inline-block;opacity:.4;border-top:1px dashed var(--red)"></span> Fecha quiebre proyectada</span>
      </div>
    </div>
  `;
}

// PC: HEATMAP PLANTA × PRODUCTO
// ════════════════════════════════════════════════════════════════════════════
function renderPC() {
  const today = byLatest();
  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  const active = today.filter(r => !EXCLUIR.some(x => r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));

  const plantas   = [...new Set(active.map(r=>r.planta))].sort();
  const productos = [...new Set(active.map(r=>r.producto))].sort();

  // Build map
  const map = {};
  active.forEach(r => { map[r.planta+'||'+r.producto] = r.cob; });

  function hmClass(cob) {
    if (cob === undefined || cob === null) return 'hm-empty';
    if (cob <= 0) return 'hm-quiebre';
    if (cob < 4)  return 'hm-crit';
    if (cob < 7)  return 'hm-warn';
    if (cob < 12) return 'hm-ok';
    return 'hm-great';
  }

  const headerCols = productos.map(p=>`<th>${p}</th>`).join('');
  const bodyRows = plantas.map(planta => {
    const cells = productos.map(prod => {
      const cob = map[planta+'||'+prod];
      const label = cob !== undefined ? (cob > 0 ? cob+'d' : '⚠') : '·';
      return `<td class="hm-cell ${hmClass(cob)}" title="${planta} · ${prod} · ${cob!==undefined?cob+'d':'N/A'}">${label}</td>`;
    }).join('');
    return `<tr><td class="row-label">${planta}</td>${cells}</tr>`;
  }).join('');

  // Count per zone
  const vals = active.map(r=>r.cob).filter(c=>c>0);
  const q = [0,4,7,12];
  const counts = [
    active.filter(r=>r.cob<=0).length,
    active.filter(r=>r.cob>0&&r.cob<4).length,
    active.filter(r=>r.cob>=4&&r.cob<7).length,
    active.filter(r=>r.cob>=7&&r.cob<12).length,
    active.filter(r=>r.cob>=12).length,
  ];

  document.getElementById('pC-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">⬛ Heatmap · Planta × Producto</div>
      <div class="page-header-subtitle">Cobertura en días por cada combinación planta/producto · ${fmtDate(currentDate)}</div>
    </div>
    ${buildDateBar('dateBarPC')}
    <div class="heatmap-wrap">
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:10px;font-weight:700;color:var(--txt3);align-self:center">LEYENDA:</span>
        <span class="hm-cell hm-quiebre" style="font-size:9.5px">0d Quiebre</span>
        <span class="hm-cell hm-crit"    style="font-size:9.5px">&lt;4d Crítico</span>
        <span class="hm-cell hm-warn"    style="font-size:9.5px">4–6d Vigilancia</span>
        <span class="hm-cell hm-ok"      style="font-size:9.5px">7–11d Normal</span>
        <span class="hm-cell hm-great"   style="font-size:9.5px">≥12d Holgado</span>
        <span class="hm-cell hm-empty"   style="font-size:9.5px">· Sin dato</span>
      </div>
      <div style="overflow-x:auto">
        <table class="heatmap-table">
          <thead><tr><th style="text-align:left;min-width:120px">Planta</th>${headerCols}</tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:10px;border-top:1px solid var(--bdr);font-size:10.5px;color:var(--txt2)">
        <span>⚠ <strong style="color:var(--red)">${counts[0]}</strong> quiebres</span>
        <span>🔴 <strong style="color:var(--red)">${counts[1]}</strong> críticas</span>
        <span>🟡 <strong style="color:var(--yel)">${counts[2]}</strong> vigilancia</span>
        <span>🟢 <strong style="color:var(--grn)">${counts[3]}</strong> normal</span>
        <span>✅ <strong style="color:#4ade80">${counts[4]}</strong> holgado</span>
      </div>
    </div>
  `;
}

// PD: CURVA DE INVENTARIO PROYECTADO
// ════════════════════════════════════════════════════════════════════════════
let curveProdFilter = 'Diesel';
let curveCharts = {};

function setCurveProd(prod) {
  curveProdFilter = prod;
  renderPD();
}

function renderPD() {
  const today = byLatest();
  const EXCLUIR = ['ULSD EXPO','Regular HS'];
  const active = today.filter(r => !EXCLUIR.some(x => r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));

  const productos = [...new Set(active.map(r=>r.producto))].sort();
  if (!productos.includes(curveProdFilter)) curveProdFilter = productos[0]||'';

  const prodBtns = productos.map(p =>
    `<button class="curve-prod-btn ${p===curveProdFilter?'active':''}" onclick="setCurveProd('${p.replace(/'/g,"\\'")}');">${p}</button>`
  ).join('');

  // Filter records
  const rows = active.filter(r => r.producto === curveProdFilter).sort((a,b) => (a.cob||999) - (b.cob||999));

  // Destroy previous charts
  Object.values(curveCharts).forEach(ch => { try{ch.destroy();}catch(e){} });
  curveCharts = {};

  // Build cards per planta
  const cards = rows.map(r => {
    const inv   = r.inv   || 0;
    // Use vfact > pronSheet > dem_prom as demand rate
    const pk = r.planta + '|' + r.producto;
    const pronV = pronSheet[pk] || r.pron_mes || r.pron || 0;
    const vfactV = r.vfact || 0;
    const dem   = Math.abs(vfactV > 0 ? vfactV : (pronV > 0 ? pronV : (r.dem_prom || r.dem || 0)));
    const days  = 21;

    // Quiebre y BT
    const daysToQuiebre = dem > 0 ? Math.floor(inv/dem) : 999;
    const btETA = r.fecha_reposicion || '';
    const cobDias = r.cob || 0;
    const statusColor = cobDias < 4 ? '#ef4444' : cobDias < 7 ? '#eab308' : '#22c55e';

    const cardId = 'curve_' + r.planta.replace(/[^a-zA-Z0-9]/g,'_');

    return `
      <div class="curve-card">
        <div class="curve-card-title">
          <span style="width:8px;height:8px;border-radius:50%;background:${statusColor};display:inline-block"></span>
          ${r.planta}
          <span style="margin-left:auto;font-size:10px;color:var(--txt3);font-weight:500">${(inv).toFixed?inv.toFixed(2):inv} MB inv · ${cobDias}d cob</span>
        </div>
        <div class="curve-canvas-wrap"><canvas id="${cardId}"></canvas></div>
        <div class="curve-status">
          <span class="curve-tag ${cobDias<4?'warn':'ok'}">Quiebre en ~${daysToQuiebre}d</span>
          ${btETA ? `<span class="curve-tag ok">🚢 BT ETA ${fmtDate(btETA)}</span>` : ''}
          <span class="curve-tag ${dem>0?'ok':'warn'}" style="margin-left:auto">Dem: ${(dem).toFixed?dem.toFixed(2):dem} MB/d</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('pD-content').innerHTML = `
    <div class="page-header">
      <div class="page-header-title">📉 Curva de Inventario Proyectado</div>
      <div class="page-header-subtitle">Proyección de consumo vs quiebre por planta · ${fmtDate(currentDate)}</div>
    </div>
    ${buildDateBar('dateBarPD')}
    <div class="curve-wrap">
      <div class="curve-controls">
        <span style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px">Producto:</span>
        ${prodBtns}
      </div>
      <div class="curve-chart-grid">${cards}</div>
    </div>
  `;

  // Render charts after DOM is ready
  setTimeout(() => {
    rows.forEach(r => {
      const inv = r.inv || 0;
      // Use vfact > pronóstico > dem_prom as demand rate for projection
      const pronKey = r.planta + '|' + r.producto;
      const pronVal = pronSheet[pronKey] || r.pron_mes || r.pron || 0;
      const vfactVal = r.vfact || 0;
      const dem = vfactVal > 0 ? vfactVal : (pronVal > 0 ? pronVal : (r.dem_prom || r.dem || 0));
      const demAbs = Math.abs(dem); // Ensure positive consumption rate
      const days = 21;
      const labels = [];
      const invLine = [];
      const critLine = [];

      let curInv = inv;
      const btEtaMs = r.fecha_reposicion ? new Date(r.fecha_reposicion+'T12:00:00').getTime() : null;
      const btVol = (r.vol_rep||0) + (r.vol_rep_bt2||0);
      let btAdded = false;

      for (let d = 0; d <= days; d++) {
        const dt = new Date(currentDate+'T12:00:00');
        dt.setDate(dt.getDate()+d);
        labels.push(dt.getDate()+'/'+(dt.getMonth()+1));
        invLine.push(Math.round(Math.max(0, curInv)*100)/100);
        critLine.push(0); // Zero line for reference
        // BT replenishment
        if (!btAdded && btEtaMs && dt.getTime() >= btEtaMs && btVol > 0) {
          curInv += btVol;
          btAdded = true;
        }
        curInv -= demAbs;
      }

      const cardId = 'curve_' + r.planta.replace(/[^a-zA-Z0-9]/g,'_');
      const ctx = document.getElementById(cardId);
      if (!ctx) return;
      curveCharts[cardId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Inventario (MB)',
              data: invLine,
              borderColor: r.cob < 4 ? '#ef4444' : r.cob < 7 ? '#eab308' : '#2d8cf0',
              backgroundColor: r.cob < 4 ? 'rgba(239,68,68,.08)' : 'rgba(45,140,240,.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 2,
              borderWidth: 2,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {display: false},
            tooltip: {
              callbacks: {
                label: ctx => ctx.parsed.y.toFixed(2) + ' MB'
              }
            }
          },
          scales: {
            x: {grid:{display:false}, ticks:{color:cssVar('--txt3'),font:{size:9}}},
            y: {grid:{color:cssVar('--bdr')}, ticks:{color:cssVar('--txt3'),font:{size:9}}, min:0}
          }
        }
      });
    });
  }, 50);
}

// PE: SIMULADOR DE EMBARQUES BT  v3
// Performance fix: debounced render, no re-render on every keystroke
// UX fix: product capacities defined FIRST, then stops per terminal
// ════════════════════════════════════════════════════════════════════════════

};
const SHIP_COLORS = ['#1d4ed8','#7c3aed','#0891b2','#c2410c','#15803d','#be185d','#b45309'];
const PRODUCTS    = ['Diesel','G. Regular','G. Premium','G84','GLP','TA1','Turbo','ULSD','B100','G. 90 Insumo','G. 95 Insumo','Nafta Craqueada','Nafta Reformada'];
const PORTS_LIST  = Object.keys(DIST_H);
const ALL_PLANTS  = Object.keys(PORT_ALIAS).sort();

let simShips    = [];
let simNextId   = 1;
let simActiveId = null;
let simInited   = false;
let _simRenderTimer = null;

// ── Debounced render: prevents re-render on every keystroke ─────────────────
function simRenderDebounced(immediate) {
  if (immediate) { renderPE(); return; }
  clearTimeout(_simRenderTimer);
  _simRenderTimer = setTimeout(renderPE, 300);
}

// ── State update helpers (NO render inside — caller decides) ────────────────
function getDistDays(from, to) {
  const pf = PORT_ALIAS[from]||from, pt = PORT_ALIAS[to]||to;
  return (DIST_H[pf]&&DIST_H[pf][pt]!=null) ? DIST_H[pf][pt]/24 : null;
}

function simRecalcETAs(ship) {
  let cur   = ship.origen;
  let curDt = ship.zarpeDate ? new Date(ship.zarpeDate+'T12:00:00') : new Date();
  ship.stops.forEach(st => {
    const d = getDistDays(cur, st.planta);
    if (d !== null) {
      curDt = new Date(curDt.getTime() + d*86400000);
      st.etaDate = curDt.toISOString().slice(0,10);
    }
    cur = st.planta;
  });
}

function simLoad() {
  if (simInited) return;
  simInited = true;
  const today = byLatest();
  const btMap = {};
  today.forEach(r => {
    if (!r.bt||r.bt===''||r.bt==='-') return;
    if (!btMap[r.bt]) btMap[r.bt] = {name:r.bt, origen:r.planta, prodCap:{}, stops:{}};
    const v1 = r.vol_rep     || 0;
    const v2 = r.vol_rep_bt2 || 0;
    if (v1>0) {
      const k = r.planta+'||'+r.producto+'||1';
      btMap[r.bt].stops[k] = {planta:r.planta, producto:r.producto, vol:parseFloat(v1.toFixed(2)), etaDate:r.fecha_reposicion||'',
        prods:[{producto:r.producto, vol:parseFloat(v1.toFixed(2))}]};
      btMap[r.bt].prodCap[r.producto] = (btMap[r.bt].prodCap[r.producto]||0) + v1;
    }
    if (v2>0) {
      const k = r.planta+'||'+r.producto+'||2';
      const prod2 = r.producto+'(BT2)';
      btMap[r.bt].stops[k] = {planta:r.planta, producto:prod2, vol:parseFloat(v2.toFixed(2)), etaDate:r.fecha_repos_bt2||'',
        prods:[{producto:prod2, vol:parseFloat(v2.toFixed(2))}]};
      btMap[r.bt].prodCap[prod2] = (btMap[r.bt].prodCap[prod2]||0) + v2;
    }
  });
  Object.values(btMap).forEach(bt => {
    const totalCap = Object.values(bt.prodCap).reduce((a,v)=>a+v,0);
    const ship = {
      id: simNextId++, name: bt.name,
      volTotal: Math.round(totalCap*10)/10,
      origen: bt.origen||'Talara',
      zarpeDate: currentDate||'',
      prodCap: bt.prodCap,
      stops: Object.values(bt.stops),
    };
    simRecalcETAs(ship);
    simShips.push(ship);
  });
  if (simShips.length) simActiveId = simShips[0].id;
}

function simGetActive() { return simShips.find(s=>s.id===simActiveId)||null; }

// ── Direct DOM updates (no re-render) for inputs ────────────────────────────
function simFieldDirect(id, field, val) {
  const s = simShips.find(s=>s.id===id);
  if (!s) return;
  if (field==='volTotal') s.volTotal = parseFloat(val)||0;
  else s[field] = val;
  if (field==='zarpeDate'||field==='origen') { simRecalcETAs(s); simRenderDebounced(true); }
  else simUpdateFleetSidebar(s);
}

function simProdCapDirect(id, prod, val) {
  const s = simShips.find(s=>s.id===id);
  if (!s) return;
  if (!s.prodCap) s.prodCap={};
  s.prodCap[prod] = parseFloat(val)||0;
  // Recompute total
  s.volTotal = Object.values(s.prodCap).reduce((a,v)=>a+v,0);
  s.volTotal = Math.round(s.volTotal*100)/100;
  // Update total field in DOM directly
  const tf = document.getElementById('sim-voltotal-'+id);
  if (tf) tf.value = s.volTotal;
  simUpdateCapBar(s);
}

function simStopVolDirect(shipId, idx, val) {
  const s = simShips.find(s=>s.id===shipId);
  if (!s||!s.stops[idx]) return;
  s.stops[idx].vol = parseFloat(val)||0;
  simUpdateStopCoverage(s, idx);
  simUpdateCapBar(s);
}

// ── Targeted DOM update helpers (partial refresh, not full re-render) ────────
function simUpdateFleetSidebar(ship) {
  const el = document.getElementById('sim-sidebar-'+ship.id);
  if (!el) { simRenderDebounced(false); return; }
  const used = ship.stops.reduce((a,st)=>a+st.vol,0);
  const pct  = ship.volTotal>0 ? Math.min(100,used/ship.volTotal*100) : 0;
  const fillC = pct>100?'#e03434':pct>90?'#c9970a':'#1a9e50';
  el.querySelector('.sim-sb-meta').textContent = `${ship.stops.length} escalas · ${used.toFixed(1)}/${ship.volTotal} MB`;
  el.querySelector('.sim-sb-fill').style.width = pct+'%';
  el.querySelector('.sim-sb-fill').style.background = fillC;
}

function simUpdateCapBar(ship) {
  const used    = ship.stops.reduce((a,st)=>a+st.vol,0);
  const pct     = ship.volTotal>0 ? Math.min(100,used/ship.volTotal*100) : 0;
  const remain  = ship.volTotal - used;
  const capColor= pct>100?'#e03434':pct>90?'#c9970a':'#1a9e50';
  const fillEl  = document.getElementById('sim-capfill-'+ship.id);
  const numEl   = document.getElementById('sim-capnums-'+ship.id);
  if (fillEl) { fillEl.style.width=pct+'%'; fillEl.style.background=capColor; }
  if (numEl)  { numEl.style.color=capColor; numEl.textContent=`${used.toFixed(1)} / ${ship.volTotal} MB  ${remain>=0?remain.toFixed(1)+' libre':Math.abs(remain).toFixed(1)+' exceso'}`; }
  // Update per-product bars
  const byProd = {};
  ship.stops.forEach(st=>{ byProd[st.producto]=(byProd[st.producto]||0)+st.vol; });
  Object.entries(byProd).forEach(([prod,assign])=>{
    const cap    = ship.prodCap&&ship.prodCap[prod]||0;
    const pct2   = cap>0 ? Math.min(100,assign/cap*100) : (ship.volTotal>0?assign/ship.volTotal*100:0);
    const rem    = cap>0 ? cap-assign : null;
    const fillC  = rem!==null ? (rem<0?'#e03434':rem===0?'#c9970a':'#1a9e50') : '#1d4ed8';
    const barEl  = document.getElementById('sim-prodfill-'+ship.id+'-'+prod.replace(/[^a-z0-9]/gi,'_'));
    const numEl2 = document.getElementById('sim-prodnums-'+ship.id+'-'+prod.replace(/[^a-z0-9]/gi,'_'));
    if (barEl)  { barEl.style.width=pct2.toFixed(0)+'%'; barEl.style.background=fillC; }
    if (numEl2) { numEl2.textContent = assign.toFixed(1)+' MB'+(rem!==null?' ('+(rem>=0?'-'+rem.toFixed(1):'+'+Math.abs(rem).toFixed(1))+'MB)':''); numEl2.style.color=fillC; }
  });
  simUpdateFleetSidebar(ship);
}

function simUpdateStopCoverage(ship, idx) {
  const st      = ship.stops[idx];
  if (!st) return;
  const liveData = byLatest();
  const liveRec  = liveData.find(r=>r.planta===st.planta&&r.producto===st.producto);
  const liveCob  = liveRec ? (liveRec.cob||0) : null;
  const invBbl     = liveRec ? (liveRec.inv||0) : 0;
  const cobCurr    = liveRec ? (liveRec.cob||0) : 0;
  const volBbl     = st.vol;  // Already MB
  const pron2      = liveRec ? (liveRec.pron||0) : 0;
  const vfact2     = liveRec ? (liveRec.vfact||0) : 0;
  const demImpl    = cobCurr>0&&invBbl>0 ? invBbl/cobCurr : 0;
  let newCob  = demImpl>0&&st.vol>0 ? Math.floor((invBbl+volBbl)/demImpl) : null;
  let newCobB = null;
  if (newCob!==null && pron2>0 && vfact2>0 && vfact2<pron2) newCobB=Math.floor(newCob*(pron2/vfact2));
  else newCobB=newCob;
  function cobColor2(c){ return !c||c<=0?'#e03434':c<4?'#e03434':c<8?'#d96b1a':c<13?'#c9970a':'#1a9e50'; }
  const cobEl   = document.getElementById('sim-covnew-'+ship.id+'-'+idx);
  const deltaEl = document.getElementById('sim-covdelta-'+ship.id+'-'+idx);
  const pctEl   = document.getElementById('sim-covpct-'+ship.id+'-'+idx);
  const barEl   = document.getElementById('sim-covbar-'+ship.id+'-'+idx);
  if (cobEl && newCob!==null) { cobEl.textContent=newCob+'d'; cobEl.style.color=cobColor2(newCob); }
  if (deltaEl && liveCob!==null && newCob!==null) {
    const delta=newCob-liveCob;
    deltaEl.textContent=(delta>0?'+':'')+delta+'d';
    deltaEl.style.background=delta>0?'rgba(26,158,80,.12)':'rgba(224,52,52,.12)';
    deltaEl.style.color=delta>0?'#1a9e50':'#e03434';
    deltaEl.style.borderColor=delta>0?'rgba(26,158,80,.3)':'rgba(224,52,52,.3)';
    deltaEl.style.visibility='visible';
  }
  if (pctEl && ship.volTotal>0) pctEl.textContent=(st.vol/ship.volTotal*100).toFixed(0)+'%';
  if (barEl && ship.volTotal>0) barEl.style.width=Math.min(100,st.vol/ship.volTotal*100)+'%';

}
function simAddShip() {
  const id = simNextId++;
  simShips.push({id, name:'NUEVO-'+id, volTotal:0, origen:'Talara',
    zarpeDate:currentDate||'', prodCap:{}, stops:[]});
  simActiveId=id; renderPE();
}
function simDelShip(id) {
  simShips=simShips.filter(s=>s.id!==id);
  if(simActiveId===id) simActiveId=simShips.length?simShips[0].id:null;
  renderPE();
}
function simSelect(id) { simActiveId=id; renderPE(); }
function simAddProd(id) {
  const s=simShips.find(s=>s.id===id); if(!s) return;
  if (!s.prodCap) s.prodCap={};
  // Find a product not already in prodCap
  const used = Object.keys(s.prodCap);
  const next = PRODUCTS.find(p=>!used.includes(p))||PRODUCTS[0];
  s.prodCap[next]=0; renderPE();
}
function simDelProd(id, prod) {
  const s=simShips.find(s=>s.id===id); if(!s||!s.prodCap) return;
  delete s.prodCap[prod];
  s.volTotal=Object.values(s.prodCap).reduce((a,v)=>a+v,0);
  // Remove stops for this product
  s.stops=s.stops.filter(st=>st.producto!==prod);
  simRecalcETAs(s); renderPE();
}
function simChangeProdName(id, oldProd, newProd) {
  const s=simShips.find(s=>s.id===id); if(!s||!s.prodCap) return;
  const vol = s.prodCap[oldProd]||0;
  delete s.prodCap[oldProd];
  s.prodCap[newProd]=vol;
  s.stops.forEach(st=>{ if(st.producto===oldProd) st.producto=newProd; });
  renderPE();
}
function simAddStop(id) {
  const s=simShips.find(s=>s.id===id); if(!s) return;
  const today2=byLatest();
  const EXCLUIR=['ULSD EXPO','Regular HS'];
  const active2=today2.filter(r=>!EXCLUIR.some(x=>r.producto&&r.producto.toUpperCase().includes(x.toUpperCase())));
  // Pick most critical plant that has one of our products
  const myProds=Object.keys(s.prodCap||{});
  const crit=active2.filter(r=>r.cob>0&&r.cob<10&&(myProds.length===0||myProds.includes(r.producto))).sort((a,b)=>a.cob-b.cob);
  const sug=crit[0]||null;
  const defaultProd=myProds[0]||'Diesel';
  const newStop = {planta:sug?sug.planta:'Callao', producto:sug?sug.producto:defaultProd, vol:0, etaDate:'',
    prods:[{producto:sug?sug.producto:defaultProd, vol:0}]};
  s.stops.push(newStop);
  simRecalcETAs(s); renderPE();
}
function simDelStop(shipId, idx) {
  const s=simShips.find(s=>s.id===shipId); if(!s) return;
  s.stops.splice(idx,1); simRecalcETAs(s); renderPE();
}
function simStopSelectField(shipId, idx, field, val) {
  const s=simShips.find(s=>s.id===shipId); if(!s||!s.stops[idx]) return;
  s.stops[idx][field]=val; simRecalcETAs(s); renderPE();
}
// ── Multi-product per stop ───────────────────────────────────────────────────
function simEnsureProds(stop) {
  // Migrate old single-product stops to new multi-product format
  if (!stop.prods) {
    stop.prods = [{producto: stop.producto||'Diesel', vol: stop.vol||0}];
  }
}
function simStopAddProd(shipId, stopIdx) {
  const s=simShips.find(s=>s.id===shipId); if(!s||!s.stops[stopIdx]) return;
  const st = s.stops[stopIdx];
  simEnsureProds(st);
  const myProds = Object.keys(s.prodCap||{});
  const used = st.prods.map(p=>p.producto);
  const next = myProds.find(p=>!used.includes(p)) || (PRODUCTS.find(p=>!used.includes(p))||'Diesel');
  st.prods.push({producto: next, vol: 0});
  renderPE();
}
function simStopDelProd(shipId, stopIdx, prodIdx) {
  const s=simShips.find(s=>s.id===shipId); if(!s||!s.stops[stopIdx]) return;
  const st = s.stops[stopIdx];
  simEnsureProds(st);
  if (st.prods.length <= 1) return; // keep at least 1
  st.prods.splice(prodIdx,1);
  simUpdateStopTotals(st);
  renderPE();
}
function simStopProdField(shipId, stopIdx, prodIdx, field, val) {
  const s=simShips.find(s=>s.id===shipId); if(!s||!s.stops[stopIdx]) return;
  const st = s.stops[stopIdx];
  simEnsureProds(st);
  if (!st.prods[prodIdx]) return;
  st.prods[prodIdx][field] = field==='vol' ? (parseFloat(val)||0) : val;
  simUpdateStopTotals(st);
  simUpdateCapBar(s);
}
function simUpdateStopTotals(st) {
  simEnsureProds(st);
  st.vol = st.prods.reduce((a,p)=>a+p.vol, 0);
}
function simExportCSV() {
  const fechaProg = currentDate || new Date().toISOString().slice(0,10);
  const rows = [['FECHA_PROG','BUQUE','ORIGEN','ZARPE','VOL_TOTAL_MB','#ESCALA','PLANTA','PRODUCTO','VOL_MB','ETA','DIST_DIAS']];
  simShips.forEach(s => {
    const totalVol = s.stops.reduce((a,st)=>a+(st.vol||0), 0);
    s.stops.forEach((st, i) => {
      const prev = i===0 ? s.origen : s.stops[i-1].planta;
      const d    = getDistDays(prev, st.planta);
      const prods= st.prods && st.prods.length ? st.prods : [{producto:st.producto||'',vol:st.vol||0}];
      prods.forEach(pr => {
        rows.push([fechaProg,s.name,s.origen,s.zarpeDate,totalVol.toFixed(2),i+1,st.planta,pr.producto,pr.vol,st.etaDate,d?d.toFixed(1):'—']);
      });
    });
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'sim_bt_'+(currentDate||'hoy')+'.csv';
  a.click();
}

// ── Save simulation to Google Sheets hoja mov_naves ──────────────────────────
async function simSaveToGS() {
  if (!simShips.length) { alert('No hay buques en la simulación.'); return; }
  const btn = document.getElementById('sim-save-btn');
  if (btn) { btn.textContent='⏳ Guardando...'; btn.disabled=true; }
  const fechaProg = currentDate || new Date().toISOString().slice(0,10);
  const timestamp = new Date().toLocaleString('es-PE');
  const rows = [];
  simShips.forEach(s => {
    const totalVol = s.stops.reduce((a,st)=>a+(st.vol||0),0);
    const lastEta  = s.stops.filter(st=>st.etaDate).pop();
    rows.push({tipo:'BUQUE',fecha_prog:fechaProg,timestamp,buque:s.name,origen:s.origen,
      zarpe:s.zarpeDate,vol_total_mb:totalVol.toFixed(2),n_escalas:s.stops.length,
      retorno_est:lastEta?lastEta.etaDate:'',escala_num:'',planta:'',eta:'',dist_dias:'',
      productos:Object.entries(s.prodCap||{}).map(([p,v])=>p+':'+v.toFixed(1)).join(' | ')});
    s.stops.forEach((st,i)=>{
      const prev=i===0?s.origen:s.stops[i-1].planta;
      const d=getDistDays(prev,st.planta);
      const prods=st.prods&&st.prods.length?st.prods:[{producto:st.producto||'',vol:st.vol||0}];
      prods.forEach(pr=>{
        rows.push({tipo:'ESCALA',fecha_prog:fechaProg,timestamp,buque:s.name,origen:s.origen,
          zarpe:s.zarpeDate,vol_total_mb:totalVol.toFixed(2),n_escalas:s.stops.length,
          retorno_est:lastEta?lastEta.etaDate:'',escala_num:i+1,planta:st.planta,
          eta:st.etaDate,dist_dias:d?d.toFixed(1):'',productos:pr.producto+':'+pr.vol.toFixed(1)});
      });
    });
  });
  try {
    await fetch(CONFIG.API_URL, {method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'saveMovNaves',fecha_prog:fechaProg,rows})});
    if (btn) { btn.textContent='✅ Guardado'; btn.disabled=false; }
    setTimeout(()=>{ if(btn) btn.textContent='💾 Guardar en GS'; },3000);
  } catch(err) {
    console.error('[SIM] Error al guardar:',err);
    if (btn) { btn.textContent='❌ Error'; btn.disabled=false; }
    setTimeout(()=>{ if(btn) btn.textContent='💾 Guardar en GS'; },3000);
  }
}

// ── Load saved simulation from Google Sheets ──────────────────────────────────
async function simLoadFromGS() {
  const btn = document.querySelector('[onclick*="simLoadFromGS"]') || document.getElementById('sim-reload-btn');
  if (btn) { btn.textContent='⏳ Cargando...'; btn.disabled=true; }
  
  try {
    const url = CONFIG.API_URL + '?action=getSimData';
    const resp = await fetch(url, {method:'GET', redirect:'follow'});
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const rows = await resp.json();
    
    if (!rows || !rows.length) {
      alert('No hay simulaciones guardadas en Google Sheets.');
      if (btn) { btn.textContent='↺ Recargar GS'; btn.disabled=false; }
      return;
    }
    
    console.log('[SIM] Cargando ' + rows.length + ' filas de GS');
    
    // Reset state
    simShips = [];
    simNextId = 1;
    simActiveId = null;
    
    // Group by buque name
    var shipMap = {};
    rows.forEach(function(r) {
      if (r.tipo === 'BUQUE') {
        var name = r.buque;
        if (!name) return;
        shipMap[name] = {
          name: name,
          origen: r.origen || 'Talara',
          zarpeDate: r.zarpe || '',
          volTotal: r.vol_total_mb || 0,
          prodCap: {},
          stops: []
        };
        // Parse prodCap from "Diesel:137.0 | G.Regular:20.0"
        if (r.productos) {
          r.productos.split('|').forEach(function(p) {
            var parts = p.trim().split(':');
            if (parts.length === 2) {
              shipMap[name].prodCap[parts[0].trim()] = parseFloat(parts[1]) || 0;
            }
          });
        }
      }
    });
    
    // Add stops to ships
    rows.forEach(function(r) {
      if (r.tipo === 'ESCALA' && r.buque && shipMap[r.buque]) {
        var prodName = '', prodVol = 0;
        if (r.productos) {
          var pp = r.productos.split(':');
          if (pp.length === 2) { prodName = pp[0].trim(); prodVol = parseFloat(pp[1]) || 0; }
        }
        
        // Check if we already have a stop for this planta+escala_num
        var existingStop = null;
        shipMap[r.buque].stops.forEach(function(st) {
          if (st.planta === r.planta && st._escNum === r.escala_num) existingStop = st;
        });
        
        if (existingStop) {
          // Add product to existing stop
          existingStop.prods.push({producto: prodName, vol: prodVol});
          existingStop.vol += prodVol;
        } else {
          shipMap[r.buque].stops.push({
            planta: r.planta || '',
            producto: prodName,
            vol: prodVol,
            etaDate: r.eta || '',
            prods: [{producto: prodName, vol: prodVol}],
            _escNum: r.escala_num
          });
        }
      }
    });
    
    // Build simShips
    Object.values(shipMap).forEach(function(ship) {
      var id = simNextId++;
      // Recalculate total volume from stops
      var totalVol = ship.volTotal;
      if (!totalVol) {
        totalVol = ship.stops.reduce(function(a, st) { return a + st.vol; }, 0);
      }
      simShips.push({
        id: id,
        name: ship.name,
        volTotal: Math.round(totalVol * 10) / 10,
        origen: ship.origen,
        zarpeDate: ship.zarpeDate,
        prodCap: ship.prodCap,
        stops: ship.stops
      });
    });
    
    if (simShips.length) simActiveId = simShips[0].id;
    simInited = true;
    
    console.log('[SIM] Cargados ' + simShips.length + ' buques desde GS');
    renderPE();
    
    if (btn) { btn.textContent='✅ Cargado'; btn.disabled=false; }
    setTimeout(function() { if(btn) btn.textContent='↺ Recargar GS'; }, 2000);
    
  } catch(err) {
    console.error('[SIM] Error al cargar:', err);
    if (btn) { btn.textContent='❌ Error'; btn.disabled=false; }
    setTimeout(function() { if(btn) btn.textContent='↺ Recargar GS'; }, 3000);
    // Fallback: load from live data
    simInited = false; simShips = []; simNextId = 1; simActiveId = null;
    renderPE();
  }
}

// ════════════════════════════════════════════════════════════════════════════
// renderPE — Full render (called only on structural changes)
// ════════════════════════════════════════════════════════════════════════════

function renderPE() {
  simLoad();
  const liveData   = byLatest();
  const EXCLUIR    = ['ULSD EXPO','Regular HS'];
  const liveActive = liveData.filter(r => !EXCLUIR.some(x => r.producto && r.producto.toUpperCase().includes(x.toUpperCase())));
  const cobMap     = {};
  liveActive.forEach(r => { cobMap[r.planta + '||' + r.producto] = r; });

  function cobColor(c) {
    if (!c || c <= 0) return '#e03434';
    if (c < 4)  return '#e03434';
    if (c < 8)  return '#d96b1a';
    if (c < 13) return '#c9970a';
    return '#1a9e50';
  }

  function fmtD(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('es-PE', {day:'2-digit', month:'short'});
  }

  function addDays(dateStr, days) {
    if (!dateStr || !days) return null;
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + Math.round(days));
    return d.toISOString().slice(0, 10);
  }

  const active = simGetActive();

  // ── LEFT: Fleet sidebar ────────────────────────────────────────────────────
  let fleetHTML = '';
  if (simShips.length === 0) {
    fleetHTML = '<div style="padding:20px 12px;text-align:center;font-size:11px;color:var(--txt3)">Sin buques.<br>Añade uno →</div>';
  } else {
    simShips.forEach((s, i) => {
      const used  = s.stops.reduce((a, st) => a + st.vol, 0);
      const pct   = s.volTotal > 0 ? Math.min(100, used / s.volTotal * 100) : 0;
      const fillC = pct > 100 ? '#e03434' : pct > 90 ? '#c9970a' : '#1a9e50';
      const col   = SHIP_COLORS[i % SHIP_COLORS.length];
      const isAct = s.id === simActiveId;
      fleetHTML += '<div id="sim-sidebar-' + s.id + '" class="sim-ship-btn' + (isAct ? ' active' : '') + '" onclick="simSelect(' + s.id + ')">';
      fleetHTML += '<div class="sim-ship-avatar" style="background:' + col + '">' + s.name.slice(0, 2).toUpperCase() + '</div>';
      fleetHTML += '<div class="sim-ship-info">';
      fleetHTML += '<div class="sim-ship-n">' + s.name + '</div>';
      fleetHTML += '<div class="sim-ship-meta sim-sb-meta">' + s.stops.length + ' escalas · ' + used.toFixed(1) + '/' + s.volTotal + ' MB</div>';
      fleetHTML += '</div>';
      fleetHTML += '<button class="sim-ship-xbtn" onclick="event.stopPropagation();simDelShip(' + s.id + ')" title="Eliminar">✕</button>';
      fleetHTML += '</div>';
      fleetHTML += '<div class="sim-capbar"><div class="sim-sb-fill sim-capbar-fill" style="width:' + pct + '%;background:' + fillC + '"></div></div>';
    });
  }

  // ── CENTER: Editor ─────────────────────────────────────────────────────────
  let editorHTML = '';
  if (!active) {
    editorHTML = '<div class="sim-editor-empty"><div style="font-size:40px">🚢</div><div style="font-size:13px;font-weight:700;color:var(--txt2)">Selecciona o agrega un buque</div></div>';
  } else {
    const shipIdx  = simShips.findIndex(s => s.id === active.id);
    const col      = SHIP_COLORS[shipIdx % SHIP_COLORS.length];
    const used     = active.stops.reduce((a, st) => a + st.vol, 0);
    const pct      = active.volTotal > 0 ? Math.min(100, used / active.volTotal * 100) : 0;

    cfg += '<div id="sim-capnums-' + active.id + '" style="font-size:11.5px;font-weight:800;font-family:var(--mono);color:' + capColor + ';white-space:nowrap;min-width:160px;text-align:right">' + used.toFixed(1) + ' / ' + active.volTotal + ' MB  ' + (remain >= 0 ? remain.toFixed(1) + ' libre' : Math.abs(remain).toFixed(1) + ' exceso') + '</div>';

        // Coverage indicator (compact)

        stopsHTML += '<input class="sim-fld-input" type="number" value="'+(pr.vol||'')+'" min="0" step="0.1" placeholder="0.0"';

        stopsHTML += '</div>'; // sim-stop-prod-row
      });

      stopsHTML += '<div style="height:100%;width:'+pctVol.toFixed(0)+'%;background:'+col+';border-radius:2px;transition:width .4s"></div>';

      stopsHTML += '<span style="font-size:9.5px;color:var(--txt3);font-family:var(--mono);min-width:32px;text-align:right">'+pctVol.toFixed(0)+'%</span>';
      stopsHTML += '</div>';

      stopsHTML += '</div>'; // sim-stop-card
    });

    if (!stopsHTML) {
      const noProds = Object.keys(prodCap).length === 0;
      stopsHTML = '<div style="text-align:center;padding:24px;color:var(--txt3);font-size:11px">' + (noProds ? '⚠ Define primero los productos y capacidades arriba' : 'Sin escalas. Añade la primera parada →') + '</div>';

    const nStops = active.stops.length;
    editorHTML = cfg;
    editorHTML += '<div class="sim-stops-header"><div class="sim-stops-label">🗺 Ruta de Escalas — ' + nStops + ' parada' + (nStops !== 1 ? 's' : '') + '</div>';
    editorHTML += '<button class="sim-btn sim-btn-primary" onclick="simAddStop(' + active.id + ')" style="font-size:10px;padding:5px 12px">+ Escala</button></div>';
    editorHTML += '<div class="sim-stops-list">' + stopsHTML + '</div>';
  }

  // ── RIGHT: Summary ─────────────────────────────────────────────────────────
  const totalCap  = simShips.reduce((a, s) => a + s.volTotal, 0);
  const totalUsed = simShips.reduce((a, s) => a + s.stops.reduce((b, st) => b + st.vol, 0), 0);
  const utilPct   = totalCap > 0 ? (totalUsed / totalCap * 100).toFixed(0) : 0;

  const today3 = currentDate ? new Date(currentDate + 'T12:00:00') : new Date();
  const DAYS   = 30;
  let miniGantt = '';
  simShips.forEach(function(s, i) {
    const col2   = SHIP_COLORS[i % SHIP_COLORS.length];
    const zOff   = s.zarpeDate ? (new Date(s.zarpeDate + 'T12:00:00') - today3) / 86400000 : 0;
    const last   = s.stops.filter(st => st.etaDate).pop();
    const lastOff= last ? (new Date(last.etaDate + 'T12:00:00') - today3) / 86400000 : zOff + 5;
    const left   = Math.max(0, zOff / DAYS * 100);
    const w      = Math.max(3, Math.min(100 - left, (lastOff - zOff) / DAYS * 100));

    miniGantt += '<div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);opacity:.5"></div>';
    miniGantt += '</div></div>';
  });
  if (!miniGantt) miniGantt = '<div style="font-size:10px;color:var(--txt3)">Sin viajes</div>';

  const allStops = simShips.flatMap((s, i) => s.stops.map(st => Object.assign({}, st, {shipName: s.name, col: SHIP_COLORS[i % SHIP_COLORS.length]})));
  allStops.sort((a, b) => (a.etaDate || '').localeCompare(b.etaDate || ''));
  let stopsListHTML = '';
  allStops.slice(0, 15).forEach(function(st) {
    stopsListHTML += '<div class="sim-sum-stop">';
    stopsListHTML += '<div class="sim-sum-stop-dot" style="background:' + st.col + '"></div>';
    stopsListHTML += '<div style="flex:1;min-width:0"><div class="sim-sum-stop-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + st.planta + ' · ' + st.producto + '</div><div style="font-size:9px;color:var(--txt3)">' + st.shipName + '</div></div>';
    stopsListHTML += '<div style="text-align:right;flex-shrink:0"><div class="sim-sum-stop-vol">' + st.vol.toFixed(1) + ' MB</div><div class="sim-sum-stop-eta">' + (st.etaDate ? fmtD(st.etaDate) : '') + '</div></div>';
    stopsListHTML += '</div>';
  });
  if (!stopsListHTML) stopsListHTML = '<div style="font-size:10px;color:var(--txt3);padding:8px 0">Sin escalas</div>';

  const utilColor = parseFloat(utilPct) > 100 ? 'var(--red)' : 'var(--acc2)';
  const summaryHTML = '<div class="sim-sum-section"><div class="sim-sum-title">Resumen Flota</div>'
    + '<div class="sim-kpi2"><span class="sim-kpi2-lbl">Buques</span><span class="sim-kpi2-val">' + simShips.length + '</span></div>'
    + '<div class="sim-kpi2"><span class="sim-kpi2-lbl">Cap. Total</span><span class="sim-kpi2-val">' + totalCap.toFixed(1) + ' MB</span></div>'
    + '<div class="sim-kpi2"><span class="sim-kpi2-lbl">Asignado</span><span class="sim-kpi2-val">' + totalUsed.toFixed(1) + ' MB</span></div>'
    + '<div class="sim-kpi2"><span class="sim-kpi2-lbl">Utilización</span><span class="sim-kpi2-val" style="color:' + utilColor + '">' + utilPct + '%</span></div>'
    + '<div class="sim-kpi2"><span class="sim-kpi2-lbl">Escalas</span><span class="sim-kpi2-val">' + allStops.length + '</span></div>'
    + '</div>'
    + '<div class="sim-sum-section"><div class="sim-sum-title">Timeline (30d)</div><div class="sim-mini-gantt">' + miniGantt + '</div></div>'
    + '<div class="sim-sum-section" style="flex:1"><div class="sim-sum-title">Próximas Escalas</div>' + stopsListHTML + '</div>';

  const dateStr = currentDate ? fmtDate(currentDate) : '—';
  document.getElementById('pE-content').innerHTML = '<div class="sim-page">'
    + '<div class="sim-toolbar">'
    + '<div class="sim-toolbar-title">🛳️ Simulador de Embarques BT</div>'
    + '<button class="sim-btn sim-btn-primary" onclick="simAddShip()">+ Nuevo Buque</button>'
    + '<button class="sim-btn sim-btn-ghost" onclick="simExportCSV()">⬇ CSV</button>'
    + '<button id="sim-save-btn" class="sim-btn" style="background:var(--grn);color:#fff;border-color:var(--grn);font-size:11px" onclick="simSaveToGS()">💾 Guardar en GS</button>'
    + '<button id="sim-reload-btn" class="sim-btn sim-btn-ghost" onclick="simLoadFromGS()" style="font-size:10px;margin-left:auto">\u21BA Recargar GS</button>'
    + '<div style="font-size:9px;color:var(--txt3)">Dist: Petroperú 1996 · ' + dateStr + '</div>'
    + '</div>'
    + '<div class="sim-body">'
    + '<div class="sim-fleet"><div class="sim-fleet-hdr">Flota (' + simShips.length + ')</div>' + fleetHTML + '</div>'
    + '<div class="sim-editor">' + editorHTML + '</div>'
    + '<div class="sim-summary">' + summaryHTML + '</div>'
    + '</div>'
    + '</div>';
}


// ── Global delegated handler for sim stop product inputs ─────────────────────
document.addEventListener('change', function(e) {
  const el = e.target;
  if (!el.dataset.simAction) return;
  const action  = el.dataset.simAction;
  const shipId  = parseInt(el.dataset.shipId);
  const stopIdx = parseInt(el.dataset.stopIdx);
  const prodIdx = el.dataset.prodIdx !== undefined ? parseInt(el.dataset.prodIdx) : -1;
  const val     = el.value;
  if (action === 'stopProdVol') {
    simStopProdField(shipId, stopIdx, prodIdx, 'vol', val);
  } else if (action === 'stopProdProd') {
    simStopProdField(shipId, stopIdx, prodIdx, 'produto', val);
    simStopSelectField(shipId, stopIdx, 'planta', document.querySelector('[data-sim-action="stopPlanta"][data-ship-id="'+shipId+'"][data-stop-idx="'+stopIdx+'"]')?.value || '');
  } else if (action === 'stopPlanta') {
    simStopSelectField(shipId, stopIdx, 'planta', val);
  } else if (action === 'stopProdSelect') {
    simStopProdField(shipId, stopIdx, prodIdx, 'producto', val);
  }
});
document.addEventListener('input', function(e) {
  const el = e.target;
  if (el.dataset.simAction !== 'stopProdVol') return;
  const shipId  = parseInt(el.dataset.shipId);
  const stopIdx = parseInt(el.dataset.stopIdx);
  const prodIdx = parseInt(el.dataset.prodIdx);
  simStopProdField(shipId, stopIdx, prodIdx, 'vol', el.value);
});

  'ULSD':'Diesel',

};
const ED_SKIP = new Set(['Alcohol','B-100','PI6','PI500','D2 UV','SOL1','SOL3',

function mapEDProduct(p) {
  if (!p) return null;
  var c = p.trim();
  if (ED_SKIP.has(c)) return null;
  if (ED_PRODUCT_MAP[c]) return ED_PRODUCT_MAP[c];
  return null;
}

// ── Formatear fecha JS Date → YYYY-MM-DD ───────────────────────────────────
function dateToYMD(d) {
  if (!d) return '';
  if (!(d instanceof Date)) d = new Date(d);
  if (isNaN(d.getTime())) return '';
  var y = d.getFullYear(), m = d.getMonth()+1, dd = d.getDate();
  return y + '-' + String(m).padStart(2,'0') + '-' + String(dd).padStart(2,'0');
}

      + '<div style="font-size:16px;font-weight:700;color:var(--txt);margin-bottom:8px">Error al cargar m\u00f3dulo de carga</div>'
      + '<div style="font-size:12px;color:var(--txt2)">' + err.message + '</div></div>';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// E&D EXCEL PARSER — Bug-free v2
// ═══════════════════════════════════════════════════════════════════════════

function handleEDFile(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    addUploadLog(false, 'Error: Librer\u00eda SheetJS no cargada. Recarga la p\u00e1gina.');
    var prev = document.getElementById('ed-preview');
    if (prev) prev.innerHTML = '<div style="padding:16px;color:var(--red);font-size:11px">\u274C La librer\u00eda SheetJS no est\u00e1 disponible. <button onclick="location.reload()" style="color:var(--acc);background:none;border:none;cursor:pointer;text-decoration:underline;font-size:11px">Recargar p\u00e1gina</button></div>';
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array', cellDates:true, raw:true});

      // Buscar hoja del reporte
      var sheetName = null;
      for (var si = 0; si < wb.SheetNames.length; si++) {
        if (wb.SheetNames[si].indexOf('Reporte') >= 0) { sheetName = wb.SheetNames[si]; break; }
      }
      if (!sheetName) sheetName = wb.SheetNames[0];
      var ws = wb.Sheets[sheetName];
      var json = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', cellDates:true});

      // Buscar fila de encabezados (tiene "Planta" Y "Producto")
      var headerIdx = -1;
      for (var i = 0; i < Math.min(json.length, 15); i++) {
        var hasPlanta = false, hasProd = false;
        for (var j = 0; j < json[i].length; j++) {
          var cellStr = String(json[i][j]).toLowerCase().replace(/\n/g,' ');
          if (cellStr.indexOf('planta') >= 0) hasPlanta = true;
          if (cellStr.indexOf('producto') >= 0) hasProd = true;
        }
        if (hasPlanta && hasProd) { headerIdx = i; break; }
      }
      if (headerIdx === -1) throw new Error('No se encontr\u00f3 fila de encabezados (Planta/Producto)');

      var headers = [];
      for (var hi = 0; hi < json[headerIdx].length; hi++) {
        headers.push(String(json[headerIdx][hi]).trim().toLowerCase().replace(/\n/g,' '));
      }

      // ── FIX Bug #2: Mapeo exacto de columnas con prioridad ──
      var colMap = {fecha:-1, planta:-1, producto:-1, inv:-1, despacho:-1,
        prom7d:-1, autonomia:-1, capacidad:-1, condicion:-1, vacio:-1,
        fondos:-1, existencia_bruta:-1};
      // BT columns: buscar por posición (siempre después de vacío)
      var btCols = []; // [{idx, header}]

      for (var ci = 0; ci < headers.length; ci++) {
        var h = headers[ci];
        // Exactos primero
        if (h.indexOf('fecha') >= 0 && colMap.fecha === -1 && ci < 3) colMap.fecha = ci;
        if (h.indexOf('planta') >= 0 && colMap.planta === -1) colMap.planta = ci;
        if (h.indexOf('producto') >= 0 && colMap.producto === -1) colMap.producto = ci;
        if (h.indexOf('condici') >= 0) colMap.condicion = ci;
        if (h.indexOf('capacidad') >= 0) colMap.capacidad = ci;
        if (h.indexOf('fondo') >= 0) colMap.fondos = ci;

        // "Existencia Neta" vs "Existencia Bruta" — usar palabra exacta
        if (h.indexOf('existencia') >= 0 && h.indexOf('net') >= 0) colMap.inv = ci;
        if (h.indexOf('existencia') >= 0 && h.indexOf('brut') >= 0) colMap.existencia_bruta = ci;

        // Despacho
        if (h.indexOf('despacho') >= 0 && colMap.despacho === -1) colMap.despacho = ci;

        // Prom7Días — buscar "prom" + "d" pero NO "prom mes"
        if (h.indexOf('prom') >= 0 && h.indexOf('mes') < 0 && h.indexOf('d') >= 0 && colMap.prom7d === -1) colMap.prom7d = ci;

        // Autonomía días — primera columna con "autonom" + "d" (NO la mensual)
        if (h.indexOf('autonom') >= 0 && h.indexOf('d') >= 0 && colMap.autonomia === -1) colMap.autonomia = ci;

        // Vacío — primera ocurrencia
        if ((h.indexOf('vac\u00edo') >= 0 || h.indexOf('vacio') >= 0) && colMap.vacio === -1) colMap.vacio = ci;

        // ── FIX Bug #2: BT/ETA/Vol columns por posición relativa ──
        // Estas columnas vienen DESPUÉS de "vacío" y se llaman "ETA", "B/T", "Vol"
        if (colMap.vacio >= 0 && ci > colMap.vacio) {
          if (h.indexOf('b/t') >= 0 || h === 'b/t') btCols.push({idx:ci, type:'bt'});
          if ((h.indexOf('eta') >= 0 || h === 'eta') && h.indexOf('existencia') < 0) btCols.push({idx:ci, type:'eta'});
          if (h.indexOf('vol') >= 0 && h.indexOf('mbl') >= 0) btCols.push({idx:ci, type:'vol'});
        }
      }

      // Organizar BT columns en grupos (BT1, BT2)
      var btGroups = [];
      var currentGroup = {};
      btCols.forEach(function(bc) {
        if (bc.type === 'eta') {
          if (currentGroup.eta !== undefined) { btGroups.push(currentGroup); currentGroup = {}; }
          currentGroup.eta = bc.idx;
        } else if (bc.type === 'bt') {
          currentGroup.bt = bc.idx;
        } else if (bc.type === 'vol') {
          currentGroup.vol = bc.idx;
          btGroups.push(currentGroup);
          currentGroup = {};
        }
      });
      if (currentGroup.eta !== undefined || currentGroup.bt !== undefined) btGroups.push(currentGroup);

      var bt1 = btGroups[0] || {};
      var bt2 = btGroups[1] || {};

      console.log('[Upload] Headers:', headers);
      console.log('[Upload] colMap:', JSON.stringify(colMap));
      console.log('[Upload] BT groups:', JSON.stringify(btGroups));

      // ── Parse data rows ──
      var registros = [];
      // Use manual date override if set
      var dateOverrideEl = document.getElementById('ed-date-override');
      var fecha = (dateOverrideEl && dateOverrideEl.value) ? dateOverrideEl.value : '';

      for (var ri = headerIdx + 1; ri < json.length; ri++) {
        var row = json[ri];
        if (!row || !row.length) continue;

        var plantaRaw = colMap.planta >= 0 ? row[colMap.planta] : '';
        var productoRaw = colMap.producto >= 0 ? row[colMap.producto] : '';
        var planta = String(plantaRaw || '').trim();
        var producto = String(productoRaw || '').trim();
        if (!planta || !producto) continue;
        if (planta.indexOf('NOTA') === 0) break;
        // Filter airports
        if (planta.indexOf('A.') === 0 || planta.indexOf('A ') === 0) continue;

        // Only read date from Excel if no manual override
        if (!fecha && colMap.fecha >= 0 && row[colMap.fecha]) {
          var fCell = row[colMap.fecha];
          if (fCell instanceof Date && !isNaN(fCell.getTime())) {
            fecha = dateToYMD(fCell);
          } else if (typeof fCell === 'number') {
            // Excel serial number
            var excelEpoch = new Date(1899, 11, 30);
            var dt = new Date(excelEpoch.getTime() + fCell * 86400000);
            fecha = dateToYMD(dt);
          } else {
            var tryDate = new Date(fCell);
            if (!isNaN(tryDate.getTime())) fecha = dateToYMD(tryDate);
          }
        }

        var mapped = mapEDProduct(producto);
        if (!mapped) continue;

        // Parse BT dates
        var eta1 = '', bt1Name = '', vol1 = 0;
        var eta2 = '', bt2Name = '', vol2 = 0;
        if (bt1.eta !== undefined && row[bt1.eta]) {
          var d1 = row[bt1.eta];
          if (d1 instanceof Date) eta1 = dateToYMD(d1);
          else { var td1 = new Date(d1); if (!isNaN(td1.getTime())) eta1 = dateToYMD(td1); }
        }
        if (bt1.bt !== undefined) bt1Name = String(row[bt1.bt] || '').trim();
        if (bt1.vol !== undefined) vol1 = parseFloat(row[bt1.vol]) || 0;
        if (bt2.eta !== undefined && row[bt2.eta]) {
          var d2 = row[bt2.eta];
          if (d2 instanceof Date) eta2 = dateToYMD(d2);
          else { var td2 = new Date(d2); if (!isNaN(td2.getTime())) eta2 = dateToYMD(td2); }
        }
        if (bt2.bt !== undefined) bt2Name = String(row[bt2.bt] || '').trim();
        if (bt2.vol !== undefined) vol2 = parseFloat(row[bt2.vol]) || 0;

        registros.push({
          fecha: fecha,
          planta: planta,
          producto: producto,
          producto_dash: mapped,
          inv: parseFloat(colMap.inv >= 0 ? row[colMap.inv] : 0) || 0,
          despacho: parseFloat(colMap.despacho >= 0 ? row[colMap.despacho] : 0) || 0,
          prom7d: parseFloat(colMap.prom7d >= 0 ? row[colMap.prom7d] : 0) || 0,
          autonomia: parseFloat(colMap.autonomia >= 0 ? row[colMap.autonomia] : 0) || 0,
          capacidad: parseFloat(colMap.capacidad >= 0 ? row[colMap.capacidad] : 0) || 0,
          condicion: colMap.condicion >= 0 ? String(row[colMap.condicion] || '') : '',
          vacio: parseFloat(colMap.vacio >= 0 ? row[colMap.vacio] : 0) || 0,
          bt: bt1Name, vol_bt: vol1, eta_bt: eta1,
          bt2: bt2Name, vol_bt2: vol2, eta_bt2: eta2
        });
      }

      if (!registros.length) throw new Error('No se encontraron registros v\u00e1lidos (revisa que la hoja tenga "Planta" y "Producto")');

      uploadEDData = {fecha: fecha, registros: registros};
      buildEDPreview();
      addUploadLog(true, 'E&D: ' + registros.length + ' registros parseados (' + fecha + ')');

    } catch (err) {
      console.error('[Upload E&D]', err);
      addUploadLog(false, 'Error E&D: ' + err.message);
      uploadEDPreviewHTML = '<div style="padding:16px;color:var(--red);font-size:11px">\u274C ' + err.message + '</div>';
      var prev = document.getElementById('ed-preview');
      if (prev) prev.innerHTML = uploadEDPreviewHTML;
    }
  };
  reader.readAsArrayBuffer(file);
}

function buildEDPreview() {
  if (!uploadEDData) return;
  var regs = uploadEDData.registros;
  var plantasSet = {}, prodsSet = {};
  regs.forEach(function(r) { plantasSet[r.planta]=1; prodsSet[r.producto_dash]=1; });
  var nPlantas = Object.keys(plantasSet).length;
  var nProds = Object.keys(prodsSet).length;

  var html = '<div class="upload-summary">'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + regs.length + '</div><div class="upload-sum-lbl">Registros</div></div>'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + nPlantas + '</div><div class="upload-sum-lbl">Plantas</div></div>'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + nProds + '</div><div class="upload-sum-lbl">Productos</div></div>'
    + '</div>';

  html += '<div class="upload-preview"><table>'
    + '<thead><tr><th>Fecha</th><th>Planta</th><th>Producto</th><th>\u2192 Dashboard</th><th>Inv (MB)</th><th>Despacho</th><th>Prom 7d</th><th>Cob (d)</th><th>BT1</th><th>Vol</th><th>BT2</th></tr></thead>'
    + '<tbody>';
  var maxRows = Math.min(regs.length, 30);
  for (var i = 0; i < maxRows; i++) {
    var r = regs[i];
    var cobColor = r.autonomia < 3 ? 'var(--red)' : r.autonomia < 7 ? 'var(--yel)' : 'var(--grn)';
    html += '<tr>'
      + '<td>' + r.fecha + '</td>'
      + '<td>' + r.planta + '</td>'
      + '<td>' + r.producto + '</td>'
      + '<td style="color:var(--acc2);font-weight:700">' + r.producto_dash + '</td>'
      + '<td style="text-align:right">' + r.inv.toFixed(1) + '</td>'
      + '<td style="text-align:right">' + r.despacho.toFixed(1) + '</td>'
      + '<td style="text-align:right">' + r.prom7d.toFixed(3) + '</td>'
      + '<td style="text-align:right;font-weight:700;color:' + cobColor + '">' + r.autonomia + '</td>'
      + '<td>' + (r.bt || '\u2014') + '</td>'
      + '<td style="text-align:right">' + (r.vol_bt || '\u2014') + '</td>'
      + '<td>' + (r.bt2 || '\u2014') + '</td>'
      + '</tr>';
  }
  if (regs.length > maxRows) {
    html += '<tr><td colspan="11" style="text-align:center;color:var(--txt3)">... y ' + (regs.length - maxRows) + ' registros m\u00e1s</td></tr>';
  }
  html += '</tbody></table></div>';

  uploadEDPreviewHTML = html;
  var prev = document.getElementById('ed-preview');
  if (prev) prev.innerHTML = html;
  var actions = document.getElementById('ed-actions');
  if (actions) actions.style.display = 'flex';
}

  uploadEDPreviewHTML = '';
  var prev = document.getElementById('ed-preview');
  if (prev) prev.innerHTML = '';
  var actions = document.getElementById('ed-actions');

  var fi = document.getElementById('file-ed');
  if (fi) fi.value = '';
}

// ═══════════════════════════════════════════════════════════════════════════
// NAVES TEXT PARSER (pegar texto copiado del PDF)
// ═══════════════════════════════════════════════════════════════════════════

function parseNavesText() {
  var ta = document.getElementById('naves-text-input');
  if (!ta || !ta.value.trim()) { alert('Pega el texto del reporte de naves primero.'); return; }

  try {
    var text = ta.value;
    var naves = [];

    // Detectar tipo
    var isCargas = text.toUpperCase().indexOf('CARGAS DE NAVES') >= 0;

    // Extraer fecha
    var fecha = '';
    var fm = text.match(/(\d{1,2})[-\/]([A-Za-z]{3})[-\/](\d{2,4})/);
    if (fm) {
      var meses = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
        Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
      var yy = fm[3]; if (yy.length === 2) yy = '20' + yy;
      fecha = yy + '-' + (meses[fm[2]] || '01') + '-' + fm[1].padStart(2, '0');
    }

    // Buques conocidos
    var BUQUES_PP = ['URUBAMBA','MOCHE','UCAYALI'];
    var BUQUES_3RD = ['TROMPETEROS','MANTARO','CHASE OCEAN','COLCA'];
    var BUQUES_IMP = ['FAIRCHEM VALOR','MOCKINGBIRD','GALLOP','SEAWAYS LEYTE'];
    var ALL_BUQUES = BUQUES_PP.concat(BUQUES_3RD).concat(BUQUES_IMP);

    // Buscar cada buque en el texto
    var textUp = text.toUpperCase();
    ALL_BUQUES.forEach(function(nombre) {
      var idx = textUp.indexOf(nombre);
      if (idx < 0) return;

      // Extraer chunk de texto del buque (hasta el próximo buque o final)
      var nextIdx = text.length;
      ALL_BUQUES.forEach(function(other) {
        if (other === nombre) return;
        var oi = textUp.indexOf(other, idx + nombre.length);
        if (oi > idx && oi < nextIdx) nextIdx = oi;
      });
      // También cortar en "PREPARADO POR"
      var prepIdx = textUp.indexOf('PREPARADO POR', idx + nombre.length);
      if (prepIdx > idx && prepIdx < nextIdx) nextIdx = prepIdx;

      var chunk = text.substring(idx, nextIdx).trim();
      var isPP = BUQUES_PP.indexOf(nombre) >= 0;
      var isImp = BUQUES_IMP.indexOf(nombre) >= 0;

      // Extraer ubicación
      var ubicacion = '';
      var locM = chunk.match(/(EN BAH[IÍ]A|NAVEGANDO A|DESCARGANDO EN|EN PAMPILLA)\s+([A-Z\u00C0-\u00FFÑ\-\s]+?)(?:\s{2,}|T\.|AMARR|ARRIB|ZARP|FOND|BUQUE|ABOR)/i);
      if (locM) ubicacion = locM[0].replace(/\s{2,}.*/, '').trim();

      // Extraer rotación
      var rotacion = '';
      var rotM = chunk.match(/ROTACI[OÓ]N:\s*([^\n.]+)/i);
      if (rotM) rotacion = rotM[1].trim();

      // Extraer producto y volumen (imports)
      var producto = '', volumen = 0;
      var impM = chunk.match(/(\d+)\s*MB\s*[+\-\/]*[^D]*DE\s+([A-Z\u00C0-\u00FFÑ\s]+?)(?:\s+PARA|\s+LAY)/i);
      if (impM) { volumen = parseInt(impM[1]); producto = impM[2].trim(); }

      naves.push({
        nombre: nombre,
        tipo: isImp ? 'IMPORTACION' : 'CABOTAJE',
        ubicacion: ubicacion || '\u2014',
        rotacion: rotacion,
        estado: chunk.substring(nombre.length, Math.min(chunk.length, nombre.length + 150)).trim(),
        producto: producto,
        volumen: volumen,
        destino: '', proveedor: '',
        notas: chunk.substring(0, 250)
      });
    });

    if (!naves.length) throw new Error('No se detectaron naves. Verifica que el texto contiene nombres como URUBAMBA, MOCHE, etc.');

    uploadNavesData = {fecha: fecha, naves: naves, tipo: isCargas ? 'CARGAS' : 'DIARIO'};
    buildNavesPreview();
    addUploadLog(true, (isCargas?'Cargas':'Diario') + ': ' + naves.length + ' naves detectadas (' + fecha + ')');

  } catch (err) {
    console.error('[Upload Naves]', err);
    addUploadLog(false, 'Error Naves: ' + err.message);
    uploadNavesPreviewHTML = '<div style="padding:16px;color:var(--red);font-size:11px">\u274C ' + err.message + '</div>';
    var prev = document.getElementById('naves-preview');
    if (prev) prev.innerHTML = uploadNavesPreviewHTML;
  }
}

function buildNavesPreview() {
  if (!uploadNavesData) return;
  var naves = uploadNavesData.naves;
  var cab = 0, imp = 0;
  naves.forEach(function(n) { if (n.tipo === 'CABOTAJE') cab++; else imp++; });

  var html = '<div class="upload-summary">'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + naves.length + '</div><div class="upload-sum-lbl">Naves</div></div>'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + cab + '</div><div class="upload-sum-lbl">Cabotaje</div></div>'
    + '<div class="upload-sum-card"><div class="upload-sum-val">' + imp + '</div><div class="upload-sum-lbl">Importaci\u00f3n</div></div>'
    + '</div>';

  html += '<div class="upload-pdf-result">';
  naves.forEach(function(n) {
    html += '<div class="upload-pdf-nave">'
      + '<div class="upload-pdf-nave-icon">' + (n.tipo === 'CABOTAJE' ? '\uD83D\uDEA2' : '\uD83D\uDEF3\uFE0F') + '</div>'
      + '<div style="flex:1">'
      + '<div class="upload-pdf-nave-name">' + n.nombre + '</div>'
      + '<div class="upload-pdf-nave-detail">' + n.tipo + ' \u00B7 ' + (n.ubicacion || n.estado.substring(0,60)) + '</div>'
      + (n.producto ? '<div class="upload-pdf-nave-detail" style="color:var(--acc2)">' + n.producto + ' \u2014 ' + n.volumen + ' MB</div>' : '')
      + (n.rotacion ? '<div class="upload-pdf-nave-detail">\uD83D\uDDFA\uFE0F ' + n.rotacion + '</div>' : '')
      + '</div></div>';
  });
  html += '</div>';

  uploadNavesPreviewHTML = html;
  var prev = document.getElementById('naves-preview');
  if (prev) prev.innerHTML = html;
  var actions = document.getElementById('naves-actions');
  if (actions) actions.style.display = 'flex';
}

function clearNaves() {
  uploadNavesData = null;
  uploadNavesPreviewHTML = '';
  var prev = document.getElementById('naves-preview');
  if (prev) prev.innerHTML = '';
  var actions = document.getElementById('naves-actions');
  if (actions) actions.style.display = 'none';
  var ta = document.getElementById('naves-text-input');
  if (ta) ta.value = '';
}

// ═══════════════════════════════════════════════════════════════════════════
// SEND TO GOOGLE SHEETS — FIX Bug #1: mode:'no-cors' para POST a GAS
// ═══════════════════════════════════════════════════════════════════════════

async function sendEDToGS() {
  if (!uploadEDData) return;
  var btn = document.getElementById('ed-send-btn');
  var status = document.getElementById('ed-status');
  if (btn) btn.disabled = true;
  if (status) { status.className = 'upload-status'; status.textContent = '\u23F3 Enviando ' + uploadEDData.registros.length + ' registros...'; }

  try {
    // Transformar y AGREGAR registros que mapean al mismo producto
    // (ej: ULSD + DB5S50 ambos → Diesel en Callao se suman)
    var aggMap = {};
    uploadEDData.registros.forEach(function(r) {
      var key = r.fecha + '|' + r.planta + '|' + r.producto_dash;
      if (!aggMap[key]) {
        aggMap[key] = {
          fecha: r.fecha, planta: r.planta, producto: r.producto_dash,
          inv: 0, pron: 0, vreal: 0, despacho: 0, autonomia: 0,
          vacio: 0, bt: '', vol_bt: 0, eta_bt: '', bt2: '', vol_bt2: 0, eta_bt2: '',
          condicion: '', _count: 0
        };
      }
      var a = aggMap[key];
      a.inv += r.inv || 0;
      a.pron += r.prom7d || 0;
      a.vreal += r.despacho || 0;
      a.despacho += r.despacho || 0;
      a.vacio += r.vacio || 0;
      // Para autonomía, tomar el mínimo si hay múltiples (más conservador)
      if (r.autonomia > 0) {
        a.autonomia = a.autonomia > 0 ? Math.min(a.autonomia, r.autonomia) : r.autonomia;
      }
      // BT: tomar el primero que tenga datos
      if (r.bt && !a.bt) { a.bt = r.bt; a.vol_bt = r.vol_bt; a.eta_bt = r.eta_bt; }
      if (r.bt2 && !a.bt2) { a.bt2 = r.bt2; a.vol_bt2 = r.vol_bt2; a.eta_bt2 = r.eta_bt2; }
      if (r.condicion && !a.condicion) a.condicion = r.condicion;
      a._count++;
    });

    var apiRecords = Object.values(aggMap).map(function(a) {
      return {
        fecha: a.fecha, planta: a.planta, producto: a.producto,
        inv: Math.round(a.inv * 100) / 100,     // Existencia Neta (MB)
        pron: 0,                                  // PRESERVE existing (from Cobertura-Análisis)
        vult7: 0,                                 // PRESERVE
        vreal: 0,                                 // PRESERVE (from Cobertura-Análisis)
        dem_prom: Math.round(a.pron * 1000) / 1000,  // Prom7Días (MBDC)
        dem: Math.round(a.despacho * 1000) / 1000,
        var_dem: 0,
        vfact: 0,                                 // PRESERVE (from Cobertura-Análisis)
        cob: a.autonomia,                         // Autonomía E&D
        fecha_cobertura: '',
        fecha_reposicion: a.eta_bt,
        bt: a.bt,
        vol_rep: Math.round(a.vol_bt * 100) / 100,  // MB
        vacio: Math.round(a.vacio * 100) / 100,
        comentario: a.condicion + (a._count > 1 ? ' (Agregado: ' + a._count + ' fuentes)' : ''),
        fecha_repos_bt2: a.eta_bt2,

// ═══════════════════════════════════════════════════════════════════════════
// COBERTURA-ANÁLISIS PARSER (DATA_BI sheet)
// ═══════════════════════════════════════════════════════════════════════════

function handleCobFile(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    addUploadLog(false, 'SheetJS no cargada. Recarga la p\u00e1gina.');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array', cellDates:true, raw:true});

      // Find DATA_BI sheet
      var sheetName = wb.SheetNames.find(function(s) { return s.indexOf('DATA_BI') >= 0; });
      if (!sheetName) throw new Error('No se encontr\u00f3 hoja "DATA_BI"');
      var ws = wb.Sheets[sheetName];
      var json = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', cellDates:true});

      // ── Dynamic column detection (SheetJS may skip empty cols) ──
      var headerIdx = -1;
      var cm = {planta:-1, producto:-1, pron:-1, vult7:-1, vreal:-1, vfact:-1,
                cob:-1, fechaCob:-1, fechaRep:-1, bt:-1, volRep:-1, vacio:-1};
      for (var hi = 0; hi < Math.min(5, json.length); hi++) {
        var hrow = json[hi];
        if (!hrow) continue;
        for (var ci = 0; ci < hrow.length; ci++) {
          var h = String(hrow[ci] || '').toLowerCase().replace(/\n/g, ' ');
          if (h.indexOf('planta') >= 0 || h.indexOf('terminal') >= 0) cm.planta = ci;
          if (h.indexOf('producto') >= 0 && cm.producto < 0) cm.producto = ci;
          if (h.indexOf('pron') >= 0 && h.indexOf('stico') >= 0) cm.pron = ci;
          if (h.indexOf('lt 7') >= 0 || h.indexOf('ult 7') >= 0) cm.vult7 = ci;
          if (h.indexOf('(b)') >= 0 && h.indexOf('venta') >= 0 && h.indexOf('(a)') < 0) cm.vreal = ci;
          if (h.indexOf('factible') >= 0) cm.vfact = ci;
          if (h.indexOf('cobertura') >= 0 && h.indexOf('d') >= 0 && h.indexOf('nueva') < 0 && cm.cob < 0) cm.cob = ci;
          if (h.indexOf('fecha') >= 0 && h.indexOf('cobertura') >= 0 && h.indexOf('nueva') < 0 && cm.fechaCob < 0) cm.fechaCob = ci;
          if (h.indexOf('fecha') >= 0 && h.indexOf('reposici') >= 0 && cm.fechaRep < 0) cm.fechaRep = ci;
          if ((h === 'bt' || (h.indexOf('bt') >= 0 && h.length < 6)) && cm.bt < 0) cm.bt = ci;
          if (h.indexOf('vol') >= 0 && h.indexOf('repos') >= 0 && cm.volRep < 0) cm.volRep = ci;
          if (h.indexOf('vac') >= 0 && (h.indexOf('mb') >= 0 || h.indexOf('(') >= 0) && cm.vacio < 0) cm.vacio = ci;
        }
        if (cm.planta >= 0 && cm.producto >= 0) { headerIdx = hi; break; }
      }
      if (cm.planta < 0 || cm.producto < 0) throw new Error('No se encontr\u00f3 header Planta/Producto en DATA_BI');
      console.log('[Cob] Header row:', headerIdx, 'colMap:', JSON.stringify(cm));

      // Find BT2 columns (after first BT)
      var cm2 = {fechaRep2:-1, bt2:-1, volRep2:-1};
      if (cm.bt >= 0) {
        var hr = json[headerIdx];
        for (var c2 = cm.bt + 1; c2 < hr.length; c2++) {
          var h2 = String(hr[c2] || '').toLowerCase().replace(/\n/g, ' ');
          if (h2.indexOf('reposici') >= 0 && h2.indexOf('2') >= 0 && cm2.fechaRep2 < 0) cm2.fechaRep2 = c2;
          if (h2.indexOf('bt2') >= 0 && cm2.bt2 < 0) cm2.bt2 = c2;
          if (h2.indexOf('vol') >= 0 && h2.indexOf('2') >= 0 && cm2.volRep2 < 0) cm2.volRep2 = c2;
        }
      }

      var registros = [];
      var cobDateEl = document.getElementById('cob-date-override');
      var fecha = (cobDateEl && cobDateEl.value) ? cobDateEl.value : (currentDate || new Date().toISOString().slice(0,10));
      var EXCL = ['A. Iquitos','A. Tarapoto','A. LimaCallao','A. Cusco','A.Iquitos','A.Tarapoto','A.LimaCallao','A.Cusco'];
      var cobAgg = {};

      for (var i = headerIdx + 1; i < json.length; i++) {
        var row = json[i];
        if (!row || row.length < 3) continue;
        var planta = String(row[cm.planta] || '').trim();
        var producto = String(row[cm.producto] || '').trim();
        if (!planta || !producto) continue;
        // Guard: planta must be text, not a number
        if (!isNaN(parseFloat(planta)) && isFinite(planta)) continue;
        if (EXCL.indexOf(planta) >= 0) continue;
        if (planta.indexOf('A.') === 0) continue;

        if (producto === 'ULSD Expo') producto = 'Diesel';
        if (producto === 'G. Regular HS') continue;

        var pron = cm.pron >= 0 ? (parseFloat(row[cm.pron]) || 0) : 0;
        var vult7 = cm.vult7 >= 0 ? (parseFloat(row[cm.vult7]) || 0) : 0;
        var vreal = cm.vreal >= 0 ? (parseFloat(row[cm.vreal]) || 0) : 0;
        var vfact = cm.vfact >= 0 ? (parseFloat(row[cm.vfact]) || 0) : 0;
        var cobVal = cm.cob >= 0 ? (parseFloat(row[cm.cob]) || 0) : 0;
        var fechaCob = '';
        if (cm.fechaCob >= 0 && row[cm.fechaCob] instanceof Date) fechaCob = dateToYMD(row[cm.fechaCob]);
        var fechaRep = '';
        if (cm.fechaRep >= 0 && row[cm.fechaRep] instanceof Date) fechaRep = dateToYMD(row[cm.fechaRep]);
        var bt = cm.bt >= 0 ? String(row[cm.bt] || '').trim() : '';
        if (bt === '0' || bt === '00:00:00') bt = '';
        var volRep = cm.volRep >= 0 ? (parseFloat(row[cm.volRep]) || 0) : 0;
        var vacioVal = cm.vacio >= 0 ? (parseFloat(row[cm.vacio]) || 0) : 0;
        var fechaRep2 = '';
        if (cm2.fechaRep2 >= 0 && row[cm2.fechaRep2] instanceof Date) fechaRep2 = dateToYMD(row[cm2.fechaRep2]);
        var bt2 = cm2.bt2 >= 0 ? String(row[cm2.bt2] || '').trim() : '';
        if (bt2 === '0' || bt2 === '00:00:00') bt2 = '';
        var volRep2 = cm2.volRep2 >= 0 ? (parseFloat(row[cm2.volRep2]) || 0) : 0;

        var aggKey = planta + '|' + producto;
        if (!cobAgg[aggKey]) {
          cobAgg[aggKey] = { planta:planta, producto:producto, pron:0, vult7:0, vreal:0, vfact:0,
            cob:0, fechaCob:'', fechaRep:'', bt:'', volRep:0, vacio:0, fechaRep2:'', bt2:'', volRep2:0 };
        }
        var a = cobAgg[aggKey];
        a.pron += pron; a.vult7 += vult7; a.vreal += vreal; a.vfact += vfact; a.vacio += vacioVal;
        if (cobVal > 0) a.cob = a.cob > 0 ? Math.min(a.cob, cobVal) : cobVal;
        if (fechaCob && !a.fechaCob) a.fechaCob = fechaCob;
        if (bt && !a.bt) { a.bt = bt; a.volRep = volRep; a.fechaRep = fechaRep; }
        if (bt2 && !a.bt2) { a.bt2 = bt2; a.volRep2 = volRep2; a.fechaRep2 = fechaRep2; }
      }

      registros = Object.values(cobAgg).map(function(a) {
        return {
          planta: a.planta, producto: a.producto,
          pron: Math.round(a.pron * 1000) / 1000,
          vult7: Math.round(a.vult7 * 1000) / 1000,
          vreal: Math.round(a.vreal * 1000) / 1000,
          vfact: Math.round(a.vfact * 1000) / 1000,
          cob: Math.round(a.cob), fechaCob: a.fechaCob,
          fechaRep: a.fechaRep, bt: a.bt,
          volRep: Math.round(a.volRep * 100) / 100,
          vacio: Math.round(a.vacio * 100) / 100,
          fechaRep2: a.fechaRep2, bt2: a.bt2,
          volRep2: Math.round(a.volRep2 * 100) / 100
        };
      });

      if (!registros.length) throw new Error('No se encontraron registros en DATA_BI');

      uploadCobData = {fecha: fecha, registros: registros};
      buildCobPreview();
      addUploadLog(true, 'Cobertura: ' + registros.length + ' registros parseados');

    } catch (err) {
      console.error('[Upload Cob]', err);
      addUploadLog(false, 'Error Cobertura: ' + err.message);
      uploadCobPreviewHTML = '<div style="padding:16px;color:var(--red);font-size:11px">\u274C ' + err.message + '</div>';
      var prev = document.getElementById('cob-upload-preview');
      if (prev) prev.innerHTML = uploadCobPreviewHTML;
    }
  };
  reader.readAsArrayBuffer(file);
}
