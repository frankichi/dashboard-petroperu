<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETROPERÚ — Dashboard de Inventarios y Coberturas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════════════
   DESIGN TOKENS - Exactamente del original
   ══════════════════════════════════════════════════════════════════════════ */
:root {
  /* ── DARK: Deep Navy Executive (energy/Bloomberg terminal) ── */
  --bg:    #0a0e1a;
  --bg2:   #0f1623;
  --bg3:   #151d2e;
  --card:  #131a28;
  --card2: #0d1320;
  --bdr:   #1e2d45;
  --bdr2:  #263550;
  --txt:   #e8edf5;
  --txt2:  #8a9bb8;
  --txt3:  #4a5d7a;
  --muted: #4a5d7a;
  --acc:   #1d6fd6;
  --acc2:  #4d9de0;
  --topH:  56px;
  --navH:  42px;
  --r:     6px;
  --mono:  'JetBrains Mono', monospace;
  --sans:  'Sora', sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,.6);
  --red:   #e03434;
  --ora:   #d96b1a;
  --yel:   #c9970a;
  --grn:   #1a9e50;
  --drk:   #6b1212;
}

body.light {
  /* ── LIGHT: Corporate White (board / McKinsey presentation) ── */
  --bg:    #f0f2f5;
  --bg2:   #ffffff;
  --bg3:   #e8ecf2;
  --card:  #ffffff;
  --card2: #f6f8fb;
  --bdr:   #d0d8e8;
  --bdr2:  #b8c4d8;
  --txt:   #0d1a2e;
  --txt2:  #2c4060;
  --txt3:  #5a6e88;
  --muted: #7a8da8;
  --acc:   #0055b3;
  --acc2:  #0066cc;
  --shadow: 0 2px 16px rgba(10,30,70,.1);
  --red:   #c41717;
  --ora:   #b85010;
  --yel:   #9a7200;
  --grn:   #0f7a38;
  --drk:   #580808;
}

/* ══════════════════════════════════════════════════════════════════════════
   RESET
   ══════════════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);font-size:13px;
  background:var(--bg);color:var(--txt);
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
}

/* ══════════════════════════════════════════════════════════════════════════
   TOPBAR
   ══════════════════════════════════════════════════════════════════════════ */
.topbar{
  height:var(--topH);position:sticky;top:0;z-index:200;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  background:var(--bg2);
  border-bottom:2px solid var(--bdr);
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
body.light .topbar{
  border-bottom-color:#c4d0e0;
  box-shadow:0 1px 12px rgba(10,30,70,.08);
}
.topbar-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.topbar-logo img{height:34px;width:auto}
.topbar-title{display:flex;flex-direction:column}
.topbar-title .t1{font-size:13.5px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.topbar-title .t2{font-size:9.5px;font-weight:500;color:var(--txt3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}

.gs-badge{
  display:flex;align-items:center;gap:6px;padding:5px 14px;
  border-radius:4px;background:var(--bg3);border:1px solid var(--bdr);
  font-size:10px;font-weight:600;white-space:nowrap;
  transition:border-color .3s,background .3s;letter-spacing:.01em;
}
.gs-badge.connected{border-color:#1a9e5066;background:rgba(26,158,80,.06)}
.gs-badge.error{border-color:var(--red)55;background:rgba(224,52,52,.07)}
body.light .gs-badge{background:#f0f4fb;border-color:#c8d4e8}
body.light .gs-badge.connected{background:rgba(15,122,56,.06);border-color:rgba(15,122,56,.3)}
.gs-icon{display:flex;align-items:center;flex-shrink:0}
.gs-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--txt3);transition:background .3s,box-shadow .3s;
}
.gs-badge.connected .gs-dot{background:#34a853;box-shadow:0 0 7px #34a853;animation:pulse-dot 2s ease-in-out infinite}
.gs-badge.connecting .gs-dot{background:var(--yel);animation:pulse-dot .8s ease-in-out infinite}
.gs-badge.error .gs-dot{background:var(--red);box-shadow:0 0 7px var(--red)}
.gs-text{color:var(--txt2)}
.gs-badge.connected .gs-text{color:#34a853}
.gs-badge.error .gs-text{color:var(--red)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

.author-badge{
  display:flex;align-items:center;gap:6px;padding:4px 14px;
  background:rgba(29,111,214,0.08);border:1px solid rgba(29,111,214,0.2);
  border-radius:4px;font-size:10px;color:var(--acc2);font-weight:600;letter-spacing:.01em;
}
body.light .author-badge{background:rgba(0,85,179,.06);border-color:rgba(0,85,179,.15);color:#0055b3}

.t-toggle{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  padding:5px 12px 5px 10px;border-radius:4px;
  background:var(--bg3);border:1px solid var(--bdr);
  font-size:10px;font-weight:600;color:var(--txt2);
  transition:border-color .15s;user-select:none;letter-spacing:.01em;
}
.t-toggle:hover{border-color:var(--acc);color:var(--txt)}
body.light .t-toggle{background:#f0f4fb;border-color:#c8d4e8;color:#2c4060}
.t-track{
  width:28px;height:16px;border-radius:8px;background:var(--bdr);
  position:relative;transition:background .18s;flex-shrink:0;
}
body.light .t-track{background:var(--acc)}
.t-thumb{
  width:12px;height:12px;border-radius:50%;background:#fff;
  position:absolute;top:2px;left:2px;transition:transform .18s;
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}
body.light .t-thumb{transform:translateX(12px)}

/* ══════════════════════════════════════════════════════════════════════════
   NAV TABS
   ══════════════════════════════════════════════════════════════════════════ */
.nav{
  height:var(--navH);background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:stretch;padding:0 10px;gap:0;
  overflow-x:auto;overflow-y:visible;
  scrollbar-width:thin;
  scrollbar-color:var(--bdr2) transparent;
}
body.light .nav{border-bottom-color:#c4d0e0}
.nav::-webkit-scrollbar{height:4px}
.nav::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.nav-tab{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 14px;font-size:11px;font-weight:600;
  color:var(--txt3);cursor:pointer;white-space:nowrap;flex-shrink:0;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
  background:none;border-top:none;border-left:none;border-right:none;
  letter-spacing:.01em;
}
.nav-tab:hover{color:var(--txt)}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
body.light .nav-tab.active{color:#0055b3;border-bottom-color:#0055b3}
.tab-icon{font-size:13px}
.nav-sep{display:flex;align-items:center;padding:0 6px;flex-shrink:0}
.nav-sep::after{content:'';width:1px;height:20px;background:var(--bdr)}

/* ══════════════════════════════════════════════════════════════════════════
   PAGES
   ══════════════════════════════════════════════════════════════════════════ */
.page{
  display:none;
  height:calc(100vh - var(--topH) - var(--navH));
  overflow-y:auto;overflow-x:hidden;
}
.page.active{display:block;animation:fadein .18s ease}
#pE.page.active{overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - var(--topH) - var(--navH))}
#pE.page.active>#pE-content{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════════════════════════════════════
   PAGE HEADER
   ══════════════════════════════════════════════════════════════════════════ */
.page-header{
  padding:14px 22px 12px;
  border-bottom:1px solid var(--bdr);
  background:var(--bg2);
  position:sticky;top:0;z-index:100;
}
.page-header-title{
  font-size:17px;font-weight:800;color:var(--txt);
  letter-spacing:-.02em;display:flex;align-items:center;gap:8px;margin-bottom:3px;
}
.page-header-subtitle{font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.01em}
body.light .page-header-title{color:#0d1a2e}
body.light .page-header-subtitle{color:#5a6e88}

/* ══════════════════════════════════════════════════════════════════════════
   DATE PICKER BAR (global calendar)
   ══════════════════════════════════════════════════════════════════════════ */
.date-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:7px 20px;background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:99;
}
body.light .date-bar{border-bottom-color:#d0d8e8;background:#fff}
.date-bar .f-label{
  font-size:9.5px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;
}
.date-picker-wrap{display:flex;align-items:center;gap:6px}
.date-nav-btn{
  width:26px;height:26px;border-radius:6px;border:1px solid var(--bdr);
  background:var(--card2);color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;
  transition:all .15s;font-family:var(--sans);padding:0;
}
.date-nav-btn:hover:not(:disabled){border-color:var(--acc);color:var(--txt)}
.date-nav-btn:disabled{opacity:.3;cursor:default}
.date-input{
  background:var(--card2);color:var(--txt);border:1px solid var(--bdr);
  border-radius:6px;padding:4px 10px;font-size:11.5px;font-weight:600;
  font-family:var(--mono);cursor:pointer;transition:border-color .15s;
  color-scheme:dark;
}
body.light .date-input{color-scheme:light}
.date-input:focus{outline:none;border-color:var(--acc)}
.date-badge{
  display:flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;background:var(--acc)18;border:1px solid var(--acc)44;
  font-size:10px;font-weight:700;color:var(--acc2);font-family:var(--mono);
  white-space:nowrap;
}
.date-count{
  margin-left:auto;font-size:10px;color:var(--txt3);font-weight:600;
  white-space:nowrap;
}

.filterbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:8px 18px;background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:99;
}
.f-label{font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px}
.f-group{display:flex;align-items:center;gap:7px}
select,input[type=date]{
  background:var(--card2);color:var(--txt);border:1px solid var(--bdr);
  border-radius:6px;padding:4px 9px;font-size:11.5px;font-weight:500;
  font-family:var(--sans);cursor:pointer;transition:border-color .15s;
}
select:focus,input[type=date]:focus{outline:none;border-color:var(--acc)}
.btn-secondary{
  background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;
  color:var(--txt2);font-size:11px;padding:4px 12px;cursor:pointer;
  font-family:var(--sans);transition:all .15s;
}
.btn-secondary:hover{border-color:var(--acc);color:var(--txt)}

/* ══════════════════════════════════════════════════════════════════════════
   KPI CARDS
   ══════════════════════════════════════════════════════════════════════════ */
.kpi-row{
  display:grid;gap:10px;padding:14px 18px 0;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
}
.kpi{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--r);padding:16px 18px;
  display:flex;flex-direction:column;gap:6px;
  transition:box-shadow .15s,border-color .15s;
}
.kpi:hover{box-shadow:var(--shadow);border-color:var(--acc)}
body.light .kpi{box-shadow:0 1px 4px rgba(10,30,70,.06)}
body.light .kpi:hover{box-shadow:0 4px 16px rgba(10,30,70,.12);border-color:var(--acc)}
.kpi.blue{border-left:3px solid var(--acc)}
.kpi.red{border-left:3px solid var(--red)}
.kpi.amber{border-left:3px solid var(--yel)}
.kpi.green{border-left:3px solid var(--grn)}

.kpi-label{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.kpi-value{font-size:28px;font-weight:800;color:var(--txt);line-height:1;font-family:var(--mono);letter-spacing:-.03em}
.kpi-sub{font-size:10px;color:var(--txt2)}
.kpi-delta{font-size:10.5px;font-weight:600;display:flex;align-items:center;gap:4px;margin-top:1px}
/* ══════════════════════════════════════════════════════════════════════════
   ALERT KPI CARDS (4 tarjetas de criticidad)
   ══════════════════════════════════════════════════════════════════════════ */
.alert-kpi-row{
  display:grid;gap:12px;padding:14px 18px 0;
  grid-template-columns:repeat(4,1fr);
}
@media(max-width:900px){.alert-kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.alert-kpi-row{grid-template-columns:1fr}}

.alert-kpi{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--r);padding:20px 20px 16px;
  display:flex;flex-direction:column;gap:5px;
  transition:box-shadow .15s,border-color .15s,transform .15s;
  position:relative;overflow:hidden;
}
.alert-kpi:hover{transform:translateY(-2px)}
body.light .alert-kpi{background:#fff;box-shadow:0 1px 4px rgba(10,30,70,.06)}
body.light .alert-kpi:hover{box-shadow:0 6px 24px rgba(10,30,70,.14)}
.alert-kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.alert-kpi.crit::before{background:var(--red)}
.alert-kpi.warn::before{background:var(--yel)}
.alert-kpi.ok::before{background:var(--grn)}
.alert-kpi.restrict::before{background:#a855f7}
.alert-kpi:hover{box-shadow:var(--shadow);border-color:var(--bdr2)}

.alert-kpi-label{
  font-size:9.5px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;
}
.alert-kpi.crit .alert-kpi-label{color:var(--red)}
.alert-kpi.warn .alert-kpi-label{color:var(--yel)}
.alert-kpi.ok .alert-kpi-label{color:var(--grn)}
.alert-kpi.restrict .alert-kpi-label{color:#a855f7}

.alert-kpi-value{
  font-size:42px;font-weight:800;line-height:1;
  font-family:var(--mono);letter-spacing:-.04em;margin:4px 0;
}
.alert-kpi.crit .alert-kpi-value{color:var(--red)}
.alert-kpi.warn .alert-kpi-value{color:var(--yel)}
.alert-kpi.ok .alert-kpi-value{color:var(--grn)}
.alert-kpi.restrict .alert-kpi-value{color:#a855f7}

.alert-kpi-sub{font-size:10.5px;color:var(--txt2);font-weight:500}
.alert-kpi-action{
  font-size:10px;font-weight:700;margin-top:6px;
  padding-top:6px;border-top:1px solid var(--bdr);
}
.alert-kpi.crit .alert-kpi-action{color:var(--red)}
.alert-kpi.warn .alert-kpi-action{color:var(--yel)}
.alert-kpi.ok .alert-kpi-action{color:var(--grn)}
.alert-kpi.restrict .alert-kpi-action{color:#a855f7}

/* Criticidad chips dentro de prod-card */
.prod-crit-row{
  border-top:1px solid var(--bdr);
  background:var(--card2);
  padding:7px 12px;
  display:flex;flex-wrap:wrap;gap:4px;align-items:center;
  min-height:32px;
}
.prod-crit-row .crit-label{
  font-size:8.5px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.4px;margin-right:4px;white-space:nowrap;
}
.crit-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 7px;border-radius:10px;font-size:9.5px;font-weight:700;
  font-family:var(--mono);white-space:nowrap;
}
.crit-chip.c1{background:var(--red)1a;color:var(--red);border:1px solid var(--red)40}
.crit-chip.c2{background:var(--yel)1a;color:var(--yel);border:1px solid var(--yel)40}
.crit-chip.c3{background:#a855f71a;color:#a855f7;border:1px solid #a855f740}
.crit-chip.none{color:var(--grn);font-size:9px;font-weight:600}


/* ══════════════════════════════════════════════════════════════════════════
   PRODUCT CARDS
   ══════════════════════════════════════════════════════════════════════════ */
.prod-cards-grid{
  display:grid;padding:14px 18px 18px;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
}
.prod-card{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--r);overflow:hidden;
  transition:box-shadow .15s,border-color .15s,transform .15s;
  cursor:pointer;
}
.prod-card:hover{box-shadow:var(--shadow);border-color:var(--acc);transform:translateY(-1px)}
body.light .prod-card{box-shadow:0 1px 4px rgba(10,30,70,.06)}
body.light .prod-card:hover{box-shadow:0 6px 20px rgba(10,30,70,.14)}
.prod-card.red{border-top:3px solid var(--red)}
.prod-card.amber{border-top:3px solid var(--yel)}
.prod-card.green{border-top:3px solid var(--grn)}

.prod-card-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px 8px}
.prod-card-name{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:-.01em}
.prod-card-inv{text-align:right}
.prod-inv-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--txt);line-height:1}
.prod-inv-unit{font-size:10px;color:var(--txt3);margin-left:2px}

.prod-card-metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);border-top:1px solid var(--bdr)}
.prod-card-metrics.three{grid-template-columns:1fr 1fr 1fr}
.prod-metric{background:var(--card2);padding:8px 12px}
.prod-metric-lbl{font-size:8.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.prod-metric-val{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--txt)}

/* ══════════════════════════════════════════════════════════════════════════
   SEMAPHORE BADGES
   ══════════════════════════════════════════════════════════════════════════ */
.sem,.badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;
  font-family:var(--mono);white-space:nowrap;
}
.s0,.cob-empty{background:var(--drk)22;color:var(--drk);border:1px solid var(--drk)44}
.s1,.cob-crit{background:var(--red)1a;color:var(--red);border:1px solid var(--red)40}
.s2,.cob-low{background:var(--ora)1a;color:var(--ora);border:1px solid var(--ora)40}
.s3,.cob-warn{background:var(--yel)1a;color:var(--yel);border:1px solid var(--yel)40}
.s4,.cob-ok{background:var(--grn)14;color:var(--grn);border:1px solid var(--grn)35}
.badge.red{background:var(--red)1a;color:var(--red);border:1px solid var(--red)40}
.badge.amber{background:var(--yel)1a;color:var(--yel);border:1px solid var(--yel)40}
.badge.green{background:var(--grn)14;color:var(--grn);border:1px solid var(--grn)35}
.badge.blue{background:var(--acc)1a;color:var(--acc2);border:1px solid var(--acc)40}

/* ══════════════════════════════════════════════════════════════════════════
   TABLES
   ══════════════════════════════════════════════════════════════════════════ */
.tbl-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:auto;margin:0 18px 18px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{
  background:var(--card2);color:var(--txt3);
  font-size:8.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  padding:8px 12px;border-bottom:1px solid var(--bdr);white-space:nowrap;
  position:sticky;top:0;z-index:2;text-align:left;
}
body.light th{background:#edf1f8;color:#4a5d7a;border-bottom-color:#c4d0e0}
td{padding:7px 12px;border-bottom:1px solid var(--bdr);color:var(--txt2);vertical-align:middle}
body.light td{border-bottom-color:#eaeff6}
body.light tr:hover td{background:#f5f8fd}
tr:last-child td{border-bottom:none}
.tbl-wrap tr:hover td{background:var(--bg3)}
body.light .tbl-wrap tr:hover td{background:#f0f4fb}
.tn,.num{font-family:var(--mono);text-align:right;font-size:11px}
.tp{font-weight:700;color:var(--txt)}

/* ══════════════════════════════════════════════════════════════════════════
   CHARTS
   ══════════════════════════════════════════════════════════════════════════ */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px;margin-bottom:18px}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px}
.cc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cc-title{font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}
.chart-h220{position:relative;height:220px}

/* ══════════════════════════════════════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════════════════════════════════════ */
.section-head{
  font-size:9.5px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.7px;
  margin:0 18px 10px;padding-top:16px;
  border-top:1px solid var(--bdr);
  display:flex;align-items:center;gap:8px;
}
.section-head::before{
  content:'';width:3px;height:16px;border-radius:1px;
  background:var(--acc);display:inline-block;flex-shrink:0;
}
body.light .section-head{color:#5a6e88;border-top-color:#d0d8e8}

/* ══════════════════════════════════════════════════════════════════════════
   BT CARDS
   ══════════════════════════════════════════════════════════════════════════ */
.bt-cards{display:flex;flex-direction:column;gap:16px;padding:14px 18px}
.bt-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.bt-card-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--card2);border-bottom:1px solid var(--bdr);
}
.bt-icon{font-size:18px}
.bt-name{font-size:13px;font-weight:800;color:var(--txt)}
.bt-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:10px;font-weight:600;background:var(--bg3);
  border:1px solid var(--bdr);color:var(--txt2);margin-left:auto
}

/* ══════════════════════════════════════════════════════════════════════════
   LOADING & ERROR
   ══════════════════════════════════════════════════════════════════════════ */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(10,14,26,.97);display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px;
}
.loading-spinner{
  width:48px;height:48px;border:3px solid var(--bdr);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--txt2)}

.error-box{
  background:var(--card);border:1px solid var(--red);
  border-radius:var(--r);padding:24px;max-width:400px;text-align:center;
}
.error-icon{font-size:48px;margin-bottom:12px}
.error-title{font-size:16px;font-weight:700;margin-bottom:8px}
.error-msg{font-size:12px;color:var(--txt2);margin-bottom:16px}
.btn-retry{
  background:var(--acc);border:none;border-radius:6px;
  color:#fff;font-size:12px;font-weight:600;padding:8px 20px;
  cursor:pointer;font-family:var(--sans);
}
.btn-retry:hover{background:var(--acc2)}

/* ══════════════════════════════════════════════════════════════════════════
   SCROLLBAR
   ══════════════════════════════════════════════════════════════════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* ══════════════════════════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════════════════════════ */
@media(max-width:900px){
  .chart-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .topbar{padding:0 12px;gap:8px}
  .topbar-title .t2{display:none}
  .author-badge{display:none}
  .kpi-row{grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px 0}
  .kpi-value{font-size:22px}
  .prod-cards-grid{grid-template-columns:1fr;padding:10px 12px}
  .filterbar{padding:7px 12px}
  .tbl-wrap{margin:0 12px 12px}
  .bt-cards{padding:10px 12px}
}
@media(max-width:500px){
  .nav-tab .tab-text{display:none}
  .nav-tab{padding:0 10px}
  .tab-icon{font-size:16px}
}

/* ══════════════════════════════════════════════════════════════════════════
   LIGHT MODE IMPROVEMENTS
   ══════════════════════════════════════════════════════════════════════════ */
/* Light mode — corporate white */
body.light .kpi-value{color:#0d1a2e}
body.light .prod-card-name{color:#0d1a2e;font-weight:800}
body.light .prod-metric-val{color:#0d1a2e;font-weight:700}
body.light .prod-metric{background:#f6f8fb}
body.light .page-header{background:#fff;border-bottom-color:#d0d8e8}
body.light .section-head{color:#4a5d7a;border-top-color:#d0d8e8}
body.light .date-bar{background:#fff;border-bottom-color:#d0d8e8}
body.light .restr-planta-hdr{background:#f6f8fb;border-color:#d0d8e8}
body.light .restr-table-wrap{border-color:#d0d8e8}
body.light .restr-stat{background:#fff;border-color:#d0d8e8;box-shadow:0 1px 4px rgba(10,30,70,.05)}
body.light .cc{background:#fff;border-color:#d0d8e8;box-shadow:0 1px 4px rgba(10,30,70,.05)}
body.light .bt-card{background:#fff;border-color:#d0d8e8}
body.light .bt-card-header{background:#f0f4fc;border-bottom-color:#d0d8e8}
body.light .nav{background:#fff}
body.light .topbar{background:#fff}
body.light select,body.light input[type=date]{background:#f6f8fb;color:#0d1a2e;border-color:#c8d4e8}
body.light .date-input{background:#f0f4fb;color:#0d1a2e;border-color:#c8d4e8}
body.light .kpi{background:#fff}
body.light .prod-card{background:#fff}
body.light .prod-card-metrics{background:#d0d8e8}
body.light .prod-crit-row,.prod-alerts-tbl{background:#f6f8fb}
body.light .card-status-bar{background:#f0f4fb}
body.light .alert-kpi-label{letter-spacing:.7px}

/* ══════════════════════════════════════════════════════════════════════════
   BT CARDS NEW STYLE (Reposiciones en Resumen)
   ══════════════════════════════════════════════════════════════════════════ */
.bt-new-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;padding:0 18px 20px}
.bt-card-new{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.bt-card-new-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  background:linear-gradient(135deg,#0d3060,#1a4a8a);
  border-bottom:1px solid var(--bdr);
}
.bt-card-new-icon{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;letter-spacing:.5px;flex-shrink:0;
}
.bt-card-new-info{flex:1}
.bt-card-new-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:.02em}
.bt-card-new-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.bt-card-new-vol{text-align:right;color:#fff;font-family:var(--mono);font-size:17px;font-weight:800;flex-shrink:0}
.bt-card-new-prods{
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  padding:10px 16px;background:var(--card2);border-bottom:1px solid var(--bdr);
}
.bt-prod-pill{
  padding:3px 10px;border-radius:20px;font-size:10.5px;
  background:var(--acc)18;border:1px solid var(--acc)40;color:var(--acc2);
}
.bt-prod-pill strong{font-weight:800}
.bt-dest-section{padding:0}
.bt-dest-section-title{
  font-size:8.5px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.6px;
  padding:7px 16px 5px;border-bottom:1px solid var(--bdr)44;
}
.bt-dest-row{
  padding:10px 16px;border-bottom:1px solid var(--bdr)33;
  display:flex;flex-direction:column;gap:4px;
}
.bt-dest-row:last-child{border-bottom:none}
.bt-dest-left{display:flex;align-items:center;gap:8px}
.bt-dest-check{color:var(--grn);font-size:12px;font-weight:700;flex-shrink:0}
.bt-dest-planta{font-size:12px;font-weight:700;color:var(--txt)}
.bt-dest-fecha{font-size:10.5px;color:var(--txt3);font-family:var(--mono)}
.bt-dest-vol{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:13px;font-weight:800;color:var(--acc2);
}
.bt-dest-status{
  font-size:9px;font-weight:700;letter-spacing:.5px;
  padding:1px 7px;border-radius:10px;
  background:var(--grn)14;color:var(--grn);border:1px solid var(--grn)30;
  font-family:var(--sans);
}
.bt-dest-prods{display:flex;flex-wrap:wrap;gap:5px}
.bt-dest-prod{
  font-size:9.5px;padding:1px 8px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--bdr);color:var(--txt2);
}

/* ══════════════════════════════════════════════════════════════════════════
   LEAFLET MAP — PA page
   ══════════════════════════════════════════════════════════════════════════ */
.leaflet-page-wrap{
  display:flex;height:calc(100vh - var(--topH) - var(--navH) - 58px);
  min-height:500px;
}
#peruLeafletMap{
  flex:1;
  z-index:1;
}
.leaf-sidebar{
  width:230px;flex-shrink:0;
  background:#0f172a;border-left:1px solid #1e293b;
  overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;
  color:#e2e8f0;
}
body.light .leaf-sidebar{background:#0f172a;color:#e2e8f0}
.leaf-legend-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:4px}
.leaf-legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#cbd5e1;padding:3px 0}
.leaf-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leaf-bt-item{
  display:flex;align-items:center;gap:6px;font-size:10.5px;color:#cbd5e1;padding:3px 0;
}
.leaf-bt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leaf-plant-list{margin-top:6px}
.leaf-plant-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--bdr)33;font-size:11px;
}
.leaf-plant-name{color:#e2e8f0;font-weight:600}
.leaf-plant-cob{font-family:var(--mono);font-size:11px;font-weight:700}

/* Leaflet popup custom */
.leaflet-popup-content-wrapper{
  background:var(--card2) !important;border:1px solid var(--bdr2) !important;
  border-radius:10px !important;box-shadow:var(--shadow) !important;
  color:var(--txt) !important;padding:0 !important;
}
body.light .leaflet-popup-content-wrapper{background:#fff !important}
.leaflet-popup-tip{background:var(--card2) !important}
body.light .leaflet-popup-tip{background:#fff !important}
.leaflet-popup-content{margin:0 !important;min-width:220px}
.popup-inner{padding:14px 16px}
.popup-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:2px 8px;border-radius:10px;margin-bottom:8px;
}
.popup-badge.terminal{background:var(--acc)1a;color:var(--acc2);border:1px solid var(--acc)40}
.popup-badge.refineria{background:#a855f71a;color:#a855f7;border:1px solid #a855f740}
.popup-name{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:2px}
.popup-region{font-size:10px;color:var(--txt3);margin-bottom:10px}
.popup-cob-badge{
  display:inline-flex;padding:2px 10px;border-radius:10px;
  font-size:12px;font-weight:800;font-family:var(--mono);
  float:right;margin-top:-28px;
}
.popup-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.popup-table th{font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);font-weight:700;padding:4px 6px;border-bottom:1px solid var(--bdr)}
.popup-table td{padding:5px 6px;border-bottom:1px solid var(--bdr)44;color:var(--txt2)}
.popup-table tr:last-child td{border-bottom:none}
.popup-cob-cell{font-family:var(--mono);font-weight:700}


/* ══════════════════════════════════════════════════════════════════════════
   NEW DASHBOARDS: MAP, TIMELINE, HEATMAP, CURVE
   ══════════════════════════════════════════════════════════════════════════ */
/* PA: Map */
.map-container{padding:18px;display:flex;gap:18px;flex-wrap:wrap}
.map-svg-wrap{flex:1;min-width:300px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;position:relative}
.map-legend{display:flex;flex-direction:column;gap:8px;width:220px}
.map-legend-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.map-dot{cursor:pointer;transition:r .15s,opacity .15s}
.map-dot:hover{opacity:.85}
.map-tooltip{
  position:absolute;background:var(--card2);border:1px solid var(--bdr2);
  border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;
  z-index:50;min-width:180px;box-shadow:var(--shadow);display:none;
}
.map-legend-item{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--txt2)}
.map-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* PB: Timeline / Gantt */
.gantt-wrap{padding:18px;overflow-x:auto}
.gantt-header{display:flex;gap:0;margin-left:160px;margin-bottom:4px}
.gantt-day{flex:1;min-width:28px;text-align:center;font-size:9px;color:var(--txt3);font-weight:700;padding:3px 0;border-left:1px solid var(--bdr)}
.gantt-row{display:flex;align-items:center;margin-bottom:6px;gap:0}
.gantt-label{width:160px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--txt);padding-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;position:relative;height:28px;background:var(--card2);border:1px solid var(--bdr);border-radius:4px;overflow:hidden}
.gantt-block{position:absolute;top:3px;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;cursor:default}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;z-index:2}
.gantt-quiebre{position:absolute;top:0;bottom:0;width:1px;background:var(--red);opacity:.4;border-left:1px dashed var(--red)}

/* PC: Heatmap */
.heatmap-wrap{padding:18px;overflow-x:auto}
.heatmap-table{border-collapse:separate;border-spacing:3px;width:100%}
.heatmap-table th{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);padding:4px 8px;font-weight:700;white-space:nowrap}
.heatmap-table .row-label{font-size:11px;font-weight:700;color:var(--txt);padding:4px 10px 4px 0;white-space:nowrap}
.hm-cell{
  border-radius:5px;padding:6px 10px;text-align:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:default;transition:transform .1s;min-width:52px;
}
.hm-cell:hover{transform:scale(1.05)}
.hm-empty{background:var(--bg3);color:var(--txt3)}
.hm-quiebre{background:#7f1d1d;color:#fca5a5}
.hm-crit{background:rgba(239,68,68,.25);color:#ef4444}
.hm-warn{background:rgba(234,179,8,.2);color:#eab308}
.hm-ok{background:rgba(34,197,94,.15);color:#22c55e}
.hm-great{background:rgba(34,197,94,.08);color:#4ade80}

/* PD: Curva de Inventario */
.curve-wrap{padding:18px;display:flex;flex-direction:column;gap:14px}
.curve-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.curve-prod-btn{
  padding:4px 14px;border-radius:20px;border:1px solid var(--bdr);
  background:var(--card2);color:var(--txt3);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:var(--sans);
}
.curve-prod-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.curve-prod-btn:hover:not(.active){border-color:var(--acc);color:var(--txt)}
.curve-chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px}
.curve-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px}
.curve-card-title{font-size:11px;font-weight:800;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.curve-canvas-wrap{position:relative;height:200px}
.curve-status{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:8px;
  border-top:1px solid var(--bdr);
}
.curve-tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
.curve-tag.ok{background:var(--grn)14;color:var(--grn)}
.curve-tag.warn{background:var(--red)18;color:var(--red)}


/* ══════════════════════════════════════════════════════════════════════════
   PROD CARD — interactive filter button
   ══════════════════════════════════════════════════════════════════════════ */
.prod-card{cursor:pointer;user-select:none}
.prod-card.selected{
  outline:2px solid var(--acc);outline-offset:2px;
  box-shadow:0 0 18px rgba(45,140,240,.35);
}
.prod-card-top{position:relative}
.prod-filter-hint{
  position:absolute;bottom:-2px;right:14px;
  font-size:8px;color:var(--txt3);font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;opacity:0;transition:opacity .2s;
}
.prod-card:hover .prod-filter-hint{opacity:1}

/* Cabotaje badge inside prod-card header */
.prod-cabotaje{
  display:flex;flex-direction:column;align-items:flex-end;
}
.prod-cabotaje-val{
  font-size:20px;font-weight:800;font-family:var(--mono);color:var(--txt);line-height:1;
}
.prod-cabotaje-delta{
  font-size:10px;font-weight:700;font-family:var(--mono);
  display:flex;align-items:center;gap:2px;margin-top:2px;
}
.prod-cabotaje-delta.up{color:var(--grn)}
.prod-cabotaje-delta.down{color:var(--red)}
.prod-cabotaje-delta.flat{color:var(--txt3)}
.prod-cabotaje-sub{font-size:9px;color:var(--acc2);font-weight:600;text-align:right}

/* Alerts row — cleaner table style */
/* alert table removed — clean cards */
/* Compact status bar at bottom of prod card */
.card-status-bar{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:7px 12px;border-top:1px solid var(--bdr);
  background:var(--card2);min-height:30px;
}
.card-status-bar.ok{color:var(--grn);font-size:10px;font-weight:600}
.cs-pill{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
  white-space:nowrap;font-family:var(--mono);
}
.cs-pill.crit{background:var(--red)18;color:var(--red);border:1px solid var(--red)30}
.cs-pill.warn{background:var(--yel)18;color:var(--yel);border:1px solid var(--yel)30}
.cs-pill.restr{background:#a855f718;color:#a855f7;border:1px solid #a855f730}


/* ══════════════════════════════════════════════════════════════════════════
   RESTRICCIONES TABLE (replaces charts)
   ══════════════════════════════════════════════════════════════════════════ */
.restr-section{margin:0 18px 22px}
.restr-header{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr);
}
.restr-title{font-size:14px;font-weight:800;color:var(--txt);letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
.restr-subtitle{font-size:10.5px;color:var(--txt3);margin-top:1px}
.restr-filter-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  padding:3px 10px 3px 8px;border-radius:20px;

.restr-table-wrap{

.restr-table th{

/* Mini bar chart for pron vs vfact */

.bar-fill.pron{background:var(--txt3)}

.restr-pct{font-weight:700;color:var(--red);font-family:var(--mono);font-size:11px}
.dias-ganados{

}
.nueva-fecha{font-size:10.5px;color:var(--acc2);font-family:var(--mono)}
.restr-bt{font-size:10px;color:var(--txt2)}

.no-restr{
  padding:24px;text-align:center;color:var(--grn);

/* ══════════════════════════════════════════════════════════════════════
   SIMULADOR BT — Full redesign
   ══════════════════════════════════════════════════════════════════════ */
.sim-page{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.sim-toolbar{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap}
body.light .sim-toolbar{background:#fff;border-bottom-color:#d0d8e8}
.sim-toolbar-title{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:-.01em}
body.light .sim-toolbar-title{color:#0d1a2e}
.sim-btn{padding:6px 14px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid transparent;transition:all .15s;letter-spacing:.01em}
.sim-btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.sim-btn-primary:hover{opacity:.85}
.sim-btn-ghost{background:var(--card);color:var(--txt2);border-color:var(--bdr)}
.sim-btn-ghost:hover{border-color:var(--acc);color:var(--txt)}
body.light .sim-btn-ghost{background:#fff;color:#2c4060;border-color:#c8d4e8}
.sim-btn-danger{background:var(--red)14;color:var(--red);border-color:var(--red)40}
.sim-btn-danger:hover{background:var(--red)22}

.sim-body{display:flex;flex:1;overflow:hidden;min-height:0;height:0}

/* LEFT: Ship selector */
.sim-fleet{width:240px;flex-shrink:0;border-right:1px solid var(--bdr);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column}
body.light .sim-fleet{background:#fff;border-right-color:#d0d8e8}
.sim-fleet-hdr{padding:10px 12px 8px;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);flex-shrink:0}
.sim-ship-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bdr)44;transition:background .12s;position:relative;user-select:none}
.sim-ship-btn:hover{background:var(--bg3)}
body.light .sim-ship-btn:hover{background:#f0f4fb}
.sim-ship-btn.active{background:var(--acc)14;border-left:3px solid var(--acc)}
body.light .sim-ship-btn.active{background:rgba(0,85,179,.07);border-left-color:#0055b3}
.sim-ship-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:.02em}
.sim-ship-info{flex:1;min-width:0}
.sim-ship-n{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.light .sim-ship-n{color:#0d1a2e}
.sim-ship-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.sim-ship-xbtn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:2px 4px;opacity:0;transition:opacity .15s;border-radius:3px;flex-shrink:0}
.sim-ship-btn:hover .sim-ship-xbtn{opacity:1}
.sim-ship-xbtn:hover{color:var(--red);background:var(--red)14}

/* Cap bar */
.sim-capbar{height:3px;border-radius:0;overflow:hidden}
.sim-capbar-fill{height:100%;transition:width .3s}

/* CENTER: Editor */
.sim-editor{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;scroll-behavior:smooth}
.sim-editor-empty{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:var(--txt3)}

/* Ship config panel */
.sim-config{padding:16px 18px;border-bottom:1px solid var(--bdr);background:var(--card)}
body.light .sim-config{background:#fff;border-bottom-color:#d0d8e8}
.sim-config-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:end}
@media(max-width:900px){.sim-config-row{grid-template-columns:1fr 1fr}}
.sim-fld{display:flex;flex-direction:column;gap:3px}
.sim-fld-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)}
.sim-fld-input{background:var(--card2);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;padding:6px 10px;font-size:12px;font-family:var(--sans);transition:border-color .15s;width:100%}
body.light .sim-fld-input{background:#f6f8fb;color:#0d1a2e;border-color:#c8d4e8}

/* Capacity meter */
.sim-capometer{margin:14px 18px 0;padding:12px 16px;border-radius:8px;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;gap:16px;flex-shrink:0}
body.light .sim-capometer{background:#fff;border-color:#d0d8e8}
.sim-caplabel{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);white-space:nowrap}
.sim-captrack{flex:1;height:10px;background:var(--bdr);border-radius:5px;overflow:hidden;min-width:60px}
.sim-capfill{height:100%;border-radius:5px;transition:width .4s,background .3s}
.sim-capnums{font-size:11px;font-family:var(--mono);font-weight:700;white-space:nowrap;min-width:120px;text-align:right}

/* Stops section */
.sim-stops-header{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;flex-shrink:0}
.sim-stops-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);flex:1}

/* Stop card */
.sim-stops-list{padding:0 18px 80px;display:flex;flex-direction:column;gap:8px}
.sim-stop-card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;transition:border-color .15s}
body.light .sim-stop-card{background:#fff;border-color:#d0d8e8}
.sim-stop-card:hover{border-color:var(--bdr2)}
body.light .sim-stop-card:hover{border-color:#b8c4d8}
.sim-stop-head{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border-bottom:1px solid var(--bdr)44}
body.light .sim-stop-head{background:#f6f8fb;border-bottom-color:#eaeff6}
.sim-stop-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.sim-stop-planta{font-size:13px;font-weight:800;color:var(--txt);flex:1}
body.light .sim-stop-planta{color:#0d1a2e}
.sim-stop-dist{font-size:10px;color:var(--txt3);font-family:var(--mono)}
.sim-stop-eta-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);background:var(--acc)14;color:var(--acc2);border:1px solid var(--acc)30}
body.light .sim-stop-eta-badge{background:rgba(0,85,179,.08);color:#0055b3;border-color:rgba(0,85,179,.2)}
.sim-stop-del2{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:3px 5px;border-radius:4px;transition:all .15s}
.sim-stop-del2:hover{color:var(--red);background:var(--red)14}
.sim-stop-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px}

/* Cob indicator inside stop card */
.sim-cob-indicator{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--card2);border-top:1px solid var(--bdr)33;font-size:10px}
body.light .sim-cob-indicator{background:#f6f8fb;border-top-color:#eaeff6}
.sim-cob-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* RIGHT: Summary + Gantt */
.sim-summary{width:260px;flex-shrink:0;border-left:1px solid var(--bdr);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:0}
body.light .sim-summary{background:#fff;border-left-color:#d0d8e8}
.sim-sum-section{padding:12px 14px;border-bottom:1px solid var(--bdr)44}
body.light .sim-sum-section{border-bottom-color:#eaeff6}
.sim-sum-title{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:8px}
.sim-kpi2{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--bdr)22}
.sim-kpi2:last-child{border-bottom:none}
.sim-kpi2-lbl{font-size:10.5px;color:var(--txt2)}
.sim-kpi2-val{font-size:13px;font-weight:800;font-family:var(--mono);color:var(--txt)}
body.light .sim-kpi2-val{color:#0d1a2e}

/* Gantt mini in summary */
.sim-mini-gantt{margin:8px 0 0;display:flex;flex-direction:column;gap:4px}
.sim-mini-row{display:flex;align-items:center;gap:6px}
.sim-mini-label{font-size:9.5px;color:var(--txt2);width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.sim-mini-bar-track{flex:1;height:14px;background:var(--bdr)44;border-radius:3px;overflow:hidden;position:relative}
.sim-mini-bar{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 4px;font-size:8px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden}

/* Summary stop list */
.sim-sum-stop{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--bdr)22;font-size:10px}
.sim-sum-stop:last-child{border-bottom:none}
.sim-sum-stop-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sim-sum-stop-name{color:var(--txt);font-weight:600;flex:1}
body.light .sim-sum-stop-name{color:#0d1a2e}
.sim-sum-stop-vol{font-family:var(--mono);color:var(--acc2);font-size:10px;font-weight:700}
body.light .sim-sum-stop-vol{color:#0055b3}
.sim-sum-stop-eta{color:var(--txt3);font-size:9.5px}

/* Stop multi-product rows */
.sim-stop-prods{padding:0 12px 8px;display:flex;flex-direction:column;gap:6px}
.sim-stop-prod-row{display:grid;grid-template-columns:1fr 1fr 110px 28px;gap:8px;align-items:center;
  background:var(--card2);border:1px solid var(--bdr)55;border-radius:6px;padding:7px 10px}
body.light .sim-stop-prod-row{background:#f6f8fb;border-color:#d0d8e8}
.sim-stop-prod-row:hover{border-color:var(--bdr2)}
.sim-stop-prod-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);margin-bottom:2px}
.sim-stop-prod-add{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:5px;
  background:none;border:1px dashed var(--bdr2);color:var(--txt3);cursor:pointer;font-size:10px;
  font-family:var(--sans);font-weight:600;transition:all .15s;width:100%;justify-content:center}
.sim-stop-prod-add:hover{border-color:var(--acc);color:var(--acc2);background:var(--acc)08}
.sim-stop-cov{display:flex;align-items:center;flex-wrap:wrap;gap:8px;
  padding:7px 12px;border-top:1px solid var(--bdr)33;font-size:10.5px}
.sim-stop-cov-item{display:flex;align-items:center;gap:5px}
.sim-stop-date-row{display:flex;align-items:center;gap:10px;padding:4px 12px 8px;flex-wrap:wrap}
.sim-stop-pct-bar{display:flex;align-items:center;gap:8px;padding:5px 12px 8px;background:var(--card2)22}

/* ═══ UPLOAD MODULE ═══ */
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px}
@media(max-width:800px){.upload-grid{grid-template-columns:1fr}}
.upload-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.upload-card-header{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.upload-card-icon{font-size:24px}
.upload-card-title{font-size:14px;font-weight:700;color:var(--txt)}
.upload-card-desc{font-size:10.5px;color:var(--txt3)}
.upload-dropzone{
  margin:16px;padding:40px 20px;border:2px dashed var(--bdr2);border-radius:8px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--card2);
}
.upload-dropzone:hover,.upload-dropzone.dragover{border-color:var(--acc);background:var(--acc)0a}
.upload-dropzone-icon{font-size:36px;margin-bottom:8px}
.upload-dropzone-text{font-size:12px;color:var(--txt2);font-weight:600}
.upload-dropzone-hint{font-size:10px;color:var(--txt3);margin-top:4px}
.upload-dropzone input[type=file]{display:none}
.upload-preview{margin:0 16px 16px;max-height:300px;overflow:auto;border-radius:6px;border:1px solid var(--bdr)}
.upload-preview table{width:100%;border-collapse:collapse;font-size:10px}
.upload-preview th{background:var(--bg3);color:var(--txt2);padding:6px 8px;text-align:left;font-weight:700;position:sticky;top:0;z-index:1}
.upload-preview td{padding:5px 8px;border-top:1px solid var(--bdr)44;color:var(--txt);font-family:var(--mono);font-size:9.5px}
.upload-preview tr:hover td{background:var(--acc)08}
.upload-actions{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center}
.upload-btn{padding:8px 20px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid transparent;transition:all .15s}
.upload-btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.upload-btn-primary:hover{background:var(--acc2)}
.upload-btn-primary:disabled{opacity:.4;cursor:not-allowed}
.upload-btn-secondary{background:var(--bg3);color:var(--txt2);border-color:var(--bdr)}
.upload-btn-secondary:hover{border-color:var(--acc);color:var(--txt)}
.upload-status{font-size:10.5px;color:var(--txt3);margin-left:auto}
.upload-status.success{color:var(--grn)}
.upload-status.error{color:var(--red)}

.upload-log-entry:last-child{border:none}
.upload-log-ts{color:var(--txt3);margin-right:8px}
.upload-log-ok{color:var(--grn)}
.upload-log-err{color:var(--red)}
.upload-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px}
.upload-sum-card{background:var(--bg3);border-radius:6px;padding:12px;text-align:center}
.upload-sum-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--acc2)}
.upload-sum-lbl{font-size:9px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.upload-pdf-result{margin:0 16px 16px;padding:12px;background:var(--card2);border:1px solid var(--bdr);border-radius:6px}
.upload-pdf-nave{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)33}
.upload-pdf-nave:last-child{border:none}
.upload-pdf-nave-icon{font-size:20px}
.upload-pdf-nave-name{font-weight:700;color:var(--txt);font-size:12px}
.upload-pdf-nave-detail{font-size:10px;color:var(--txt2)}
.upload-raw-text{margin:0 16px 16px;padding:12px;background:var(--card2);border:1px solid var(--bdr);border-radius:6px;max-height:250px;overflow:auto;font-family:var(--mono);font-size:9px;color:var(--txt2);white-space:pre-wrap;line-height:1.5}

/* ═══ COBERTURAS TABLE v3 ═══ */
.cob-toolbar{display:flex;align-items:center;gap:10px;padding:8px 18px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-wrap:wrap;position:sticky;top:0;z-index:50}
body.light .cob-toolbar{background:#fff;border-bottom-color:#d0d8e8}
.cob-toolbar-label{font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.cob-pron-btn{padding:5px 14px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid var(--bdr);background:var(--card2);color:var(--txt2);transition:all .15s}
.cob-pron-btn:hover{border-color:var(--acc);color:var(--txt)}
body.light .cob-pron-btn{background:#f0f4fb;border-color:#c8d4e8}

.cob-pron-btn.save:hover{opacity:.85}

.cob-pron-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:10px}
.cob-pron-item{display:flex;align-items:center;gap:6px;font-size:10px}
.cob-pron-item label{flex:1;color:var(--txt2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cob-pron-item input{width:70px;background:var(--card2);color:var(--txt);border:1px solid var(--bdr);border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:10px;text-align:right}
.cob-pron-item input:focus{outline:none;border-color:var(--acc)}
.cob-tbl-wrap{margin:0 18px 18px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:auto;max-height:calc(100vh - 260px);position:relative}
.cob-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cob-tbl thead{position:sticky;top:0;z-index:10}
.cob-tbl thead th{background:var(--bg3);color:var(--txt2);padding:8px 10px;text-align:left;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--bdr);white-space:nowrap}
body.light .cob-tbl thead th{background:#e8ecf2;color:#2c4060}
.cob-tbl th.r,.cob-tbl td.r{text-align:right}
.cob-tbl td{padding:5px 10px;border-bottom:1px solid var(--bdr)33;font-family:var(--mono);font-size:10.5px;white-space:nowrap}
.cob-tbl tr:hover td{background:var(--acc)06}
.cob-planta-row{cursor:pointer;user-select:none}
.cob-planta-row td{background:var(--bg3);font-family:var(--sans);font-weight:800;font-size:12px;color:var(--txt);padding:10px;border-bottom:2px solid var(--bdr)}
body.light .cob-planta-row td{background:#e8ecf2;color:#0d1a2e}
.cob-planta-row:hover td{background:var(--bg3)!important;opacity:.85}
.cob-planta-row .pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-left:8px;font-family:var(--mono)}
.cob-planta-row .toggle-arrow{display:inline-block;transition:transform .2s;margin-right:6px;font-size:10px}
.cob-planta-row.collapsed .toggle-arrow{transform:rotate(-90deg)}
.cob-tbl tr.cob-hidden{display:none!important}
.cob-edit{width:60px;background:var(--card2);color:var(--acc2);border:1px solid var(--acc)44;border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:10.5px;text-align:right;font-weight:700;transition:border-color .15s}
.cob-edit:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px var(--acc)22}
body.light .cob-edit{background:#f0f4fb;color:#0055b3;border-color:#0055b3aa}
.cob-cov-cell{font-weight:800;font-size:12px}
.cob-cov-crit{color:var(--red)}
.cob-cov-warn{color:var(--yel)}
.cob-cov-ok{color:var(--grn)}
.cob-changed td{background:var(--acc)08!important}
</style>
</head>
