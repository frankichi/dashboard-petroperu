// PRONÓSTICO MENSUAL PARSER
// ═══════════════════════════════════════════════════════════════════════════

function handlePronFile(file) {
  if (!file || typeof XLSX === 'undefined') return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      var registros = [];
      // Find rows with planta, producto, value pattern
      for (var i = 0; i < json.length; i++) {
        var row = json[i];
        if (!row) continue;
        // Search for the 3 columns: planta (text), producto (text), value (number)
        for (var c = 0; c < row.length - 2; c++) {
          var planta = String(row[c] || '').trim();
          var producto = String(row[c+1] || '').trim();
          var val = parseFloat(row[c+2]);
          if (planta && producto && !isNaN(val) && val >= 0 &&
              isNaN(parseFloat(planta)) && isNaN(parseFloat(producto))) {
            // Filter airports
            if (planta.indexOf('A.') === 0 || planta.indexOf('A ') === 0) continue;
            registros.push({planta: planta, producto: producto, pron: Math.round(val * 10000) / 10000});
            break;
          }
        }
      }

      if (!registros.length) throw new Error('No se encontraron registros de pron\u00f3stico');

      var mesInput = document.getElementById('pron-mes-input');
      var mes = mesInput ? mesInput.value : '2026-03';
      uploadPronData = {mes: mes, registros: registros};

      // Build preview
      var html = '<div class="upload-summary">'
        + '<div class="upload-sum-card"><div class="upload-sum-val">' + registros.length + '</div><div class="upload-sum-lbl">Registros</div></div>'
        + '<div class="upload-sum-card"><div class="upload-sum-val">' + mes + '</div><div class="upload-sum-lbl">Mes</div></div>'
        + '<div class="upload-sum-card"><div class="upload-sum-val">' + new Set(registros.map(function(r){return r.planta})).size + '</div><div class="upload-sum-lbl">Plantas</div></div></div>';
      html += '<div class="upload-preview"><table><thead><tr><th>Planta</th><th>Producto</th><th class="r">Pron.(MBDC)</th></tr></thead><tbody>';
      registros.forEach(function(r) {
        html += '<tr><td>' + r.planta + '</td><td style="font-weight:700">' + r.producto + '</td><td class="r">' + r.pron.toFixed(4) + '</td></tr>';
      });
      html += '</tbody></table></div>';
      uploadPronPreviewHTML = html;
      var prev = document.getElementById('pron-upload-preview');
      if (prev) prev.innerHTML = html;
      var actions = document.getElementById('pron-upload-actions');
      if (actions) actions.style.display = 'flex';
      addUploadLog(true, 'Pron\u00f3stico: ' + registros.length + ' registros para ' + mes);
    } catch (err) {
      console.error('[Pron Upload]', err);
      addUploadLog(false, 'Error pron\u00f3stico: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function openWhatIf(planta, producto) {
  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (!r) return;

  var inv = cobGetInv(r) + cobGetRefineryAdj(planta, producto);
  var pronVal = pronSheet[planta + '|' + producto] || r.pron_mes || r.pron || 0;
  var vfactVal = r.vfact || 0;
  var demRate = vfactVal > 0 ? vfactVal : (pronVal > 0 ? pronVal : (r.dem_prom || 0));
  var btVol = (r.vol_rep || 0) + (r.vol_rep_bt2 || 0);
  var btEta = r.fecha_reposicion || '';
  var btName = r.bt || '';

  var modal = document.getElementById('whatif-modal');
  modal.style.display = 'flex';
  modal.style.alignItems = 'center';
  modal.style.justifyContent = 'center';

  var cobBase = demRate > 0 ? Math.floor(inv / demRate) : 999;

  document.getElementById('whatif-content').innerHTML =
    '<div style="padding:20px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div><div style="font-size:18px;font-weight:800;color:var(--txt)">' + planta + ' \u00B7 ' + producto + '</div>'
    + '<div style="font-size:11px;color:var(--txt3);margin-top:2px">Simulador What-If \u2014 Proyecci\u00f3n de quiebre</div></div>'
    + '<button onclick="closeWhatIf()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt3)">\u2715</button></div>'
    // KPIs
    + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">'
    + '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Inventario</div>'
    + '<div style="font-size:18px;font-weight:800;color:var(--txt);font-family:var(--mono)">' + inv.toFixed(2) + '</div>'
    + '<div style="font-size:8px;color:var(--txt3)">MB</div></div>'
    + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">'
    + '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Pron\u00f3stico</div>'
    + '<div style="font-size:18px;font-weight:800;color:#2563eb;font-family:var(--mono)">' + pronVal.toFixed(2) + '</div>'
    + '<div style="font-size:8px;color:var(--txt3)">MBDC</div></div>'
    + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">'
    + '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase">V. Factible</div>'
    + '<div style="font-size:18px;font-weight:800;color:#d97706;font-family:var(--mono)" id="wi-vfact-display">' + (vfactVal > 0 ? vfactVal.toFixed(2) : pronVal.toFixed(2)) + '</div>'
    + '<div style="font-size:8px;color:var(--txt3)">MBDC</div></div>'
    + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">'
    + '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Cob. Base</div>'
    + '<div style="font-size:18px;font-weight:800;font-family:var(--mono)" id="wi-cob-display" style="color:' + (cobBase < 4 ? '#dc2626' : cobBase < 7 ? '#d97706' : '#16a34a') + '">' + (cobBase < 999 ? cobBase + 'd' : '\u2014') + '</div>'
    + '<div style="font-size:8px;color:var(--txt3)">d\u00edas</div></div></div>'
    // Slider
    + '<div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:16px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    + '<span style="font-size:11px;font-weight:700;color:var(--txt)">Ajustar V. Factible (MBDC)</span>'
    + '<span style="font-size:12px;font-weight:800;color:#d97706;font-family:var(--mono)" id="wi-slider-val">' + (vfactVal > 0 ? vfactVal.toFixed(2) : pronVal.toFixed(2)) + '</span></div>'
    + '<input type="range" id="wi-slider" min="0" max="' + (pronVal * 2 || 5).toFixed(2) + '" step="0.01" value="' + (vfactVal > 0 ? vfactVal : pronVal).toFixed(2) + '" '
    + 'style="width:100%;accent-color:#d97706" oninput="updateWhatIf(\'' + planta.replace(/'/g, "\\'") + '\',\'' + producto.replace(/'/g, "\\'") + '\')">'
    + '<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--txt3)">'
    + '<span>0</span><span>Pron: ' + pronVal.toFixed(2) + '</span><span>' + (pronVal * 2 || 5).toFixed(2) + '</span></div></div>'
    // Chart
    + '<div style="height:250px;margin-bottom:16px"><canvas id="wi-chart"></canvas></div>'
    // BT info
    + (btName ? '<div style="font-size:10px;color:var(--acc2);margin-bottom:12px">\uD83D\uDEA2 BT: <strong>' + btName + '</strong> · ETA ' + (btEta ? fmtDate(btEta) : '\u2014') + ' · ' + btVol.toFixed(1) + ' MB</div>' : '')
    // Actions
    + '<div style="display:flex;gap:10px">'
    + '<button onclick="applyWhatIf(\'' + planta.replace(/'/g, "\\'") + '\',\'' + producto.replace(/'/g, "\\'") + '\')" '
    + 'style="flex:1;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px">'
    + '\u2705 Aplicar y guardar en GS</button>'
    + '<button onclick="closeWhatIf()" style="padding:10px 20px;background:var(--bg3);color:var(--txt);border:1px solid var(--bdr);border-radius:8px;font-weight:700;cursor:pointer;font-size:12px">Cancelar</button>'
    + '</div></div>';

  // Render initial chart
  renderWhatIfChart(planta, producto);
}

function renderWhatIfChart(planta, producto) {
  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (!r) return;

  var inv = cobGetInv(r) + cobGetRefineryAdj(planta, producto);
  var slider = document.getElementById('wi-slider');
  var simVfact = slider ? parseFloat(slider.value) : 0;
  var pronVal = pronSheet[planta + '|' + producto] || r.pron_mes || r.pron || 0;
  var btVol = (r.vol_rep || 0) + (r.vol_rep_bt2 || 0);
  var btEtaMs = r.fecha_reposicion ? new Date(r.fecha_reposicion + 'T12:00:00').getTime() : null;

  var days = 30;
  var labels = [], baseLine = [], simLine = [];
  var curBase = inv, curSim = inv;
  var baseRate = pronVal > 0 ? pronVal : (r.dem_prom || 0);
  var btAddedBase = false, btAddedSim = false;

  for (var d = 0; d <= days; d++) {
    var dt = new Date(currentDate + 'T12:00:00');
    dt.setDate(dt.getDate() + d);
    labels.push(dt.getDate() + '/' + (dt.getMonth() + 1));
    baseLine.push(Math.max(0, Math.round(curBase * 100) / 100));
    simLine.push(Math.max(0, Math.round(curSim * 100) / 100));
    if (!btAddedBase && btEtaMs && dt.getTime() >= btEtaMs && btVol > 0) { curBase += btVol; curSim += btVol; btAddedBase = true; btAddedSim = true; }
    curBase -= Math.abs(baseRate);
    curSim -= Math.abs(simVfact);
  }

  var cobSim = simVfact > 0 ? Math.floor(inv / simVfact) : 999;
  var el = document.getElementById('wi-cob-display');
  if (el) { el.textContent = cobSim < 999 ? cobSim + 'd' : '\u2014'; el.style.color = cobSim < 4 ? '#dc2626' : cobSim < 7 ? '#d97706' : '#16a34a'; }

  var ctx = document.getElementById('wi-chart');
  if (!ctx) return;
  if (whatIfChart) { try { whatIfChart.destroy(); } catch(e) {} }

  var isLight = document.body.classList.contains('light');
  whatIfChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Base (Pron\u00f3stico)', data: baseLine, borderColor: '#16a34a', borderWidth: 2, pointRadius: 0, borderDash: [5,3], fill: false },
        { label: 'Simulado (V.Factible)', data: simLine, borderColor: '#d97706', borderWidth: 2.5, pointRadius: 1, fill: { target: 'origin', above: 'rgba(217,119,6,.08)' } }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: isLight ? '#333' : '#ccc', font: { size: 10 } } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: isLight ? '#666' : '#888', font: { size: 8 } } },
        y: { grid: { color: isLight ? '#e5e5e5' : '#333' }, ticks: { color: isLight ? '#666' : '#888', font: { size: 9 } }, min: 0, title: { display: true, text: 'MB', font: { size: 9 } } }
      }
    }
  });
}

function updateWhatIf(planta, producto) {
  var slider = document.getElementById('wi-slider');
  var val = parseFloat(slider.value) || 0;
  var display = document.getElementById('wi-slider-val');
  if (display) display.textContent = val.toFixed(2);
  var vfDisplay = document.getElementById('wi-vfact-display');
  if (vfDisplay) vfDisplay.textContent = val.toFixed(2);
  renderWhatIfChart(planta, producto);
}

async function applyWhatIf(planta, producto) {
  var slider = document.getElementById('wi-slider');
  var newVfact = parseFloat(slider.value) || 0;

  // Save to cobOverrides and trigger table update
  cobOverrides[planta + '|' + producto] = { vfact: newVfact };

  // Save to GS
  var today = byLatest();
  var r = today.find(function(x) { return x.planta === planta && x.producto === producto; });
  if (r) {
    try {
      await fetch(CONFIG.API_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'batchUpsert',
          records: [{
            fecha: currentDate, planta: planta, producto: producto,
            inv: 0, pron: 0, vult7: 0, vreal: 0, dem_prom: 0, dem: 0, var_dem: 0,
            vfact: newVfact, cob: 0, fecha_cobertura: '', fecha_reposicion: r.fecha_reposicion || '',
            bt: r.bt || '', vol_rep: r.vol_rep || 0, vacio: r.vacio || 0, comentario: '',
            fecha_repos_bt2: r.fecha_repos_bt2 || '', bt2: r.bt2 || '', vol_rep_bt2: r.vol_rep_bt2 || 0, vacio2: 0
          }]
        })
      });
    } catch (e) { console.error('[WhatIf Save]', e); }
  }

  closeWhatIf();
  renderP2();
  setTimeout(function() { fetchData(true); }, 2500);
}

function closeWhatIf() {
  var modal = document.getElementById('whatif-modal');
  if (modal) modal.style.display = 'none';
  if (whatIfChart) { try { whatIfChart.destroy(); } catch(e) {} whatIfChart = null; }
}

// Close modal on backdrop click
document.addEventListener('click', function(e) {
  if (e.target.id === 'whatif-modal') closeWhatIf();
});


// ═══════════════════════════════════════════════════════════════════════
// RESTRICTION KPI MODAL
// ═══════════════════════════════════════════════════════════════════════
function openRestrModal(tipo) {
  var today = byLatest();
  var restr = today.filter(function(r) {
    var pr = pronSheet[r.planta+'|'+r.producto] || r.pron_mes || r.pron || 0;
    return (r.vfact||0) > 0 && pr > 0 && (r.vfact||0) < pr && r.producto !== 'TA1' && r.producto !== 'GLP';
  });

  var title = '', body = '';
  if (tipo === 'restricciones') {
    title = '\uD83D\uDEA8 Restricciones Activas (' + restr.length + ')';
    body = '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:var(--bg3)">'
      + '<th style="padding:8px;text-align:left">Planta</th><th style="text-align:left">Producto</th>'
      + '<th class="r">Inv(MB)</th><th class="r">Pron</th><th class="r">VFact</th><th class="r">Reduc.</th><th class="r">Cob</th></tr></thead><tbody>';
    restr.sort(function(a,b) { return (a.cob||999)-(b.cob||999); }).forEach(function(r) {
      var pr = pronSheet[r.planta+'|'+r.producto] || r.pron || 0;
      var red = pr > 0 ? ((pr-(r.vfact||0))/pr*100).toFixed(1) : 0;
      var cob = (r.inv > 0 && (r.vfact||0) > 0) ? Math.floor(r.inv/(r.vfact||1)) : 0;
      body += '<tr style="border-bottom:1px solid var(--bdr)"><td style="padding:6px 8px;font-weight:700">' + r.planta + '</td>'
        + '<td>' + r.producto + '</td><td class="r">' + (r.inv||0).toFixed(2) + '</td>'
        + '<td class="r" style="color:#2563eb">' + pr.toFixed(2) + '</td>'
        + '<td class="r" style="color:#d97706">' + (r.vfact||0).toFixed(2) + '</td>'
        + '<td class="r" style="color:#dc2626">-' + red + '%</td>'
        + '<td class="r" style="font-weight:700">' + cob + 'd</td></tr>';
    });
    body += '</tbody></table>';
  } else if (tipo === 'plantas') {
    title = '\uD83C\uDFED Plantas Afectadas';
    var byPl = {};
    restr.forEach(function(r) { if (!byPl[r.planta]) byPl[r.planta] = []; byPl[r.planta].push(r); });
    body = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">';
    Object.entries(byPl).forEach(function(e) {
      var pl = e[0], recs = e[1];
      body += '<div style="background:var(--bg3);border-radius:8px;padding:12px"><div style="font-weight:800;font-size:13px;margin-bottom:6px">' + pl + '</div>';
      recs.forEach(function(r) {
        var pr = pronSheet[r.planta+'|'+r.producto] || r.pron || 0;
        body += '<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">' + r.producto + ': <span style="color:#d97706;font-weight:700">' + (r.vfact||0).toFixed(2) + '</span> / <span style="color:#2563eb">' + pr.toFixed(2) + '</span> MBDC</div>';
      });
      body += '</div>';
    });
    body += '</div>';
  } else if (tipo === 'reduccion') {
    title = '\uD83D\uDCC9 Impacto de Restricciones';
    var totalPron = 0, totalVfact = 0;
    restr.forEach(function(r) {
      var pr = pronSheet[r.planta+'|'+r.producto] || r.pron || 0;
      totalPron += pr; totalVfact += (r.vfact||0);
    });
    var diff = totalPron - totalVfact;
    body = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">'
      + '<div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center"><div style="font-size:9px;color:var(--txt3)">DEMANDA TOTAL PRON.</div><div style="font-size:22px;font-weight:800;color:#2563eb;font-family:var(--mono)">' + totalPron.toFixed(2) + '</div><div style="font-size:8px;color:var(--txt3)">MBDC</div></div>'
      + '<div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center"><div style="font-size:9px;color:var(--txt3)">DEMANDA FACTIBLE</div><div style="font-size:22px;font-weight:800;color:#d97706;font-family:var(--mono)">' + totalVfact.toFixed(2) + '</div><div style="font-size:8px;color:var(--txt3)">MBDC</div></div>'
      + '<div style="background:#dc262612;border-radius:8px;padding:14px;text-align:center"><div style="font-size:9px;color:var(--txt3)">REDUCCI\u00d3N NETA</div><div style="font-size:22px;font-weight:800;color:#dc2626;font-family:var(--mono)">-' + diff.toFixed(2) + '</div><div style="font-size:8px;color:var(--txt3)">MBDC no atendidos</div></div></div>'
      + '<div style="font-size:11px;color:var(--txt2);line-height:1.6">La restricci\u00f3n reduce la demanda atendida en <strong>' + diff.toFixed(2) + ' MBDC</strong> respecto al pron\u00f3stico. Esto equivale a <strong>' + (diff*30).toFixed(0) + ' MB</strong> menos de venta mensual estimada.</div>';
  } else {
    title = '\u23F3 D\u00edas Ganados por Restricci\u00f3n';
    body = '<div style="font-size:11px;color:var(--txt2);margin-bottom:12px">Al reducir la demanda factible, el inventario existente "dura m\u00e1s", extendiendo los d\u00edas de cobertura hasta la pr\u00f3xima reposici\u00f3n.</div>';
    body += '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:var(--bg3)"><th style="padding:6px;text-align:left">Planta</th><th>Producto</th><th class="r">Cob. Normal</th><th class="r">Cob. Restr.</th><th class="r" style="color:#a855f7">D\u00edas +</th></tr></thead><tbody>';
    restr.forEach(function(r) {
      var pr = pronSheet[r.planta+'|'+r.producto] || r.pron || 0;
      var cobNorm = pr > 0 ? Math.floor(r.inv/pr) : 0;
      var cobRestr = (r.vfact||0) > 0 ? Math.floor(r.inv/(r.vfact||1)) : cobNorm;
      var gained = Math.max(0, cobRestr - cobNorm);
      body += '<tr style="border-bottom:1px solid var(--bdr)"><td style="padding:5px 8px;font-weight:700">' + r.planta + '</td><td>' + r.producto + '</td><td class="r">' + cobNorm + 'd</td><td class="r">' + cobRestr + 'd</td><td class="r" style="color:#a855f7;font-weight:800">+' + gained + 'd</td></tr>';
    });
    body += '</tbody></table>';
  }

  document.getElementById('whatif-content').innerHTML =
    '<div style="padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div style="font-size:16px;font-weight:800;color:var(--txt)">' + title + '</div>'
    + '<button onclick="closeWhatIf()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3)">\u2715</button></div>'
    + body + '</div>';
  var m = document.getElementById('whatif-modal');
  m.style.display = 'flex';
  m.style.alignItems = 'center';
  m.style.justifyContent = 'center';
}


// Event delegation for restriction KPI boxes
document.addEventListener('click', function(e) {
  var box = e.target.closest('[data-restr]');
  if (box) {
    var tipo = box.getAttribute('data-restr');
    if (tipo) openRestrModal(tipo);
  }
});

// ════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  fetchData(true);
});

    'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js',

    if (i >= urls.length) { console.warn('[XLSX] All CDNs failed'); return; }
    var s = document.createElement('script');
    s.src = urls[i];
    s.onload = function() { console.log('[XLSX] Loaded from', urls[i]); };

    document.head.appendChild(s);

  if (typeof XLSX === 'undefined') tryLoad(0);
})();
